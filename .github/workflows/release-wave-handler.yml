name: Release Wave Handler

# ippoan/ci-dashboard#137 Phase 4b で導入する reusable workflow。
#
# 各 release-wave 参加 repo の `.github/workflows/release-wave.yml` から
# `uses:` で呼ばれる。`repository_dispatch` で ci-dashboard が送る event を受けて
# platform 別の deploy 操作を行い、結果を
# `https://ci-dashboard.ippoan.org/webhooks/release-wave/*` に POST する。
#
# 受ける event:
#   - release-wave-flip / -rollback                  (wave lifecycle)
#   - release-wave-traffic-rollback                  (frontend 単独 rollback, #196)
#   - release-wave-backend-rollback                  (backend 単独 rollback, #197)
#
# 注: release-wave-stage event + stage-* job は ci-workflows#96② で撤去した。
#     wave は frontend-ci が tag push で報告済みの no-traffic version
#     (Pending releases) を flip するだけ (stage は frontend-ci 側に一本化)。
#
# Caller (`.github/workflows/release-wave.yml`) 例:
#
#   on:
#     repository_dispatch:
#       types:
#         - release-wave-flip
#         - release-wave-rollback
#         - release-wave-traffic-rollback   # frontend (cloudflare-workers) のみ
#         - release-wave-backend-rollback   # backend (cloudrun) のみ
#
#   permissions:
#     contents: write
#     id-token: write   # GCP WIF (cloudrun の場合のみ必須、宣言は常時 OK)
#
#   jobs:
#     handler:
#       uses: ippoan/ci-workflows/.github/workflows/release-wave-handler.yml@main
#       secrets: inherit
#
# client_payload (ci-dashboard が送る) shape:
#   {
#     "wave_id":     "wave_2026_05_27_01",
#     "target_tag":  "v1.42.0",
#     "head_sha":    "abcd1234...",
#     "callback_url": "https://ci-dashboard.ippoan.org"   // optional override
#   }

on:
  workflow_call:
    inputs:
      callback_base_url:
        description: 'ci-dashboard host (default = production)'
        required: false
        type: string
        default: 'https://ci-dashboard.ippoan.org'
      targets_yaml_ref:
        description: 'ci-workflows ref to fetch release-wave-targets.yaml from'
        required: false
        type: string
        default: 'main'
      release_wave_gcp_base_url:
        description: 'release-wave-gcp Cloud Run service URL (cloudrun path のみ)'
        required: false
        type: string
        default: 'https://release-wave-gcp-staging-566bls5vfq-an.a.run.app'

permissions:
  contents: write       # tag push
  id-token: write       # GCP WIF (cloudrun path 用、宣言だけしておく)
  packages: read        # @ippoan/* GitHub Packages dep install (npm_scope 使用時)
                        # reusable workflow が permissions: を declare する場合、
                        # ここに無い権限は caller が宣言していても effective token
                        # から除外される (= deny by default)。Refs ippoan/ci-dashboard#152

jobs:
  # =========================================================================
  # dispatch: client_payload を parse + targets.yaml lookup
  # =========================================================================
  dispatch:
    name: Parse dispatch + lookup targets
    runs-on: ubuntu-latest
    outputs:
      event_type:           ${{ steps.parse.outputs.event_type }}
      wave_id:              ${{ steps.parse.outputs.wave_id }}
      target_tag:           ${{ steps.parse.outputs.target_tag }}
      head_sha:             ${{ steps.parse.outputs.head_sha }}
      platform:             ${{ steps.lookup.outputs.platform }}
      cf_worker_name:       ${{ steps.lookup.outputs.cf_worker_name }}
      cf_account_id:        ${{ steps.lookup.outputs.cf_account_id }}
      preview_hostname:     ${{ steps.lookup.outputs.preview_hostname }}
      gcp_project:          ${{ steps.lookup.outputs.gcp_project }}
      gcp_region:           ${{ steps.lookup.outputs.gcp_region }}
      services_json:        ${{ steps.lookup.outputs.services_json }}
      monorepo_units_json:  ${{ steps.lookup.outputs.monorepo_units_json }}
      install_command:      ${{ steps.lookup.outputs.install_command }}
      npm_scope:            ${{ steps.lookup.outputs.npm_scope }}
    steps:
      # client_payload は **attacker controllable** (= repository_dispatch
      # 経由で送られる任意 JSON)。env 経由で受けて parse + strict 形式検証する。
      #
      # 重要: head_sha / target_tag は後段で `actions/checkout` の `ref:` に
      # 渡るため、攻撃者が `;` `&` `..` などを混ぜると arbitrary code execution
      # に繋がり得る。**必ず**正規表現で形式検証してから output する。
      - name: Parse + validate client_payload
        id: parse
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          EVENT_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          # event_type は repository_dispatch の types[] から GitHub が
          # set する値なので任意ではないが、念のため allowlist check。
          case "$EVENT_ACTION" in
            release-wave-flip|release-wave-rollback) ;;
            # 単独 rollback (wave 非依存)。/release-wave の Traffic / Compatibility
            # UI から任意の過去 version / revision に即 100% で戻す。Refs
            # ippoan/ci-dashboard#196 / #197。target_tag は持たない場合がある。
            release-wave-traffic-rollback|release-wave-backend-rollback) ;;
            *)
              echo "::error::unknown event action: $EVENT_ACTION"
              exit 1 ;;
          esac
          echo "event_type=$EVENT_ACTION" >> "$GITHUB_OUTPUT"

          # jq で payload から各 field を取り出す。空 / 不在は空文字。
          wave_id=$(printf '%s' "$PAYLOAD"   | jq -r '.wave_id    // ""')
          target_tag=$(printf '%s' "$PAYLOAD" | jq -r '.target_tag // ""')
          head_sha=$(printf '%s' "$PAYLOAD"   | jq -r '.head_sha   // ""')

          # target_tag は単独 rollback 系では optional (戻し先 version/revision が
          # 主体で tag は表示用)。それ以外 (stage/flip/rollback) では必須。
          case "$EVENT_ACTION" in
            release-wave-traffic-rollback|release-wave-backend-rollback)
              if [[ -z "$wave_id" ]]; then
                echo "::error::client_payload missing required field (wave_id)"
                exit 1
              fi ;;
            *)
              if [[ -z "$wave_id" || -z "$target_tag" ]]; then
                echo "::error::client_payload missing required field (wave_id / target_tag)"
                exit 1
              fi ;;
          esac

          # ---- 形式検証 (ref injection 防止) ----
          # wave_id: 英数 + - + _ + . のみ、最大 128 文字
          if ! [[ "$wave_id" =~ ^[a-zA-Z0-9._-]{1,128}$ ]]; then
            echo "::error::wave_id has invalid format: must match ^[a-zA-Z0-9._-]{1,128}\$"
            exit 1
          fi
          # target_tag: semantic-version like (v?<digit/letter/.>+ で 64 文字以内)
          # `..` `/` `;` `&` `\$` `\`` `(` などを排除。空 (optional) はここを skip。
          if [[ -n "$target_tag" ]] && ! [[ "$target_tag" =~ ^v?[a-zA-Z0-9._-]{1,64}$ ]]; then
            echo "::error::target_tag has invalid format: must match ^v?[a-zA-Z0-9._-]{1,64}\$"
            exit 1
          fi
          # head_sha: 完全 40 char hex の git commit SHA
          # 空でも許容 (= optional)。指定された場合のみ厳密検証。
          if [[ -n "$head_sha" ]] && ! [[ "$head_sha" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::head_sha has invalid format: must match ^[a-f0-9]{7,40}\$"
            exit 1
          fi

          echo "wave_id=$wave_id"       >> "$GITHUB_OUTPUT"
          echo "target_tag=$target_tag" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha"     >> "$GITHUB_OUTPUT"

      # ci-workflows の config/release-wave-targets.yaml を sparse-checkout。
      # 同 repo 内 reusable だが、calling workflow context では他 path に
      # アクセスできないため明示 checkout が必要。
      - name: Fetch release-wave-targets.yaml
        uses: actions/checkout@v4
        with:
          repository: ippoan/ci-workflows
          ref: ${{ inputs.targets_yaml_ref }}
          path: _ci-workflows
          sparse-checkout: |
            config/release-wave-targets.yaml
          sparse-checkout-cone-mode: false

      - name: Install yq
        run: |
          set -euo pipefail
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      - name: Lookup target config for ${{ github.repository }}
        id: lookup
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CFG=_ci-workflows/config/release-wave-targets.yaml
          if [[ ! -f "$CFG" ]]; then
            echo "::error::missing $CFG"
            exit 1
          fi
          # entry が無ければ explicit fail (= 設定漏れを早期検知)
          if ! yq -e ".targets[\"$REPO\"]" "$CFG" >/dev/null; then
            echo "::error::$REPO is not registered in $CFG (add an entry first)"
            exit 1
          fi
          platform=$(yq ".targets[\"$REPO\"].platform // \"\"" "$CFG")
          echo "platform=$platform" >> "$GITHUB_OUTPUT"

          # ---- registration の完全性を強制 (silent no-op 防止) ----
          # platform が空 / 未知だと、後段の platform 別 job の `if:` が全て false に
          # なり、stage callback が一切飛ばず wave が staging のまま hang する
          # (= GitHub Actions run は緑なのに何も起きない silent failure)。
          # ここで明示 fail させて handler run を赤くし、設定漏れを loud に検出する。
          # platform 別の必須 field 欠落も同様に fail。Refs ippoan/ci-dashboard#174。
          case "$platform" in
            cloudflare-workers)
              cf_account_id_v=$(yq    ".targets[\"$REPO\"].cf_account_id  // \"\"" "$CFG")
              cf_worker_name_v=$(yq   ".targets[\"$REPO\"].cf_worker_name // \"\"" "$CFG")
              monorepo_units_v=$(yq -o=json -I0 ".targets[\"$REPO\"].monorepo_units // []" "$CFG")
              if [[ -z "$cf_account_id_v" ]]; then
                echo "::error::$REPO: platform=cloudflare-workers requires 'cf_account_id'"
                exit 1
              fi
              if [[ -z "$cf_worker_name_v" && "$monorepo_units_v" == "[]" ]]; then
                echo "::error::$REPO: cloudflare-workers requires 'cf_worker_name' or 'monorepo_units'"
                exit 1
              fi
              ;;
            cloudrun)
              gcp_project_v=$(yq ".targets[\"$REPO\"].gcp_project // \"\"" "$CFG")
              gcp_region_v=$(yq  ".targets[\"$REPO\"].gcp_region  // \"\"" "$CFG")
              services_v=$(yq -o=json -I0 ".targets[\"$REPO\"].services // []" "$CFG")
              if [[ -z "$gcp_project_v" || -z "$gcp_region_v" || "$services_v" == "[]" ]]; then
                echo "::error::$REPO: platform=cloudrun requires 'gcp_project', 'gcp_region', and non-empty 'services'"
                exit 1
              fi
              ;;
            "")
              echo "::error::$REPO: 'platform' is missing in $CFG (must be 'cloudflare-workers' or 'cloudrun')"
              exit 1
              ;;
            *)
              echo "::error::$REPO: unknown platform '$platform' (must be 'cloudflare-workers' or 'cloudrun')"
              exit 1
              ;;
          esac

          echo "cf_worker_name=$(yq      ".targets[\"$REPO\"].cf_worker_name   // \"\"" "$CFG")" >> "$GITHUB_OUTPUT"
          echo "cf_account_id=$(yq       ".targets[\"$REPO\"].cf_account_id    // \"\"" "$CFG")" >> "$GITHUB_OUTPUT"
          echo "preview_hostname=$(yq    ".targets[\"$REPO\"].preview_hostname // \"\"" "$CFG")" >> "$GITHUB_OUTPUT"
          echo "gcp_project=$(yq         ".targets[\"$REPO\"].gcp_project      // \"\"" "$CFG")" >> "$GITHUB_OUTPUT"
          echo "gcp_region=$(yq          ".targets[\"$REPO\"].gcp_region       // \"\"" "$CFG")" >> "$GITHUB_OUTPUT"
          # services / monorepo_units は JSON 配列で串刺し
          echo "services_json=$(yq -o=json -I0     ".targets[\"$REPO\"].services       // []" "$CFG")" >> "$GITHUB_OUTPUT"
          echo "monorepo_units_json=$(yq -o=json -I0 ".targets[\"$REPO\"].monorepo_units // []" "$CFG")" >> "$GITHUB_OUTPUT"
          # per-repo install command
          # (default 'npm install --no-audit --no-fund --ignore-scripts')。
          # 既定を npm install (寛容) にする: stage/flip/rollback は wrangler を動かす
          # だけで strict な再現性は不要な一方、消費 repo は自分の CI で `npm install`
          # を使い lockfile を strict 同期しない運用が多く、handler だけ `npm ci`
          # (strict) だと lockfile drift で即失敗していた (Refs ippoan/ci-dashboard#237)。
          # `--ignore-scripts` 必須: 本 job は CLOUDFLARE_API_TOKEN /
          # RELEASE_WAVE_GCP_API_KEY 等の deploy secret を持つため、npm install が
          # lockfile drift で resolve する未固定 transitive dep の postinstall script
          # が secret 環境で任意実行されるのを防ぐ (supply-chain hardening)。flip /
          # rollback は `wrangler versions deploy` を動かすだけで postinstall 不要。
          # build に postinstall が要る repo は targets.yaml で install_command を明示。
          # strict にしたい repo は install_command: 'npm ci' を指定。
          # config は ci-workflows committer が管理する trusted input。
          # `-r` (raw) で quote を剥がす → bash -c に直接渡せる文字列にする。
          echo "install_command=$(yq -r ".targets[\"$REPO\"].install_command // \"npm install --no-audit --no-fund --ignore-scripts\"" "$CFG")" >> "$GITHUB_OUTPUT"
          # npm_scope (e.g. @ippoan) を渡すと setup-node が
          # registry-url=https://npm.pkg.github.com + scope を .npmrc に書く。
          # NODE_AUTH_TOKEN=secrets.GITHUB_TOKEN で GitHub Packages 認証。
          # default 空文字列 = scope 設定無し (= public registry のみ)。
          echo "npm_scope=$(yq -r ".targets[\"$REPO\"].npm_scope // \"\"" "$CFG")" >> "$GITHUB_OUTPUT"

  # =========================================================================
  # flip (cloudflare-workers): wrangler versions deploy --percentage 100
  # =========================================================================
  flip-cloudflare-workers:
    name: Flip (cloudflare-workers)
    needs: dispatch
    if: needs.dispatch.outputs.event_type == 'release-wave-flip' && needs.dispatch.outputs.platform == 'cloudflare-workers'
    runs-on: ubuntu-latest
    steps:
      # head_sha を checkout (release-wave は v* tag を打たないため、stage と同じ
      # immutable ref を使う)。flip 自体は previewed_version_id を直接 deploy する
      # ので、この checkout は wrangler.toml / deps を置くためだけ。Refs #174。
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.dispatch.outputs.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # npm_scope (e.g. @ippoan) があれば GitHub Packages を registry に
          # 設定。NODE_AUTH_TOKEN を expose する .npmrc が actions/setup-node
          # 側で生成される。
          registry-url: ${{ needs.dispatch.outputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ needs.dispatch.outputs.npm_scope }}

      - name: Install deps
        env:
          INSTALL_CMD: ${{ needs.dispatch.outputs.install_command }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash -c "$INSTALL_CMD"

      # stage で preview した version (previewed_version_id) を 100% traffic へ
      # flip する。これで「preview で検証したまさにその version」が production
      # になる (= flip 時に別途 deploy し直さない)。Refs ippoan/ci-dashboard#174。
      #
      # client_payload.previewed_version_id は untrusted input なので env 経由で
      # 受けて UUID 形式を検証してから wrangler に渡す (= command injection 防止)。
      - name: wrangler versions deploy (flip to previewed version)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ needs.dispatch.outputs.cf_account_id }}
          PREVIEWED_VERSION_ID: ${{ github.event.client_payload.previewed_version_id }}
        run: |
          set -euo pipefail
          VID="${PREVIEWED_VERSION_ID:-}"
          if [[ -n "$VID" ]]; then
            if ! [[ "$VID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
              echo "::error::previewed_version_id has invalid format (expected UUID)"
              exit 1
            fi
            echo "flipping 100% traffic to previewed version $VID"
            npx wrangler versions deploy "${VID}@100%" --yes
          else
            # 後方互換: previewed_version_id 不在 (旧 dispatcher / 単独 release) は
            # 従来どおり現コードを deploy して flip する。
            echo "::warning::no previewed_version_id in payload; falling back to 'wrangler deploy'"
            npx wrangler deploy
          fi

      # flip 後の version traffic split を ci-dashboard に報告し、Traffic 表示を
      # 実機 (Cloudflare) に追従させる。UI 駆動 flip (flip-all / 単一 Flip) では
      # frontend-ci の deploy job を通らず traffic-report が来ないため、ここで送る。
      # best-effort (flip は成功済みなので報告失敗で job を fail させない)。
      # Refs ippoan/ci-dashboard#237。
      - name: Report version traffic split
        uses: ippoan/ci-workflows/.github/actions/report-traffic-split@main
        with:
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ needs.dispatch.outputs.cf_account_id }}
          ci_dashboard_base_url: ${{ inputs.callback_base_url }}
          webhook_secret: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
          repo: ${{ github.repository }}
          uploaded_version_id: ${{ github.event.client_payload.previewed_version_id }}
          tag: ${{ needs.dispatch.outputs.target_tag }}

      # pending_release flip (= 単独リリースの Flip ボタン経由) には対応する
      # wave が無いので flip-report を送らない (NOT_FOUND になるだけ)。
      # Refs ippoan/ci-dashboard#181。
      - name: Callback flip-report
        if: github.event.client_payload.pending_release != true
        env:
          WAVE_ID: ${{ needs.dispatch.outputs.wave_id }}
          REPO: ${{ github.repository }}
          CALLBACK: ${{ inputs.callback_base_url }}
          WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg wave_id "$WAVE_ID" --arg repo "$REPO" \
            '{wave_id: $wave_id, repo: $repo, ok: true}')
          curl -fsS -X POST "$CALLBACK/webhooks/release-wave/flip-report" \
            -H "X-Release-Wave-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload"

      # flip 成功 = この backend の現 production image が target_tag になった。
      # compatibility matrix の基準 (backend::<repo>.current_image) を更新する。
      # (Refs ippoan/ci-dashboard#157 — backend deploy report)
      - name: Report backend deploy (compatibility)
        uses: ippoan/ci-workflows/.github/actions/report-backend-deploy@main
        with:
          ci_dashboard_base_url: ${{ inputs.callback_base_url }}
          repo: ${{ github.repository }}
          current_image: ${{ needs.dispatch.outputs.target_tag }}
          current_tag: ${{ needs.dispatch.outputs.target_tag }}
          deployed_by: release-wave
          wave_id: ${{ needs.dispatch.outputs.wave_id }}
          webhook_secret: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}

      - name: Callback flip-report (on failure)
        if: failure() && github.event.client_payload.pending_release != true
        env:
          WAVE_ID: ${{ needs.dispatch.outputs.wave_id }}
          REPO: ${{ github.repository }}
          CALLBACK: ${{ inputs.callback_base_url }}
          WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg wave_id "$WAVE_ID" --arg repo "$REPO" \
            --arg error "flip job failed; see Actions log" \
            '{wave_id: $wave_id, repo: $repo, ok: false, error: $error}')
          curl -fsS -X POST "$CALLBACK/webhooks/release-wave/flip-report" \
            -H "X-Release-Wave-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || true

  # =========================================================================
  # rollback (cloudflare-workers): wrangler rollback
  # =========================================================================
  rollback-cloudflare-workers:
    name: Rollback (cloudflare-workers)
    needs: dispatch
    if: needs.dispatch.outputs.event_type == 'release-wave-rollback' && needs.dispatch.outputs.platform == 'cloudflare-workers'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.dispatch.outputs.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # npm_scope (e.g. @ippoan) があれば GitHub Packages を registry に
          # 設定。NODE_AUTH_TOKEN を expose する .npmrc が actions/setup-node
          # 側で生成される。
          registry-url: ${{ needs.dispatch.outputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ needs.dispatch.outputs.npm_scope }}

      - name: Install deps
        env:
          INSTALL_CMD: ${{ needs.dispatch.outputs.install_command }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash -c "$INSTALL_CMD"

      # flip_from_revision (= stage 時に控えた flip 前 active version) へ
      # traffic を戻す。stage 側で取得できていれば明示的にその version を
      # 100% へ deploy する。取得できていなければ wrangler 既定の rollback。
      # client_payload.flip_from_revision は untrusted なので env 経由 + 形式検証。
      - name: wrangler rollback (deploy previous version 100%)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ needs.dispatch.outputs.cf_account_id }}
          FLIP_FROM_REVISION: ${{ github.event.client_payload.flip_from_revision }}
        run: |
          set -euo pipefail
          VID="${FLIP_FROM_REVISION:-}"
          if [[ -n "$VID" ]] && [[ "$VID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo "rolling back: deploy previous version $VID @100%"
            npx wrangler versions deploy "${VID}@100%" --yes
          else
            # flip_from_revision が無い / 形式不一致なら wrangler 既定の rollback
            # (= 直近に deploy した version を前 version に戻す)。
            echo "::warning::no valid flip_from_revision; falling back to 'wrangler rollback'"
            npx wrangler rollback
          fi

      # rollback 後の traffic split を ci-dashboard に報告 (Traffic 表示を実機に追従)。
      # Refs ippoan/ci-dashboard#237。
      - name: Report version traffic split
        uses: ippoan/ci-workflows/.github/actions/report-traffic-split@main
        with:
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ needs.dispatch.outputs.cf_account_id }}
          ci_dashboard_base_url: ${{ inputs.callback_base_url }}
          webhook_secret: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
          repo: ${{ github.repository }}
          uploaded_version_id: ${{ github.event.client_payload.flip_from_revision }}
          tag: ${{ needs.dispatch.outputs.target_tag }}

      # rollback 完了 callback は現状 state machine に無い (= release_wave_rollback
      # MCP tool が caller-driven で wave state を rolled-back に進める設計)。
      # 進捗確認のため別途 ci-dashboard を更新する想定。

  # =========================================================================
  # traffic-rollback (cloudflare-workers): 任意の過去 version へ即 100% で戻す
  #
  # /release-wave の Traffic テーブル「Rollback to <tag>」が dispatch する
  # release-wave-traffic-rollback event を受ける。wave 非依存 (= callback 無し)。
  # previewed_version_id (= 戻し先 version id) を 100% traffic に flip する。
  # Refs ippoan/ci-dashboard#196。
  # =========================================================================
  traffic-rollback-cloudflare-workers:
    name: Traffic rollback (cloudflare-workers)
    needs: dispatch
    if: needs.dispatch.outputs.event_type == 'release-wave-traffic-rollback' && needs.dispatch.outputs.platform == 'cloudflare-workers'
    runs-on: ubuntu-latest
    steps:
      # head_sha は空 (rollback は version id 直接 deploy)。checkout は
      # wrangler.toml / deps を置くため main を取る。
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: ${{ needs.dispatch.outputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ needs.dispatch.outputs.npm_scope }}

      - name: Install deps
        env:
          INSTALL_CMD: ${{ needs.dispatch.outputs.install_command }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash -c "$INSTALL_CMD"

      # client_payload.previewed_version_id は untrusted。env 経由 + UUID 形式検証
      # してから wrangler に渡す (command injection 防止)。
      - name: wrangler versions deploy (rollback to selected version)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ needs.dispatch.outputs.cf_account_id }}
          PREVIEWED_VERSION_ID: ${{ github.event.client_payload.previewed_version_id }}
        run: |
          set -euo pipefail
          VID="${PREVIEWED_VERSION_ID:-}"
          if ! [[ "$VID" =~ ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$ ]]; then
            echo "::error::previewed_version_id has invalid format (expected UUID)"
            exit 1
          fi
          echo "traffic rollback: deploy version $VID @100%"
          npx wrangler versions deploy "${VID}@100%" --yes

      # rollback 後の traffic split を ci-dashboard に報告 (Traffic 表示を実機に追従)。
      # Refs ippoan/ci-dashboard#237。
      - name: Report version traffic split
        uses: ippoan/ci-workflows/.github/actions/report-traffic-split@main
        with:
          cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare_account_id: ${{ needs.dispatch.outputs.cf_account_id }}
          ci_dashboard_base_url: ${{ inputs.callback_base_url }}
          webhook_secret: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
          repo: ${{ github.repository }}
          uploaded_version_id: ${{ github.event.client_payload.previewed_version_id }}
          tag: ${{ needs.dispatch.outputs.target_tag }}

  # =========================================================================
  # Cloud Run path (Phase 4c)
  #
  # Stage 段は ci-workflows#96② で撤去した。no-traffic revision の用意は repo 側
  # deploy.yml (tag push で --no-traffic --tag pending-<...> deploy) + frontend-ci
  # 相当の pending-release 報告に一本化する。
  #
  # Flip / Rollback は release-wave-gcp Cloud Run proxy を経由して
  # gcloud run services update-traffic 等価操作を行う。各 service に対して
  # matrix で並列実行し、全 service 完了後に callback。
  # =========================================================================

  # ---- Flip (cloudrun): matrix で services[] 並列 ----
  flip-cloudrun:
    name: Flip (cloudrun) [${{ matrix.service }}]
    needs: dispatch
    if: needs.dispatch.outputs.event_type == 'release-wave-flip' && needs.dispatch.outputs.platform == 'cloudrun'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 1 service 失敗で全 cancel しない
      matrix:
        service: ${{ fromJSON(needs.dispatch.outputs.services_json) }}
    steps:
      - name: Sanitize tag for revision tag
        id: sanitize
        env:
          TARGET_TAG: ${{ needs.dispatch.outputs.target_tag }}
        run: |
          set -euo pipefail
          # Cloud Run revision tag は `[a-z0-9-]{1,63}` 制約 (lowercase only)。
          # target_tag (e.g. v1.42.0) を `pending-v1-42-0` 形に変換する。
          sanitized=$(printf '%s' "$TARGET_TAG" | tr 'A-Z' 'a-z' | tr '.' '-')
          echo "tag=pending-${sanitized}" >> "$GITHUB_OUTPUT"

      - name: Call release-wave-gcp /cloudrun/flip-traffic
        env:
          GCP_PROJECT: ${{ needs.dispatch.outputs.gcp_project }}
          GCP_REGION: ${{ needs.dispatch.outputs.gcp_region }}
          SERVICE: ${{ matrix.service }}
          TO_TAG: ${{ steps.sanitize.outputs.tag }}
          GCP_BASE: ${{ inputs.release_wave_gcp_base_url }}
          GCP_API_KEY: ${{ secrets.RELEASE_WAVE_GCP_API_KEY }}
        run: |
          set -euo pipefail
          body=$(jq -nc \
            --arg project "$GCP_PROJECT" \
            --arg region "$GCP_REGION" \
            --arg service "$SERVICE" \
            --arg to_revision_tag "$TO_TAG" \
            '{project: $project, region: $region, service: $service,
              to_revision_tag: $to_revision_tag}')
          curl -fsS -X POST "$GCP_BASE/cloudrun/flip-traffic" \
            -H "X-Release-Wave-API-Key: $GCP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$body"

  # ---- Flip callback (cloudrun): 全 service 完了後に 1 度だけ呼ぶ ----
  flip-cloudrun-callback:
    name: Flip callback (cloudrun)
    needs: [dispatch, flip-cloudrun]
    if: |
      always() &&
      needs.dispatch.outputs.event_type == 'release-wave-flip' &&
      needs.dispatch.outputs.platform == 'cloudrun'
    runs-on: ubuntu-latest
    steps:
      # pending_release flip (= Pending releases の Flip / Flip all 経由) には
      # 対応する wave が無いので flip-report を送らない (NOT_FOUND で 404 → curl
      # -fsS が fail し callback job が赤くなる)。cf-workers の flip-report と同じ
      # ガード。Refs ippoan/ci-dashboard#181 / #237。
      - name: Callback flip-report
        if: github.event.client_payload.pending_release != true
        env:
          WAVE_ID: ${{ needs.dispatch.outputs.wave_id }}
          REPO: ${{ github.repository }}
          CALLBACK: ${{ inputs.callback_base_url }}
          WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
          MATRIX_RESULT: ${{ needs.flip-cloudrun.result }}
        run: |
          set -euo pipefail
          if [[ "$MATRIX_RESULT" == "success" ]]; then
            payload=$(jq -nc \
              --arg wave_id "$WAVE_ID" --arg repo "$REPO" \
              '{wave_id: $wave_id, repo: $repo, ok: true}')
          else
            payload=$(jq -nc \
              --arg wave_id "$WAVE_ID" --arg repo "$REPO" \
              --arg error "cloudrun flip matrix result=$MATRIX_RESULT" \
              '{wave_id: $wave_id, repo: $repo, ok: false, error: $error}')
          fi
          curl -fsS -X POST "$CALLBACK/webhooks/release-wave/flip-report" \
            -H "X-Release-Wave-Webhook-Secret: $WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload"

      # 全 service の flip が成功した時のみ、現 production image を target_tag に
      # 更新する。matrix 失敗時 (= 一部 service が旧 revision のまま) は記録しない。
      # (Refs ippoan/ci-dashboard#157 — backend deploy report)
      - name: Report backend deploy (compatibility)
        if: needs.flip-cloudrun.result == 'success'
        uses: ippoan/ci-workflows/.github/actions/report-backend-deploy@main
        with:
          ci_dashboard_base_url: ${{ inputs.callback_base_url }}
          repo: ${{ github.repository }}
          current_image: ${{ needs.dispatch.outputs.target_tag }}
          current_tag: ${{ needs.dispatch.outputs.target_tag }}
          deployed_by: release-wave-gcp
          wave_id: ${{ needs.dispatch.outputs.wave_id }}
          webhook_secret: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}

  # ---- Rollback (cloudrun): matrix で services[] 並列 ----
  rollback-cloudrun:
    name: Rollback (cloudrun) [${{ matrix.service }}]
    needs: dispatch
    if: needs.dispatch.outputs.event_type == 'release-wave-rollback' && needs.dispatch.outputs.platform == 'cloudrun'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.dispatch.outputs.services_json) }}
    steps:
      # rollback の戻し先 revision は client_payload.rollback_target.<service>
      # で受け取る想定 (= ci-dashboard 側 dispatcher 実装時に決定)。
      # 現状未実装なので env で固定し、見つからなければ "latest-stable" を
      # 文字列で渡す (release-wave-gcp 側で validate)。
      - name: Resolve rollback target revision
        id: target
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          to_revision=$(printf '%s' "$PAYLOAD" \
            | jq -r --arg s "$SERVICE" '.rollback_target[$s] // ""')
          if [[ -z "$to_revision" ]]; then
            echo "::error::rollback target for $SERVICE missing in client_payload.rollback_target"
            exit 1
          fi
          # short-form / full-form 両許可。形式検証: lowercase + digit + - のみ。
          if ! [[ "$to_revision" =~ ^[a-z0-9-]{1,256}$ ]]; then
            echo "::error::to_revision for $SERVICE has invalid format"
            exit 1
          fi
          echo "to_revision=$to_revision" >> "$GITHUB_OUTPUT"

      - name: Call release-wave-gcp /cloudrun/rollback
        env:
          GCP_PROJECT: ${{ needs.dispatch.outputs.gcp_project }}
          GCP_REGION: ${{ needs.dispatch.outputs.gcp_region }}
          SERVICE: ${{ matrix.service }}
          TO_REVISION: ${{ steps.target.outputs.to_revision }}
          GCP_BASE: ${{ inputs.release_wave_gcp_base_url }}
          GCP_API_KEY: ${{ secrets.RELEASE_WAVE_GCP_API_KEY }}
        run: |
          set -euo pipefail
          body=$(jq -nc \
            --arg project "$GCP_PROJECT" \
            --arg region "$GCP_REGION" \
            --arg service "$SERVICE" \
            --arg to_revision "$TO_REVISION" \
            '{project: $project, region: $region, service: $service,
              to_revision: $to_revision}')
          curl -fsS -X POST "$GCP_BASE/cloudrun/rollback" \
            -H "X-Release-Wave-API-Key: $GCP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$body"
      # rollback callback は state machine 上は無いため省略 (= release_wave_rollback
      # MCP tool が caller-driven で state を rolled-back に進めた後、本 job が
      # 副作用として実 traffic 戻しを行う構造)。

  # =========================================================================
  # backend-rollback (cloudrun): 任意の過去 revision へ即 100% で戻す
  #
  # /release-wave の「Backend rollback (Cloud Run revision)」が dispatch する
  # release-wave-backend-rollback event を受ける。wave 非依存 (= callback 無し)。
  # 戻し先 revision は client_payload.rollback_target[<service>]、無ければ
  # client_payload.rollback_revision (単一値 fallback)。Refs ippoan/ci-dashboard#197。
  # =========================================================================
  backend-rollback-cloudrun:
    name: Backend rollback (cloudrun) [${{ matrix.service }}]
    needs: dispatch
    if: needs.dispatch.outputs.event_type == 'release-wave-backend-rollback' && needs.dispatch.outputs.platform == 'cloudrun'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.dispatch.outputs.services_json) }}
    steps:
      # client_payload.* は untrusted。env 経由 + jq 抽出 + 形式検証してから渡す。
      - name: Resolve rollback target revision
        id: target
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          # service 別の戻し先を優先、無ければ単一値 rollback_revision に fallback。
          to_revision=$(printf '%s' "$PAYLOAD" \
            | jq -r --arg s "$SERVICE" '.rollback_target[$s] // .rollback_revision // ""')
          if [[ -z "$to_revision" ]]; then
            echo "::error::no rollback target for $SERVICE (rollback_target[$SERVICE] / rollback_revision both empty)"
            exit 1
          fi
          if ! [[ "$to_revision" =~ ^[a-z0-9-]{1,256}$ ]]; then
            echo "::error::to_revision for $SERVICE has invalid format"
            exit 1
          fi
          echo "to_revision=$to_revision" >> "$GITHUB_OUTPUT"

      - name: Call release-wave-gcp /cloudrun/rollback
        env:
          GCP_PROJECT: ${{ needs.dispatch.outputs.gcp_project }}
          GCP_REGION: ${{ needs.dispatch.outputs.gcp_region }}
          SERVICE: ${{ matrix.service }}
          TO_REVISION: ${{ steps.target.outputs.to_revision }}
          GCP_BASE: ${{ inputs.release_wave_gcp_base_url }}
          GCP_API_KEY: ${{ secrets.RELEASE_WAVE_GCP_API_KEY }}
        run: |
          set -euo pipefail
          body=$(jq -nc \
            --arg project "$GCP_PROJECT" \
            --arg region "$GCP_REGION" \
            --arg service "$SERVICE" \
            --arg to_revision "$TO_REVISION" \
            '{project: $project, region: $region, service: $service,
              to_revision: $to_revision}')
          curl -fsS -X POST "$GCP_BASE/cloudrun/rollback" \
            -H "X-Release-Wave-API-Key: $GCP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$body"
