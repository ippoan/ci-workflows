name: Branch Protection

# Reusable workflow that applies branch protection to a configurable branch
# via the GitHub Branches API. Generalised from the original
# yhonda-ohishi/claude-hooks `branch-protection.yml` so every consumer repo
# can describe its protection policy declaratively in a thin caller and stay
# in sync with policy changes that land here.
#
# # Why a PAT secret instead of `GITHUB_TOKEN` + `permissions: administration`
#
# `administration` is NOT a supported scope of the `GITHUB_TOKEN` permissions
# block. The official scope list is `actions / attestations / checks /
# contents / deployments / discussions / id-token / issues / models /
# packages / pages / pull-requests / repository-projects / security-events /
# statuses` (https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token).
# Confusingly there IS a fine-grained PAT repository permission called
# "Administration" (which the Branches Protection API requires), but it
# cannot be minted into `GITHUB_TOKEN`.
#
# Declaring `administration: write` at the workflow `permissions:` block
# parses fine but fails authorization at registration time, which GitHub
# records as a 0-job failure run on every push to any branch (see #23).
# That is a separate phenomenon from actions/runner#4001 (the
# `workflow_dispatch` + push event evaluator bug PR #14/#24 wrestled with):
# the `administration:` phantom happens even after `workflow_dispatch` is
# dropped and even on commits that do not touch the workflow file.
#
# This file therefore requires the caller to provide a
# `TAG_RELEASE_PAT` secret — a fine-grained PAT or GitHub App
# installation token with the target repo's "Administration: write" +
# "Contents: read" repository permissions. The `permissions:` block here
# only declares scopes that `GITHUB_TOKEN` actually supports.
#
# Self-apply lives in the sibling caller `branch-protection-self.yml`.
#
# Typical caller (drops into a consumer repo's
# `.github/workflows/branch-protection.yml`):
#
#   name: branch-protection
#   on:
#     workflow_dispatch:
#     push:
#       branches: [main]
#   permissions:
#     contents: read
#   jobs:
#     apply:
#       uses: ippoan/ci-workflows/.github/workflows/branch-protection.yml@main
#       with:
#         branch: main
#         required_checks: |
#           ci / rustfmt
#           ci / clippy
#           ci / cargo test
#           ci / cargo build --release
#       secrets:
#         TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
#
# # Migration from the pre-#23 `GITHUB_TOKEN` flow
#
# Consumers previously called this reusable with `secrets: inherit` (or no
# `secrets:` block) and `permissions: { contents: read, administration:
# write }`. To migrate:
#   1. Mint a fine-grained PAT (account- or org-bot owned) with the target
#      repo's "Administration: write" + "Contents: read" repository
#      permissions. GitHub App installation tokens via
#      `actions/create-github-app-token` work too.
#   2. Save it as a `TAG_RELEASE_PAT` repo (or org) secret in the
#      consumer repo.
#   3. Update the consumer's caller to drop `administration: write` from
#      `permissions:` and pass `TAG_RELEASE_PAT` via `secrets:`.
#
# Until step 2 + 3 land, the consumer's caller will fail at runtime with
# a 403 from the Branches API. `actionlint`'s ignore flag for
# `unknown permission scope "administration"` in this repo's `ci.yml` is
# no longer required after this change and can be dropped in a follow-up.

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to protect (e.g. main, master)'
        type: string
        required: true
      required_checks:
        description: |
          Newline-separated required status check contexts.
          Example:
            ci / rustfmt
            ci / clippy
          Pass an empty string to require no status checks (still enforces
          force-push / deletion / conversation-resolution gates).
        type: string
        required: false
        default: ''
      strict_required_checks:
        description: 'Require branches to be up to date before merging'
        type: boolean
        required: false
        default: true
      enforce_admins:
        description: 'Also enforce protection for admins (set false to let admins bypass)'
        type: boolean
        required: false
        default: true
      required_conversation_resolution:
        description: 'Block merge until all review threads are resolved'
        type: boolean
        required: false
        default: true
      allow_force_pushes:
        description: 'Allow force pushes to the protected branch'
        type: boolean
        required: false
        default: false
      allow_deletions:
        description: 'Allow the protected branch to be deleted'
        type: boolean
        required: false
        default: false
      required_linear_history:
        description: 'Require linear history (no merge commits)'
        type: boolean
        required: false
        default: false
    secrets:
      TAG_RELEASE_PAT:
        description: |
          Fine-grained PAT (or GitHub App installation token) with the
          target repo's "Administration: write" + "Contents: read"
          repository permissions. `GITHUB_TOKEN` cannot be used because
          `administration` is not a supported `GITHUB_TOKEN` scope — see
          the comment block at the top of this file.

          Reuses the existing `TAG_RELEASE_PAT` secret already provisioned
          for the `tag-release.yml` / `dev-tag-release.yml` reusables, so
          consumers that already publish releases through ci-workflows do
          not need to mint a separate PAT for branch protection. The PAT
          does need to be extended with the "Administration: write"
          permission on every target repo if it is not already there.
        required: true

jobs:
  apply:
    name: Apply branch protection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Apply branch protection on ${{ inputs.branch }}
        env:
          GH_TOKEN: ${{ secrets.TAG_RELEASE_PAT }}
          BRANCH: ${{ inputs.branch }}
          REQUIRED_CHECKS: ${{ inputs.required_checks }}
          STRICT: ${{ inputs.strict_required_checks }}
          ENFORCE_ADMINS: ${{ inputs.enforce_admins }}
          REQ_CONVO: ${{ inputs.required_conversation_resolution }}
          ALLOW_FORCE: ${{ inputs.allow_force_pushes }}
          ALLOW_DELETE: ${{ inputs.allow_deletions }}
          LINEAR: ${{ inputs.required_linear_history }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Build the required_status_checks block dynamically. The Branches
          # API rejects an empty contexts[] array, so when the caller passes
          # no checks we omit the entire block by sending an explicit null.
          ARGS=()
          if [ -n "${REQUIRED_CHECKS// /}" ]; then
            ARGS+=( -F "required_status_checks[strict]=${STRICT}" )
            while IFS= read -r line; do
              line="${line#"${line%%[![:space:]]*}"}"
              line="${line%"${line##*[![:space:]]}"}"
              [ -z "$line" ] && continue
              ARGS+=( -F "required_status_checks[contexts][]=${line}" )
            done <<< "${REQUIRED_CHECKS}"
          else
            ARGS+=( -f "required_status_checks=" )
          fi

          ARGS+=(
            -F "enforce_admins=${ENFORCE_ADMINS}"
            -f "required_pull_request_reviews="
            -f "restrictions="
            -F "required_linear_history=${LINEAR}"
            -F "allow_force_pushes=${ALLOW_FORCE}"
            -F "allow_deletions=${ALLOW_DELETE}"
            -F "required_conversation_resolution=${REQ_CONVO}"
          )

          echo "Applying branch protection to $REPO@$BRANCH"
          gh api -X PUT \
            "repos/$REPO/branches/$BRANCH/protection" \
            -H "Accept: application/vnd.github+json" \
            "${ARGS[@]}"

          echo "::notice::Branch protection applied on $REPO@$BRANCH"
