name: Frontend CI

on:
  workflow_call:
    inputs:
      working_directory:
        description: Working directory for npm commands (e.g. "web" for monorepos)
        type: string
        default: '.'
      node_version:
        description: Node.js version
        type: string
        default: '24'
      install_command:
        description: Command to install dependencies
        type: string
        default: 'npm ci'
      has_tests:
        description: Whether to run the test job
        type: boolean
        default: true
      has_integration:
        description: Whether to run the integration test job
        type: boolean
        default: false
      typecheck_command:
        description: Type check command (e.g. "npx nuxi typecheck" or "npx tsc --noEmit")
        type: string
        default: 'npx nuxi typecheck'
      pre_install_script:
        description: Script to run before npm install (e.g. stub local dependencies)
        type: string
        default: ''
      post_install_script:
        description: Script to run after npm install (e.g. "npx nuxt prepare", "npx wrangler types")
        type: string
        default: ''
      use_auth_client_dev:
        description: Whether to use the auth-client dev action
        type: boolean
        default: false
      test_command:
        description: Test command
        type: string
        default: 'npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json'
      deploy_on_tag:
        description: Deploy release on v* tags instead of main push
        type: boolean
        default: false
      deploy_staging_script:
        description: Full script for staging deploy (build + deploy)
        type: string
        default: 'npm run build && npx wrangler deploy --env staging'
      deploy_release_script:
        description: Full script for release deploy (build + deploy)
        type: string
        default: 'npm run build && npx wrangler deploy'
      integration_compose_file:
        description: Docker Compose file for integration tests
        type: string
        default: 'docker-compose.test.yml'
      integration_test_command:
        description: Integration test command
        type: string
        default: 'npx vitest run'
      integration_env:
        description: 'Space-separated KEY=VALUE pairs for integration test env (e.g. "TEST_LIVE=1 API_BASE_URL=http://localhost:18080")'
        type: string
        default: ''
      npm_scope:
        description: 'npm scope for GitHub Packages registry (e.g. "@ippoan")'
        type: string
        default: ''
      cache_dependency_path:
        description: Path to package-lock.json for npm cache (e.g. "web/package-lock.json")
        type: string
        default: ''
      has_deploy:
        description: Whether to run deploy jobs
        type: boolean
        default: true

jobs:
  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/ci-workflows/.github/actions/pr-limit@main

  test:
    name: Vitest + Coverage
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_tests &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped') &&
      !(inputs.deploy_on_tag && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests with coverage
        run: ${{ inputs.test_command }}

      - name: Coverage 100% regression check
        if: always() && hashFiles(format('{0}/scripts/check_coverage_100.mjs', inputs.working_directory)) != ''
        run: node scripts/check_coverage_100.mjs

      - name: Job Summary
        if: always()
        run: |
          echo "## Vitest Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test results summary (vitest json reporter)
          if [ -f coverage/test-results.json ]; then
            node -e "
              const s = require('./coverage/test-results.json');
              const suites = s.numTotalTestSuites || 0;
              const passed = s.numPassedTestSuites || 0;
              const tests = s.numTotalTests || 0;
              const testsPassed = s.numPassedTests || 0;
              const failed = s.numFailedTests || 0;
              console.log('### Summary');
              console.log('- Test Files: ' + (failed === 0 ? '✅' : '❌') + ' ' + passed + ' passes · ' + suites + ' total');
              console.log('- Test Results: ' + (failed === 0 ? '✅' : '❌') + ' ' + testsPassed + ' passes · ' + tests + ' total');
              if (failed > 0) console.log('- ❌ ' + failed + ' failed');
            " >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage section (coverage-summary.json or coverage-final.json fallback)
          if [ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const cwd = process.cwd();
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');

              let summary;
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = { total: { statements: {pct:0}, branches: {pct:0}, functions: {pct:0}, lines: {pct:0} } };
                let tS=0,cS=0, tB=0,cB=0, tF=0,cF=0, tL=0,cL=0;
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s||{}, b = fc.b||{}, f = fc.f||{};
                  let fS=0,fCS=0, fB=0,fCB=0, fF=0,fCF=0;
                  for (const k of Object.keys(s)) { fS++; if(s[k]>0) fCS++; }
                  for (const k of Object.keys(b)) { for(const c of b[k]) { fB++; if(c>0) fCB++; } }
                  for (const k of Object.keys(f)) { fF++; if(f[k]>0) fCF++; }
                  tS+=fS; cS+=fCS; tB+=fB; cB+=fCB; tF+=fF; cF+=fCF;
                  tL+=fS; cL+=fCS;
                  const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                  summary[fp] = {
                    statements:{pct:pct(fS,fCS)}, branches:{pct:pct(fB,fCB)},
                    functions:{pct:pct(fF,fCF)}, lines:{pct:pct(fS,fCS)}
                  };
                }
                const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                summary.total = {
                  statements:{pct:pct(tS,cS)}, branches:{pct:pct(tB,cB)},
                  functions:{pct:pct(tF,cF)}, lines:{pct:pct(tL,cL)}
                };
              }

              const t = summary.total;
              const out = [];
              out.push('### Coverage');
              out.push('');
              out.push('| Category | Stmts | Branch | Funcs | Lines |');
              out.push('|----------|-------|--------|-------|-------|');
              out.push('| **Total** | '+t.statements.pct+'% | '+t.branches.pct+'% | '+t.functions.pct+'% | '+t.lines.pct+'% |');
              out.push('');
              const files = Object.keys(summary).filter(k => k !== 'total');
              const full = files.filter(k => summary[k].lines.pct === 100);
              out.push('**Lines 100%:** '+full.length+' / '+files.length+' files');
              out.push('');
              out.push('<details><summary>Lines &lt; 100% ファイル一覧</summary>');
              out.push('');
              out.push('| File | Stmts | Branch | Funcs | Lines |');
              out.push('|------|-------|--------|-------|-------|');
              for (const k of files) {
                const e = summary[k];
                if (e.lines.pct < 100) {
                  const rel = path.relative(cwd, k);
                  out.push('| '+rel+' | '+e.statements.pct+'% | '+e.branches.pct+'% | '+e.functions.pct+'% | '+e.lines.pct+'% |');
                }
              }
              out.push('');
              out.push('</details>');
              console.log(out.join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          fi

          # coverage_100.toml registered files status
          if [ -f coverage_100.toml ] && ([ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]); then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage 100% Files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const path = require('path');
              const toml = fs.readFileSync('coverage_100.toml', 'utf8');
              const cwd = process.cwd();

              let summary;
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = {};
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s || {};
                  let lT = 0, lC = 0;
                  for (const k of Object.keys(s)) { lT++; if (s[k] > 0) lC++; }
                  const b = fc.b || {};
                  let bT = 0, bC = 0;
                  for (const k of Object.keys(b)) { for (const c of b[k]) { bT++; if (c > 0) bC++; } }
                  summary[fp] = {
                    lines: { pct: lT === 0 ? 100 : (lC / lT) * 100 },
                    branches: { pct: bT === 0 ? 100 : (bC / bT) * 100 },
                  };
                }
              }

              const entries = [];
              let cur = null;
              for (const line of toml.split('\n')) {
                if (line.trim() === '[[files]]') { cur = { path: '', branches: false }; entries.push(cur); continue; }
                if (!cur) continue;
                const pm = line.match(/^path\s*=\s*\"(.+)\"/);
                if (pm) cur.path = pm[1];
                const bm = line.match(/^branches\s*=\s*true/);
                if (bm) cur.branches = true;
              }
              let ok = 0, fail = 0;
              console.log('| File | Lines | Branch | Status |');
              console.log('|------|-------|--------|--------|');
              for (const e of entries) {
                const absPath = path.resolve(cwd, e.path);
                const s = summary[absPath];
                if (!s) { console.log('| ' + e.path + ' | - | - | ⚠️ not found |'); fail++; continue; }
                const linesPct = Math.round(s.lines.pct * 100) / 100;
                const branchPct = Math.round(s.branches.pct * 100) / 100;
                const linesOk = linesPct === 100;
                const branchOk = !e.branches || branchPct === 100;
                const passed = linesOk && branchOk;
                if (passed) ok++; else fail++;
                console.log('| ' + e.path + ' | ' + linesPct + '% | ' + branchPct + '% | ' + (passed ? '✅' : '❌') + ' |');
              }
              console.log('');
              console.log('**Result:** ' + ok + ' passed, ' + fail + ' failed / ' + entries.length + ' registered');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ inputs.working_directory }}/coverage/
          retention-days: 30

  typecheck:
    name: Type Check
    needs: [pr-limit]
    if: >-
      always() &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check
        run: ${{ inputs.typecheck_command }}

  integration-test:
    name: API Integration
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_integration &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped') &&
      !(inputs.deploy_on_tag && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start API + DB containers
        run: docker compose -f ${{ inputs.integration_compose_file }} up -d --wait
        timeout-minutes: 5

      - name: Run integration tests
        run: |
          # Parse space-separated KEY=VALUE pairs into env vars
          for pair in ${{ inputs.integration_env }}; do
            export "$pair"
          done
          ${{ inputs.integration_test_command }}

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f ${{ inputs.integration_compose_file }} logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f ${{ inputs.integration_compose_file }} down -v

  deploy-staging:
    name: Deploy Staging
    needs: [test, typecheck, integration-test]
    if: >-
      always() &&
      inputs.has_deploy &&
      github.event_name == 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ${{ inputs.deploy_staging_script }}

  deploy-release:
    name: Deploy Release
    needs: [test, typecheck, integration-test]
    if: >-
      always() &&
      inputs.has_deploy &&
      (
        (!inputs.deploy_on_tag && github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (inputs.deploy_on_tag && startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push')
      ) &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ${{ inputs.deploy_release_script }}
