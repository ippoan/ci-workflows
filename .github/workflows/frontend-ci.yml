name: Frontend CI

on:
  workflow_call:
    inputs:
      project_type:
        description: 'Project type: "nuxt" (build + deploy) or "worker" (deploy only)'
        type: string
        default: 'nuxt'
      working_directory:
        description: Working directory for npm commands (e.g. "web" for monorepos)
        type: string
        default: '.'
      node_version:
        description: Node.js version
        type: string
        default: '24'
      install_command:
        description: Command to install dependencies
        type: string
        default: 'npm ci'
      has_tests:
        description: Whether to run the test job
        type: boolean
        default: true
      has_integration:
        description: Whether to run the integration test job
        type: boolean
        default: false
      typecheck_command:
        description: 'Override typecheck command (default: nuxt="npx nuxi typecheck", worker="npx tsc --noEmit")'
        type: string
        default: ''
      pre_install_script:
        description: Script to run before npm install (e.g. stub local dependencies)
        type: string
        default: ''
      post_install_script:
        description: Script to run after npm install (e.g. "npx nuxt prepare", "npx wrangler types")
        type: string
        default: ''
      use_auth_client_dev:
        description: Whether to use the auth-client dev action
        type: boolean
        default: false
      test_command:
        description: Test command
        type: string
        default: 'npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json'
      deploy_staging_script:
        description: 'Override staging deploy script (default: auto by project_type)'
        type: string
        default: ''
      deploy_release_script:
        description: 'Override release deploy script (default: auto by project_type)'
        type: string
        default: ''
      integration_compose_file:
        description: Docker Compose file for integration tests
        type: string
        default: 'docker-compose.test.yml'
      integration_test_command:
        description: Integration test command
        type: string
        default: 'npx vitest run'
      integration_env:
        description: 'Space-separated KEY=VALUE pairs for integration test env (e.g. "TEST_LIVE=1 API_BASE_URL=http://localhost:18080")'
        type: string
        default: ''
      npm_scope:
        description: 'npm scope for GitHub Packages registry (e.g. "@ippoan")'
        type: string
        default: ''
      cache_dependency_path:
        description: Path to package-lock.json for npm cache (e.g. "web/package-lock.json")
        type: string
        default: ''
      has_deploy:
        description: Whether to run deploy jobs
        type: boolean
        default: true
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: Cloudflare API token for wrangler deploy
        required: false

jobs:
  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/ci-workflows/.github/actions/pr-limit@main

  branch-protection:
    name: Branch Protection Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch protection
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"

          # Use unauthenticated API for public repos (GITHUB_TOKEN lacks admin:read)
          BRANCH_INFO=$(curl -sf "https://api.github.com/repos/$REPO/branches/$BRANCH") || {
            echo "::error::Cannot fetch branch info for $REPO/$BRANCH"
            exit 1
          }

          PROTECTED=$(echo "$BRANCH_INFO" | jq -r '.protected')
          if [ "$PROTECTED" != "true" ]; then
            echo "::error::Branch protection is NOT enabled on $REPO/$BRANCH. Please enable it."
            exit 1
          fi

          # Fetch detailed protection (works for public repos without auth)
          PROTECTION=$(curl -sf "https://api.github.com/repos/$REPO/branches/$BRANCH/protection") || {
            echo "::warning::Cannot read protection details (private repo or rate limit). Skipping detailed check."
            echo "✅ Branch is protected (details not verifiable)"
            exit 0
          }

          ERRORS=()

          # Check: required status checks exist
          CHECKS=$(echo "$PROTECTION" | jq -r '.required_status_checks.checks // [] | length')
          if [ "$CHECKS" -eq 0 ]; then
            ERRORS+=("No required status checks configured")
          fi

          # Check: enforce_admins enabled
          ENFORCE=$(echo "$PROTECTION" | jq -r '.enforce_admins.enabled')
          if [ "$ENFORCE" != "true" ]; then
            ERRORS+=("enforce_admins is not enabled (admins can bypass protection)")
          fi

          # Check: force push disabled
          FORCE=$(echo "$PROTECTION" | jq -r '.allow_force_pushes.enabled')
          if [ "$FORCE" = "true" ]; then
            ERRORS+=("Force pushes are allowed")
          fi

          # Check: delete disabled
          DELETE=$(echo "$PROTECTION" | jq -r '.allow_deletions.enabled')
          if [ "$DELETE" = "true" ]; then
            ERRORS+=("Branch deletion is allowed")
          fi

          # Check: required checks include ci / prefix
          HAS_CI_CHECK=$(echo "$PROTECTION" | jq '[.required_status_checks.checks[] | .context] | any(startswith("ci /"))')
          if [ "$HAS_CI_CHECK" != "true" ]; then
            ERRORS+=("No 'ci /' required status check found")
          fi

          # Check: auto-merge enabled
          REPO_INFO=$(curl -sf "https://api.github.com/repos/$REPO") || true
          AUTO_MERGE=$(echo "$REPO_INFO" | jq -r '.allow_auto_merge // false')
          if [ "$AUTO_MERGE" != "true" ]; then
            ERRORS+=("Auto-merge is not enabled (Settings > General > Allow auto-merge)")
          fi

          # Check: Ruleset exists with no bypass actors (admin bypass prevention)
          RULESETS=$(curl -sf "https://api.github.com/repos/$REPO/rulesets" \
            -H "Authorization: Bearer ${{ github.token }}" 2>/dev/null) || true
          if [ -n "$RULESETS" ] && [ "$RULESETS" != "[]" ]; then
            HAS_NO_BYPASS=$(echo "$RULESETS" | jq '[.[] | select(.enforcement == "active" and (.bypass_actors | length) == 0)] | length > 0')
            if [ "$HAS_NO_BYPASS" != "true" ]; then
              ERRORS+=("No active Ruleset with empty bypass_actors found (admin can bypass CI with --admin)")
            fi
          else
            ERRORS+=("No Rulesets configured (admin can bypass CI with gh pr merge --admin)")
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "::error::Repository settings issues on $REPO/$BRANCH:"
            for e in "${ERRORS[@]}"; do
              echo "::error::  - $e"
            done
            exit 1
          fi

          echo "✅ Branch protection and repo settings verified on $REPO/$BRANCH"
          echo "$PROTECTION" | jq '{
            required_checks: [.required_status_checks.checks[].context],
            enforce_admins: .enforce_admins.enabled,
            force_push: .allow_force_pushes.enabled,
            deletions: .allow_deletions.enabled
          }'
          echo "auto_merge: $AUTO_MERGE"

  test:
    name: Vitest + Coverage
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_tests &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests with coverage
        run: ${{ inputs.test_command }}

      - name: Coverage 100% regression check
        if: always() && hashFiles(format('{0}/scripts/check_coverage_100.mjs', inputs.working_directory)) != ''
        run: node scripts/check_coverage_100.mjs

      - name: Job Summary
        if: always()
        run: |
          echo "## Vitest Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test results summary (vitest json reporter)
          if [ -f coverage/test-results.json ]; then
            node -e "
              const s = require('./coverage/test-results.json');
              const suites = s.numTotalTestSuites || 0;
              const passed = s.numPassedTestSuites || 0;
              const tests = s.numTotalTests || 0;
              const testsPassed = s.numPassedTests || 0;
              const failed = s.numFailedTests || 0;
              console.log('### Summary');
              console.log('- Test Files: ' + (failed === 0 ? '✅' : '❌') + ' ' + passed + ' passes · ' + suites + ' total');
              console.log('- Test Results: ' + (failed === 0 ? '✅' : '❌') + ' ' + testsPassed + ' passes · ' + tests + ' total');
              if (failed > 0) console.log('- ❌ ' + failed + ' failed');
            " >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage section (coverage-summary.json or coverage-final.json fallback)
          if [ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const cwd = process.cwd();
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');

              let summary;
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = { total: { statements: {pct:0}, branches: {pct:0}, functions: {pct:0}, lines: {pct:0} } };
                let tS=0,cS=0, tB=0,cB=0, tF=0,cF=0, tL=0,cL=0;
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s||{}, b = fc.b||{}, f = fc.f||{};
                  let fS=0,fCS=0, fB=0,fCB=0, fF=0,fCF=0;
                  for (const k of Object.keys(s)) { fS++; if(s[k]>0) fCS++; }
                  for (const k of Object.keys(b)) { for(const c of b[k]) { fB++; if(c>0) fCB++; } }
                  for (const k of Object.keys(f)) { fF++; if(f[k]>0) fCF++; }
                  tS+=fS; cS+=fCS; tB+=fB; cB+=fCB; tF+=fF; cF+=fCF;
                  tL+=fS; cL+=fCS;
                  const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                  summary[fp] = {
                    statements:{pct:pct(fS,fCS)}, branches:{pct:pct(fB,fCB)},
                    functions:{pct:pct(fF,fCF)}, lines:{pct:pct(fS,fCS)}
                  };
                }
                const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                summary.total = {
                  statements:{pct:pct(tS,cS)}, branches:{pct:pct(tB,cB)},
                  functions:{pct:pct(tF,cF)}, lines:{pct:pct(tL,cL)}
                };
              }

              const t = summary.total;
              const out = [];
              out.push('### Coverage');
              out.push('');
              out.push('| Category | Stmts | Branch | Funcs | Lines |');
              out.push('|----------|-------|--------|-------|-------|');
              out.push('| **Total** | '+t.statements.pct+'% | '+t.branches.pct+'% | '+t.functions.pct+'% | '+t.lines.pct+'% |');
              out.push('');
              const files = Object.keys(summary).filter(k => k !== 'total');
              const full = files.filter(k => summary[k].lines.pct === 100);
              out.push('**Lines 100%:** '+full.length+' / '+files.length+' files');
              out.push('');
              out.push('<details><summary>Lines &lt; 100% ファイル一覧</summary>');
              out.push('');
              out.push('| File | Stmts | Branch | Funcs | Lines |');
              out.push('|------|-------|--------|-------|-------|');
              for (const k of files) {
                const e = summary[k];
                if (e.lines.pct < 100) {
                  const rel = path.relative(cwd, k);
                  out.push('| '+rel+' | '+e.statements.pct+'% | '+e.branches.pct+'% | '+e.functions.pct+'% | '+e.lines.pct+'% |');
                }
              }
              out.push('');
              out.push('</details>');
              console.log(out.join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          fi

          # coverage_100.toml registered files status
          if [ -f coverage_100.toml ] && ([ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]); then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage 100% Files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const path = require('path');
              const toml = fs.readFileSync('coverage_100.toml', 'utf8');
              const cwd = process.cwd();

              let summary;
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = {};
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s || {};
                  let lT = 0, lC = 0;
                  for (const k of Object.keys(s)) { lT++; if (s[k] > 0) lC++; }
                  const b = fc.b || {};
                  let bT = 0, bC = 0;
                  for (const k of Object.keys(b)) { for (const c of b[k]) { bT++; if (c > 0) bC++; } }
                  summary[fp] = {
                    lines: { pct: lT === 0 ? 100 : (lC / lT) * 100 },
                    branches: { pct: bT === 0 ? 100 : (bC / bT) * 100 },
                  };
                }
              }

              const entries = [];
              let cur = null;
              for (const line of toml.split('\n')) {
                if (line.trim() === '[[files]]') { cur = { path: '', branches: false }; entries.push(cur); continue; }
                if (!cur) continue;
                const pm = line.match(/^path\s*=\s*\"(.+)\"/);
                if (pm) cur.path = pm[1];
                const bm = line.match(/^branches\s*=\s*true/);
                if (bm) cur.branches = true;
              }
              let ok = 0, fail = 0;
              console.log('| File | Lines | Branch | Status |');
              console.log('|------|-------|--------|--------|');
              for (const e of entries) {
                const absPath = path.resolve(cwd, e.path);
                const s = summary[absPath];
                if (!s) { console.log('| ' + e.path + ' | - | - | ⚠️ not found |'); fail++; continue; }
                const linesPct = Math.round(s.lines.pct * 100) / 100;
                const branchPct = Math.round(s.branches.pct * 100) / 100;
                const linesOk = linesPct === 100;
                const branchOk = !e.branches || branchPct === 100;
                const passed = linesOk && branchOk;
                if (passed) ok++; else fail++;
                console.log('| ' + e.path + ' | ' + linesPct + '% | ' + branchPct + '% | ' + (passed ? '✅' : '❌') + ' |');
              }
              console.log('');
              console.log('**Result:** ' + ok + ' passed, ' + fail + ' failed / ' + entries.length + ' registered');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ inputs.working_directory }}/coverage/
          retention-days: 30

  typecheck:
    name: Type Check
    needs: [pr-limit]
    if: >-
      always() &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check
        run: |
          CMD="${{ inputs.typecheck_command }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx tsc --noEmit"
            else
              CMD="npx nuxi typecheck"
            fi
          fi
          eval "$CMD"

  integration-test:
    name: API Integration
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_integration &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start API + DB containers
        run: docker compose -f ${{ inputs.integration_compose_file }} up -d --wait
        timeout-minutes: 5

      - name: Run integration tests
        run: |
          # Parse space-separated KEY=VALUE pairs into env vars
          for pair in ${{ inputs.integration_env }}; do
            export "$pair"
          done
          ${{ inputs.integration_test_command }}

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f ${{ inputs.integration_compose_file }} logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f ${{ inputs.integration_compose_file }} down -v

  deploy-staging:
    name: Deploy Staging
    needs: [test, typecheck, integration-test, branch-protection]
    if: >-
      always() &&
      inputs.has_deploy &&
      github.event_name == 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.branch-protection.result == 'success' || needs.branch-protection.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CMD="${{ inputs.deploy_staging_script }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx wrangler deploy --env staging"
            else
              CMD="npm run build && npx wrangler deploy --env staging"
            fi
          fi
          eval "$CMD"

  deploy-release:
    name: Deploy Release
    needs: [test, typecheck, integration-test]
    if: >-
      always() &&
      inputs.has_deploy &&
      startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CMD="${{ inputs.deploy_release_script }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx wrangler deploy"
            else
              CMD="npm run build && npx wrangler deploy"
            fi
          fi
          eval "$CMD"

  auto-merge:
    name: Auto Merge
    needs: [test, typecheck, integration-test, branch-protection, deploy-staging]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.branch-protection.result == 'success' || needs.branch-protection.result == 'skipped') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.number }} --squash --repo ${{ github.repository }} 2>&1 || true
