name: Dev Tag Release

# `dev-{N}` タグを自動採番して push する reusable workflow。
# 通常は consumer repo の main への push 起点で呼ばれる:
#
#   on:
#     push:
#       branches: [main]
#   jobs:
#     dev-release:
#       uses: ippoan/ci-workflows/.github/workflows/dev-tag-release.yml@main
#       secrets:
#         TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
#
# 採番ロジック:
#   - 既存 `{prefix}{N}` タグから最大 N を取り出し、N+1 を新タグとして push
#   - 例: `dev-1`, `dev-2`, `dev-3` がある状態で実行すると `dev-4` を push
#   - 初回 (該当タグ無し) は `{prefix}1`
#   - HEAD が既に `{prefix}*` タグを持っていれば skip (重複防止 — 同一 commit
#     に複数 dev タグを付けない)
#
# tag が push されると caller の release workflow
# (`on: push: tags: ["dev-*"]`) が発火する。`ci-workflows/rust-binary-release`
# 等を呼ぶ release.yml は tag に `-` を含んでいる場合 prerelease として GitHub
# Release を作る (= `releases/latest` に出ない = stable consumer は影響無し)。
#
# Why a separate workflow (vs. extending `tag-release.yml`):
#   - semver bumping と counter bumping はロジックが本質的に別物
#   - 既存 `tag-release.yml` (v0.0.X) を触らないので stable リリース動作には
#     完全に zero risk

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Tag prefix (default: "dev-")'
        type: string
        default: 'dev-'
    secrets:
      TAG_RELEASE_PAT:
        description: 'PAT for tag push (required to trigger subsequent release workflow runs)'
        required: true

jobs:
  dev-tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TAG_RELEASE_PAT }}

      - name: Compute next dev tag
        id: tag
        env:
          PREFIX: ${{ inputs.prefix }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Skip if HEAD already has a tag with this prefix — avoids
          # re-tagging the same commit when the workflow re-fires (e.g.
          # rerun-failed-jobs, branch protection re-evaluation).
          EXISTING_AT_HEAD="$(git tag --points-at HEAD | grep -E "^${PREFIX}[0-9]+\$" | sort -V | tail -1 || true)"
          if [ -n "$EXISTING_AT_HEAD" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "existing=$EXISTING_AT_HEAD" >> "$GITHUB_OUTPUT"
            echo "### Dev Tag Release" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped: HEAD already tagged as \`$EXISTING_AT_HEAD\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Find the highest existing dev counter (or 0 if none).
          LATEST_N="$(git tag -l "${PREFIX}*" \
            | grep -oE "^${PREFIX}[0-9]+\$" \
            | sed "s|^${PREFIX}||" \
            | sort -n \
            | tail -1 || true)"
          NEXT_N=$(( ${LATEST_N:-0} + 1 ))
          NEW_TAG="${PREFIX}${NEXT_N}"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          {
            echo "### Dev Tag Release"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| prefix | \`${PREFIX}\` |"
            echo "| previous | \`${PREFIX}${LATEST_N:-(none)}\` |"
            echo "| new | \`${NEW_TAG}\` |"
            echo "| commit | \`${SHORT_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push tag
        if: steps.tag.outputs.skipped == 'false'
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          SHORT_SHA: ${{ steps.tag.outputs.short_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Dev release ${NEW_TAG} (auto, commit ${SHORT_SHA})"
          git push origin "$NEW_TAG"
          echo "Pushed ${NEW_TAG}"
