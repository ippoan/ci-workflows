name: PR Limit Check
description: Fail if the PR author has conflicting open PRs in this repo

runs:
  using: composite
  steps:
    - name: Check conflicting PRs by same author
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        AUTHOR="${{ github.event.pull_request.user.login }}"
        THIS_PR="${{ github.event.pull_request.number }}"
        CONFLICTS=$(gh pr list --repo "${{ github.repository }}" --state open --author "$AUTHOR" --json number,title,mergeable -q "[ .[] | select(.number != $THIS_PR and .mergeable == \"CONFLICTING\") ]")
        COUNT=$(echo "$CONFLICTS" | jq 'length')
        if [ "$COUNT" -gt 0 ]; then
          echo "::error::$AUTHOR has $COUNT conflicting open PR(s). Resolve conflicts before creating a new one."
          echo "$CONFLICTS" | jq -r '.[] | "  #\(.number) \(.title)"'
          exit 1
        fi
