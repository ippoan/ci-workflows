name: Propagate Package Update

# publish 済み npm package の新バージョンを consumer repo 群へ bump PR として
# 配る reusable workflow。
#
# ## 認証 (どちらか必須、両方あれば App 優先)
#
# - **CI_APP_ID / CI_APP_PRIVATE_KEY (推奨)**: auto-merge.yml と同じ
#   ippoan-ci-bot GitHub App の installation token を **target repo の owner
#   ごとに** mint して使う (org secret を使い回せる = repo 個別の PAT 不要)。
#   App が対象 org (ippoan / ohishi-exp) に install 済みであること。
#   owner は最大 2 org まで (現行 target は ippoan + ohishi-exp。増えたら
#   mint step を足す — fail loud で検出される)。
# - **PAT (フォールバック)**: repo scope を持つ classic PAT。App secret が
#   渡されなかった場合のみ使う。
#
# バージョン解決の npm view には caller の GITHUB_TOKEN で足りる
# (同 org package の read は自動 token で可) ため、認証 secret には依存しない。
#
# ## npm registry read も caller の GITHUB_TOKEN (issue #182)
#
# consumer repo での `npm install` の registry 認証も **caller の GITHUB_TOKEN**
# で行う。App installation token は Packages permission を持たず一律 401 になる
# (v0.2.146 run で全 consumer が npm E401 / clone 即死した実害)。propagate 対象
# package は必ず caller (publisher) repo から publish されたものなので
# GITHUB_TOKEN で read できる。前提が 2 つ:
#
# - **caller は `packages: read` (以上) を permissions で宣言していること**
#   (frontend-ci / lib-ci 経由なら npm_scope 利用時の既存要件と同じ)。
# - consumer が **他 repo 発の @scope package に依存する場合**は、その package の
#   "Manage Actions access" に caller repo を追加すること (現行 consumer 9 repo の
#   @ippoan 依存は auth-client / test-utils のみ = 全て caller 発なので追加不要)。

on:
  workflow_call:
    inputs:
      package_name:
        description: 'npm package name (e.g. "@ippoan/auth-client")'
        type: string
        required: true
      package_version:
        description: 'Version to install (e.g. "^0.2.10"). If empty, uses latest from registry.'
        type: string
        default: ''
      target_repos:
        description: 'Comma-separated list of target repos (e.g. "ippoan/nuxt-notify,ippoan/alc-app")'
        type: string
        required: true
      working_directories:
        description: 'Comma-separated working directories per repo (e.g. ".,.,web"). Must match target_repos order. Default "." for all.'
        type: string
        default: ''
      npm_scope:
        description: 'npm scope for GitHub Packages registry (e.g. "@ippoan")'
        type: string
        default: '@ippoan'
    secrets:
      PAT:
        description: 'PAT with repo scope for cross-repo operations (fallback when CI_APP_ID is not provided)'
        required: false
      CI_APP_ID:
        description: 'GitHub App ID (org secret; same App as auto-merge.yml). Preferred over PAT.'
        required: false
      CI_APP_PRIVATE_KEY:
        description: 'PEM private key for CI_APP_ID (org secret, multi-line).'
        required: false

jobs:
  propagate:
    runs-on: ubuntu-latest
    env:
      # if 式で secrets を直接参照できないため env に写す (値は mint にのみ使用)
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
    steps:
      # target_repos の owner を重複排除で列挙する。App installation token は
      # owner (org) 単位でしか mint できないため、owner ごとに 1 token 用意する
      - name: Derive target owners
        id: owners
        env:
          TARGET_REPOS: ${{ inputs.target_repos }}
        run: |
          OWNERS=$(echo "$TARGET_REPOS" | tr ',' '\n' | cut -d/ -f1 | sort -u)
          COUNT=$(echo "$OWNERS" | wc -l)
          if [ "$COUNT" -gt 2 ]; then
            echo "::error::target_repos の owner が 3 org 以上あります ($OWNERS)。mint step を増やしてください (propagate-package.yml)"
            exit 1
          fi
          echo "owner1=$(echo "$OWNERS" | sed -n 1p)" >> "$GITHUB_OUTPUT"
          echo "owner2=$(echo "$OWNERS" | sed -n 2p)" >> "$GITHUB_OUTPUT"

      - name: Mint App token (owner1)
        id: app-token-1
        if: env.CI_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ steps.owners.outputs.owner1 }}

      - name: Mint App token (owner2)
        id: app-token-2
        if: env.CI_APP_ID != '' && steps.owners.outputs.owner2 != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: ${{ steps.owners.outputs.owner2 }}

      # App も PAT も無ければ fail loud (auto-merge.yml と同方針 — silent
      # fallback で壊れたまま green に見せない)
      - name: Require credentials
        if: steps.app-token-1.outputs.token == ''
        env:
          PAT_PRESENT: ${{ secrets.PAT != '' }}
        run: |
          if [ "$PAT_PRESENT" = "true" ]; then exit 0; fi
          echo "::error title=propagate: missing credentials::CI_APP_ID/CI_APP_PRIVATE_KEY (推奨) か PAT のどちらかを secrets で渡してください。cross-repo の PR 作成は GITHUB_TOKEN では不可能です。"
          exit 1

      - name: Resolve version
        id: version
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          PACKAGE: ${{ inputs.package_name }}
          SCOPE: ${{ inputs.npm_scope }}
          # 同 org package の read は workflow 既定 token で足りる
          NPM_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$PACKAGE_VERSION" ]; then
            echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "${SCOPE}:registry=https://npm.pkg.github.com" > .npmrc
            echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}" >> .npmrc
            VER=$(npm view "$PACKAGE" version 2>/dev/null || echo "")
            rm .npmrc
            if [ -z "$VER" ]; then
              echo "::error::Could not resolve latest version for $PACKAGE"
              exit 1
            fi
            echo "version=^${VER}" >> "$GITHUB_OUTPUT"
          fi
          echo "### Propagate $PACKAGE" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create PRs in target repos
        env:
          PAT_FALLBACK: ${{ secrets.PAT }}
          TOKEN_OWNER1: ${{ steps.app-token-1.outputs.token }}
          TOKEN_OWNER2: ${{ steps.app-token-2.outputs.token }}
          OWNER1: ${{ steps.owners.outputs.owner1 }}
          OWNER2: ${{ steps.owners.outputs.owner2 }}
          PACKAGE: ${{ inputs.package_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SCOPE: ${{ inputs.npm_scope }}
          TARGET_REPOS: ${{ inputs.target_repos }}
          WORKING_DIRS: ${{ inputs.working_directories }}
          # npm registry read 用 (header の「npm registry read も caller の
          # GITHUB_TOKEN」参照)。App token は Packages permission が無く 401 (#182)
          NPM_TOKEN: ${{ github.token }}
        run: |
          BASEDIR=$(pwd)
          IFS=',' read -ra REPOS <<< "$TARGET_REPOS"
          IFS=',' read -ra DIRS <<< "$WORKING_DIRS"

          # 各 iteration の後始末。cwd を必ず BASEDIR に戻してから TMPDIR を消す —
          # 消した TMPDIR に留まったまま continue すると次の git clone が getcwd 失敗で
          # 即死し、2 repo 目以降が全滅する (v0.2.146 run の実害、issue #182)
          cleanup() { cd "$BASEDIR" && rm -rf "$TMPDIR"; }

          # repo の owner に対応する token を返す (App token 優先、無ければ PAT)
          token_for() {
            case "${1%%/*}" in
              "$OWNER1") echo "${TOKEN_OWNER1:-$PAT_FALLBACK}" ;;
              "$OWNER2") echo "${TOKEN_OWNER2:-$PAT_FALLBACK}" ;;
              *) echo "$PAT_FALLBACK" ;;
            esac
          }

          BRANCH="chore/update-$(echo "$PACKAGE" | tr '/@' '-')-${VERSION//[^0-9.]/}"

          RESULTS=()
          FAILED=0
          for i in "${!REPOS[@]}"; do
            REPO="${REPOS[$i]}"
            DIR="${DIRS[$i]:-.}"
            echo "--- $REPO (dir: $DIR) ---"
            cd "$BASEDIR"
            TOKEN=$(token_for "$REPO")
            if [ -z "$TOKEN" ]; then
              echo "::warning::No credential for $REPO (owner ${REPO%%/*}) — skipped"
              RESULTS+=("$REPO: no credential")
              FAILED=1
              continue
            fi

            # Clone (token を URL に埋め込む — gh clone は push 用の credential
            # helper を設定しないため、remote URL で認証を完結させる)
            TMPDIR=$(mktemp -d)
            git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${REPO}.git" "$TMPDIR" 2>&1 \
              || { echo "::warning::Failed to clone $REPO"; RESULTS+=("$REPO: clone failed"); FAILED=1; cleanup; continue; }
            cd "$TMPDIR"

            # Check if already up to date
            CURRENT=$(node -e "try{const p=require('./${DIR}/package.json');console.log(p.dependencies?.['${PACKAGE}']||p.devDependencies?.['${PACKAGE}']||'')}catch{console.log('')}")
            if [ "$CURRENT" = "$VERSION" ]; then
              echo "Already at $VERSION, skipping"
              RESULTS+=("$REPO: already up to date")
              cleanup
              continue
            fi

            # Create branch
            git checkout -b "$BRANCH"

            # Install。registry read は NPM_TOKEN (= caller の GITHUB_TOKEN) —
            # App token は Packages permission が無く 401 になる (#182、header 参照)。
            # NPM_CONFIG_USERCONFIG で一時 npmrc を指定し、repo 直下の (git 管理下
            # の可能性がある) .npmrc には一切触れない
            cd "$DIR"
            TMP_NPMRC=$(mktemp)
            {
              echo "${SCOPE}:registry=https://npm.pkg.github.com"
              echo "//npm.pkg.github.com/:_authToken=${NPM_TOKEN}"
            } > "$TMP_NPMRC"
            # NODE_AUTH_TOKEN も同じ token で export する — consumer の多くは
            # 直下に `//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}` を持つ
            # .npmrc を commit しており、project .npmrc は USERCONFIG より優先される
            # ため、未定義だと空展開 → E401 になる (v0.2.147 run で .npmrc に
            # _authToken 行を持つ 6 repo だけが 401 になった実害、issue #182)
            NPM_CONFIG_USERCONFIG="$TMP_NPMRC" NODE_AUTH_TOKEN="$NPM_TOKEN" npm install "${PACKAGE}@${VERSION}" 2>&1 | tail -20
            NPM_EXIT=${PIPESTATUS[0]}
            rm -f "$TMP_NPMRC"
            if [ "$NPM_EXIT" -ne 0 ]; then
              echo "::warning::npm install failed for $REPO (exit $NPM_EXIT)"
              RESULTS+=("$REPO: npm install failed")
              FAILED=1
              cleanup
              continue
            fi

            # Check if anything changed
            cd "$TMPDIR"
            if [ -z "$(git status --porcelain)" ]; then
              echo "No changes, skipping"
              RESULTS+=("$REPO: no changes")
              cleanup
              continue
            fi

            # Commit & push
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: update ${PACKAGE} to ${VERSION}"

            git push origin "$BRANCH" 2>&1 || { echo "::warning::Failed to push to $REPO"; RESULTS+=("$REPO: push failed"); FAILED=1; cleanup; continue; }

            # Create PR (rerun 時の "already exists" は成功扱いで冪等にする)
            if PR_URL=$(GH_TOKEN="$TOKEN" gh pr create --repo "$REPO" --base main --head "$BRANCH" \
              --title "chore: update ${PACKAGE} to ${VERSION}" \
              --body "Automated update from ${GITHUB_REPOSITORY} CI." 2>&1); then
              echo "$PR_URL"
              RESULTS+=("$REPO: $PR_URL")
            elif echo "$PR_URL" | grep -qi "already exists"; then
              echo "PR already exists"
              RESULTS+=("$REPO: PR already exists")
            else
              echo "::warning::Failed to create PR for $REPO: $PR_URL"
              RESULTS+=("$REPO: pr create failed")
              FAILED=1
            fi

            cleanup
          done

          # Summary
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repo | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for r in "${RESULTS[@]}"; do
            echo "| ${r%%:*} | ${r#*: } |" >> "$GITHUB_STEP_SUMMARY"
          done

          # 1 repo でもハード失敗があれば job を fail させる — per-repo warning だけだと
          # 全滅しても green に見えて気づけない (v0.2.146 で実害、issue #182)。
          # already up to date / no changes / PR already exists は正常系。
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::1つ以上の consumer への propagate が失敗しました (Summary の表を参照)"
            exit 1
          fi
