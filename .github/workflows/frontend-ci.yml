name: Frontend CI

on:
  workflow_call:
    inputs:
      project_type:
        description: 'Project type: "nuxt" (build + deploy) or "worker" (deploy only)'
        type: string
        default: 'nuxt'
      working_directory:
        description: Working directory for npm commands (e.g. "web" for monorepos)
        type: string
        default: '.'
      node_version:
        description: Node.js version
        type: string
        default: '24'
      install_command:
        description: Command to install dependencies
        type: string
        default: 'npm ci'
      has_tests:
        description: Whether to run the test job
        type: boolean
        default: true
      has_integration:
        description: Whether to run the integration test job
        type: boolean
        default: false
      typecheck_command:
        description: 'Override typecheck command (default: nuxt="npx nuxi typecheck", worker="npx tsc --noEmit")'
        type: string
        default: ''
      pre_install_script:
        description: Script to run before npm install (e.g. stub local dependencies)
        type: string
        default: ''
      post_install_script:
        description: Script to run after npm install (e.g. "npx nuxt prepare", "npx wrangler types")
        type: string
        default: ''
      use_auth_client_dev:
        description: Whether to use the auth-client dev action
        type: boolean
        default: false
      test_command:
        description: Test command
        type: string
        default: 'npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json'
      deploy_staging_script:
        description: 'Override staging deploy script (default: auto by project_type)'
        type: string
        default: ''
      deploy_release_script:
        description: 'Override release deploy script (default: auto by project_type)'
        type: string
        default: ''
      release_no_traffic:
        description: |
          v* リリースを no-traffic で deploy する (全 frontend 共通の既定挙動)。
          true (default) の場合、release deploy の `wrangler deploy` を
          `wrangler versions deploy` ではなく **`wrangler versions upload`**
          (no-traffic version 作成) に置換する。本番 traffic は変わらず、flip は
          Cloudflare ダッシュボード (Workers > Deployments で version を 100% に
          promote) か `npx wrangler versions deploy <version-id>@100% --yes` で
          明示的に行う。即 100% deploy に戻したい repo は false を渡す。
          Refs ippoan/ci-dashboard#174。
        type: boolean
        default: true
      integration_compose_file:
        description: Docker Compose file for integration tests
        type: string
        default: 'docker-compose.test.yml'
      integration_test_command:
        description: Integration test command
        type: string
        default: 'npx vitest run'
      integration_env:
        description: 'Space-separated KEY=VALUE pairs for integration test env (e.g. "TEST_LIVE=1 API_BASE_URL=http://localhost:18080")'
        type: string
        default: ''
      npm_scope:
        description: 'npm scope for GitHub Packages registry (e.g. "@ippoan")'
        type: string
        default: ''
      cache_dependency_path:
        description: Path to package-lock.json for npm cache (e.g. "web/package-lock.json")
        type: string
        default: ''
      has_deploy:
        description: Whether to run deploy jobs (controls both staging and release)
        type: boolean
        default: true
      has_staging_deploy:
        description: Whether to run staging deploy (overrides has_deploy for staging only)
        type: boolean
        default: true
      npm_publish_directory:
        description: |
          Directory of npm package(s) to publish. Accepts a single path
          (e.g. `packages/auth-client`) or a comma-separated list for
          monorepos with multiple packages (e.g.
          `packages/auth-client,packages/auth-client-worker`). Each entry
          must contain its own `package.json`. Empty = no publish.
        type: string
        default: ''
      npm_publish_name:
        description: 'Full npm package name for propagation (e.g. "@ippoan/auth-client"). Required if propagate_repos is set.'
        type: string
        default: ''
      npm_publish_propagate_repos:
        description: 'Comma-separated repos to auto-update after publish (e.g. "ippoan/nuxt-notify,ippoan/alc-app"). Empty = no propagation.'
        type: string
        default: ''
      npm_publish_propagate_dirs:
        description: 'Comma-separated working directories per repo (e.g. ".,.,web"). Must match propagate_repos order.'
        type: string
        default: ''
      # ----- GCP secret-verify integration -----
      # secret-verify-gcp.yml を本 reusable の中に直列 (test/typecheck の
      # 後) で組み込むフック。
      #
      # **org vars があれば caller は何も渡さなくていい**:
      #   - vars.GCP_PROJECT_ID_STAGING       → gcp_secret_verify_project の fallback
      #   - vars.GCP_WIF_PROVIDER             → gcp_secret_verify_provider の fallback
      #   - vars.GCP_WIF_SERVICE_ACCOUNT_STAGING → gcp_secret_verify_sa の fallback
      #
      # ippoan org は 4 vars (GCP_PROJECT_ID_STAGING / GCP_REGION /
      # GCP_WIF_PROVIDER / GCP_WIF_SERVICE_ACCOUNT_STAGING) を org-level で
      # 設定済 (visibility: Public repositories)。secret-verify は自動で動く。
      #
      # input を明示的に渡せば vars より優先 (= per-caller override 用)。
      # vars も input も無くて wrangler に secrets_store_secrets binding が
      # あるなら `secret-verify-required` gate で FAIL する。
      gcp_secret_verify_project:
        description: 'GCP project to verify against. Empty = use vars.GCP_PROJECT_ID_STAGING. Both empty + binding present = gate fail.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_provider:
        description: 'WIF provider full resource name. Empty = use vars.GCP_WIF_PROVIDER.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_sa:
        description: 'WIF impersonation target SA email (secretmanager.viewer role 必要)。Empty = use vars.GCP_WIF_SERVICE_ACCOUNT_STAGING.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_wrangler_path:
        description: 'wrangler.jsonc / .toml の path。default は autodetect (リポジトリ root)。Worker 限定 input、Nuxt では使用不可。'
        required: false
        type: string
        default: ''
      gcp_secret_verify_apply_labels:
        description: 'Verify 成功後に GCP Secret Manager の secret に `used-by-<owner>-<repo>=active|removed` label を打つ。requires `secretmanager.secrets.update` on the verify SA (secretsInventoryLabeler role 等)。default true (secrets-inventory dashboard で active consumer を可視化する org 標準)。明示 false にすれば抑止可。'
        required: false
        type: boolean
        default: true
      # ----- Release Wave compatibility report (Refs ippoan/ci-dashboard#157/#158) -----
      # integration test green 時にこの frontend がどの backend image を相手に
      # test したかを ci-dashboard に記録し、Release Wave の互換性 matrix の
      # データ源にする。opt-in (= compat_backend_repo が空なら report job は
      # skip され既存挙動に無影響)。
      compat_backend_repo:
        description: >-
          integration test の相手 backend repo (owner/name)。例: ippoan/rust-alc-api。
          設定すると integration test green 後に compatibility report job が走る。
          ⚠ has_integration: true の caller では **必須** — 未設定だと
          integration-test job が loud fail する (Release Wave グラフからの
          silent な edge 漏れを防ぐため)。backend を相手にしない / 意図的に
          compat report しない integration test は 'none' を明示して opt-out する。
        required: false
        type: string
        default: ''
      compat_backend_image:
        description: >-
          test 相手の backend image を明示指定する用。空なら ci-dashboard の
          現 production image を取りに行く (通常 PR CI 経路)。
          retest (repository_dispatch) 経路で dispatch payload の image を渡す。
        required: false
        type: string
        default: ''
      ci_dashboard_base_url:
        description: 'ci-dashboard worker の base URL (compatibility report 先)'
        required: false
        type: string
        default: 'https://ci-dashboard.ippoan.org'
      compat_backend_image_env:
        description: >-
          integration test の docker-compose が backend image tag/ref を読む env
          変数名 (例: API_IMAGE)。test 前に解決した backend SHA を
          `<this>=ghcr.io/<compat_backend_repo>:<sha>` として export し、
          **記録する SHA と同じ image で integration test を回す** (truthful 突合)。
          **compat_backend_repo を指定する場合は必須** — 未指定だと「compose
          default で test したのに現 SHA を記録」という不正確な緑を防ぐため
          integration-test が fail する。compat 報告自体を止めるなら
          compat_backend_repo を外すこと。
        required: false
        type: string
        default: ''
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: Cloudflare API token for wrangler deploy
        required: false
      PROPAGATE_PAT:
        description: PAT with repo scope for cross-repo package propagation
        required: false
      RELEASE_WAVE_WEBHOOK_SECRET:
        description: >-
          ci-dashboard webhook shared secret。compat_backend_repo 設定時の
          compatibility report に使う。org-level secret を caller の
          `secrets: inherit` 経由で受け取る (無ければ report job は no-op)。
        required: false

jobs:
  # PR auto-merge を CI 開始時に強制 disable する defense-in-depth step。
  # branch protection の required check に CI が含まれていない repo で、
  # `enable_pr_auto_merge` API call が即 merge を引き起こす事故 (PR #20
  # で被害発生済) を防ぐ。本 step は idempotent (= 既に disable なら no-op)。
  #
  # auto-merge job は CI 完走後にここで再 enable する流れ (= dual-step
  # pattern: 開始時 disable / 完走後 enable)。caller が手動で
  # enable_pr_auto_merge を呼んでも、本 step が直後に disable するため
  # CI 結果を待たない誤 merge が起きない。
  disable-auto-merge:
    name: Disable PR auto-merge (CI start)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Force-disable PR auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge --disable-auto "$PR_NUMBER" -R "$REPO" || true

  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/ci-workflows/.github/actions/pr-limit@main

  check-old-auth-domain:
    name: Check old auth-worker domain
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if auth.mtamaramu.com is hardcoded
        shell: bash
        run: |
          # 旧 auth-worker ドメイン (auth.mtamaramu.com) のハードコード参照を検出する。
          # 新ドメインは auth.ippoan.org。auth-worker URL は wrangler の env vars
          # (NUXT_PUBLIC_AUTH_WORKER_URL) や config.public.authWorkerUrl 経由で
          # 注入する想定。ハードコードしているとドメイン移行漏れになり、
          # /admin/sso → /top や cross-app navigation で旧 worker に飛んで
          # 認証が通らなくなる。
          #
          # 対象ファイル: ts / vue / js / mjs / toml / json / jsonc
          # 除外: node_modules, .claude/worktrees, package-lock.json, lock files,
          #       コメント中の説明 (許容したい場合は `// allow-old-auth-domain`
          #       を行末に付けること)。
          set -euo pipefail

          MATCHES=$(grep -rEn "auth\.mtamaramu\.com" . \
            --include="*.ts" --include="*.tsx" --include="*.vue" \
            --include="*.js" --include="*.mjs" --include="*.cjs" \
            --include="*.toml" --include="*.json" --include="*.jsonc" \
            --exclude-dir=node_modules \
            --exclude-dir=.claude \
            --exclude-dir=.git \
            --exclude-dir=dist \
            --exclude-dir=.output \
            --exclude-dir=.nuxt \
            --exclude-dir=coverage \
            --exclude="package-lock.json" \
            --exclude="*.lock" \
            2>/dev/null | grep -v "allow-old-auth-domain" || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::Hardcoded auth.mtamaramu.com (old auth-worker URL) detected. Use auth.ippoan.org or read from runtime config (config.public.authWorkerUrl) / env var (NUXT_PUBLIC_AUTH_WORKER_URL)."
            echo ""
            echo "Matches:"
            echo "$MATCHES"
            echo ""
            echo "If a reference is intentional (e.g. legacy redirect for an out-of-date bookmark), add a trailing '// allow-old-auth-domain' comment on that line to whitelist it."
            exit 1
          fi
          echo "OK: no hardcoded auth.mtamaramu.com found."

  branch-protection:
    name: Branch Protection Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch protection
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          DASHBOARD_URL="https://auth-staging.ippoan.org/dashboard/branch-protection"

          # GitHub API は **authenticated** で叩く。anonymous は 60 req/hr/IP の
          # 厳しい rate limit があり、GitHub Actions runner IP は共有なので
          # workflow_call で複数 PR が並行している時に頻繁に hit する。
          # GITHUB_TOKEN 経由なら 5000 req/hr/repo。
          fetch_with_retry() {
            local url=$1; shift
            local body=""
            for i in 1 2 3 4; do
              if body=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                              -H "Accept: application/vnd.github+json" \
                              -H "X-GitHub-Api-Version: 2022-11-28" \
                              "$url" "$@"); then
                printf '%s' "$body"
                return 0
              fi
              if [ "$i" -lt 4 ]; then
                # exponential backoff: 5s, 10s, 20s
                local delay=$((5 * 2 ** (i - 1)))
                echo "::warning::Attempt $i of GET $url failed, retrying in ${delay}s..." >&2
                sleep "$delay"
              fi
            done
            return 1
          }

          # /branches/$BRANCH — 「protected かどうか」を判定する一次ソース。
          # ここで取れないと残りの判定が無意味なので、失敗時は明示的に exit 1。
          if ! BRANCH_INFO=$(fetch_with_retry "https://api.github.com/repos/$REPO/branches/$BRANCH"); then
            echo "::error::Cannot fetch branch info for $REPO/$BRANCH after 4 attempts (likely transient GitHub API failure)"
            echo "::error::Re-run this job to retry, or see $DASHBOARD_URL for the expected configuration."
            exit 1
          fi

          PROTECTED=$(echo "$BRANCH_INFO" | jq -r '.protected')
          if [ "$PROTECTED" != "true" ]; then
            echo "::error::Branch protection is NOT enabled on $REPO/$BRANCH. Please enable it."
            echo "::error::Check the current state and required settings here: $DASHBOARD_URL"
            exit 1
          fi

          # /protection — 取れたら詳細チェック、取れなければ warning + 詳細はスキップ。
          # transient エラーで PR を ❌ にしないため、ここは exit 0 寄り (= 緩い)。
          if ! PROTECTION=$(fetch_with_retry "https://api.github.com/repos/$REPO/branches/$BRANCH/protection"); then
            echo "::warning::Cannot read protection details after 4 attempts (private repo, rate limit, or transient). Skipping detailed check."
            echo "✅ Branch is protected (details not verifiable)"
            exit 0
          fi

          ERRORS=()

          # Check: required status checks exist
          CHECKS=$(echo "$PROTECTION" | jq -r '.required_status_checks.checks // [] | length')
          if [ "$CHECKS" -eq 0 ]; then
            ERRORS+=("No required status checks configured")
          fi

          # Check: enforce_admins enabled
          ENFORCE=$(echo "$PROTECTION" | jq -r '.enforce_admins.enabled')
          if [ "$ENFORCE" != "true" ]; then
            ERRORS+=("enforce_admins is not enabled (admins can bypass protection)")
          fi

          # Check: force push disabled
          FORCE=$(echo "$PROTECTION" | jq -r '.allow_force_pushes.enabled')
          if [ "$FORCE" = "true" ]; then
            ERRORS+=("Force pushes are allowed")
          fi

          # Check: delete disabled
          DELETE=$(echo "$PROTECTION" | jq -r '.allow_deletions.enabled')
          if [ "$DELETE" = "true" ]; then
            ERRORS+=("Branch deletion is allowed")
          fi

          # Check: required checks include ci / prefix
          HAS_CI_CHECK=$(echo "$PROTECTION" | jq '[.required_status_checks.checks[] | .context] | any(startswith("ci /"))')
          if [ "$HAS_CI_CHECK" != "true" ]; then
            ERRORS+=("No 'ci /' required status check found")
          fi

          # Check: auto-merge enabled + delete branch on merge.
          # /repos/$REPO の取得失敗は transient 扱い (= ERRORS には積まず warning)
          # にして PR を不要に止めない。設定漏れは branch protection の
          # /protection 側でも別途気付ける。
          if REPO_INFO=$(fetch_with_retry "https://api.github.com/repos/$REPO"); then
            AUTO_MERGE=$(echo "$REPO_INFO" | jq -r '.allow_auto_merge // false')
            if [ "$AUTO_MERGE" != "true" ]; then
              ERRORS+=("Auto-merge is not enabled (Settings > General > Allow auto-merge)")
            fi
            DELETE_BRANCH=$(echo "$REPO_INFO" | jq -r '.delete_branch_on_merge // false')
            if [ "$DELETE_BRANCH" != "true" ]; then
              ERRORS+=("Delete branch on merge is not enabled (Settings > General > Automatically delete head branches)")
            fi
          else
            echo "::warning::Cannot fetch /repos/$REPO after 4 attempts — skipping auto-merge / delete-on-merge check"
          fi

          # Check: Ruleset exists with no bypass actors (admin bypass prevention).
          # /rulesets は GITHUB_TOKEN に administration:read が無いと 403 を返す。
          # caller が `permissions: { administration: read }` を宣言していない repo
          # では PR を不要に止めず、warning だけ出して skip する (=設定が正しくても
          # token 不足で false-fail しない)。
          if RULESETS=$(fetch_with_retry "https://api.github.com/repos/$REPO/rulesets"); then
            if [ -n "$RULESETS" ] && [ "$RULESETS" != "[]" ]; then
              HAS_NO_BYPASS=$(echo "$RULESETS" | jq '[.[] | select(.enforcement == "active" and (.bypass_actors | length) == 0)] | length > 0')
              if [ "$HAS_NO_BYPASS" != "true" ]; then
                ERRORS+=("No active Ruleset with empty bypass_actors found (admin can bypass CI with --admin)")
              fi
            else
              ERRORS+=("No Rulesets configured (admin can bypass CI with gh pr merge --admin)")
            fi
          else
            echo "::warning::Cannot fetch /rulesets for $REPO (token may lack 'administration: read'). Skipping ruleset check."
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "::error::Repository settings issues on $REPO/$BRANCH:"
            for e in "${ERRORS[@]}"; do
              echo "::error::  - $e"
            done
            echo "::error::Check the current state and required settings here: $DASHBOARD_URL"
            exit 1
          fi

          echo "✅ Branch protection and repo settings verified on $REPO/$BRANCH"
          echo "$PROTECTION" | jq '{
            required_checks: [.required_status_checks.checks[].context],
            enforce_admins: .enforce_admins.enabled,
            force_push: .allow_force_pushes.enabled,
            deletions: .allow_deletions.enabled
          }'
          echo "auto_merge: $AUTO_MERGE"

  test:
    name: Vitest + Coverage
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_tests &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests with coverage
        run: ${{ inputs.test_command }}

      - name: Coverage 100% regression check
        if: always() && hashFiles(format('{0}/scripts/check_coverage_100.mjs', inputs.working_directory)) != ''
        run: node scripts/check_coverage_100.mjs

      - name: Job Summary
        if: always()
        run: |
          echo "## Vitest Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test results summary (vitest json reporter)
          if [ -f coverage/test-results.json ]; then
            node -e "
              const s = require('./coverage/test-results.json');
              const suites = s.numTotalTestSuites || 0;
              const passed = s.numPassedTestSuites || 0;
              const tests = s.numTotalTests || 0;
              const testsPassed = s.numPassedTests || 0;
              const failed = s.numFailedTests || 0;
              console.log('### Summary');
              console.log('- Test Files: ' + (failed === 0 ? '✅' : '❌') + ' ' + passed + ' passes · ' + suites + ' total');
              console.log('- Test Results: ' + (failed === 0 ? '✅' : '❌') + ' ' + testsPassed + ' passes · ' + tests + ' total');
              if (failed > 0) console.log('- ❌ ' + failed + ' failed');
            " >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage section (coverage-summary.json or coverage-final.json fallback)
          if [ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const cwd = process.cwd();
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');

              let summary;
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = { total: { statements: {pct:0}, branches: {pct:0}, functions: {pct:0}, lines: {pct:0} } };
                let tS=0,cS=0, tB=0,cB=0, tF=0,cF=0, tL=0,cL=0;
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s||{}, b = fc.b||{}, f = fc.f||{};
                  let fS=0,fCS=0, fB=0,fCB=0, fF=0,fCF=0;
                  for (const k of Object.keys(s)) { fS++; if(s[k]>0) fCS++; }
                  for (const k of Object.keys(b)) { for(const c of b[k]) { fB++; if(c>0) fCB++; } }
                  for (const k of Object.keys(f)) { fF++; if(f[k]>0) fCF++; }
                  tS+=fS; cS+=fCS; tB+=fB; cB+=fCB; tF+=fF; cF+=fCF;
                  tL+=fS; cL+=fCS;
                  const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                  summary[fp] = {
                    statements:{pct:pct(fS,fCS)}, branches:{pct:pct(fB,fCB)},
                    functions:{pct:pct(fF,fCF)}, lines:{pct:pct(fS,fCS)}
                  };
                }
                const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                summary.total = {
                  statements:{pct:pct(tS,cS)}, branches:{pct:pct(tB,cB)},
                  functions:{pct:pct(tF,cF)}, lines:{pct:pct(tL,cL)}
                };
              }

              const t = summary.total;
              const out = [];
              out.push('### Coverage');
              out.push('');
              out.push('| Category | Stmts | Branch | Funcs | Lines |');
              out.push('|----------|-------|--------|-------|-------|');
              out.push('| **Total** | '+t.statements.pct+'% | '+t.branches.pct+'% | '+t.functions.pct+'% | '+t.lines.pct+'% |');
              out.push('');
              const files = Object.keys(summary).filter(k => k !== 'total');
              const full = files.filter(k => summary[k].lines.pct === 100);
              out.push('**Lines 100%:** '+full.length+' / '+files.length+' files');
              out.push('');
              out.push('<details><summary>Lines &lt; 100% ファイル一覧</summary>');
              out.push('');
              out.push('| File | Stmts | Branch | Funcs | Lines |');
              out.push('|------|-------|--------|-------|-------|');
              for (const k of files) {
                const e = summary[k];
                if (e.lines.pct < 100) {
                  const rel = path.relative(cwd, k);
                  out.push('| '+rel+' | '+e.statements.pct+'% | '+e.branches.pct+'% | '+e.functions.pct+'% | '+e.lines.pct+'% |');
                }
              }
              out.push('');
              out.push('</details>');
              console.log(out.join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          fi

          # coverage_100.toml registered files status
          if [ -f coverage_100.toml ] && ([ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]); then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage 100% Files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const path = require('path');
              const toml = fs.readFileSync('coverage_100.toml', 'utf8');
              const cwd = process.cwd();

              let summary;
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = {};
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s || {};
                  let lT = 0, lC = 0;
                  for (const k of Object.keys(s)) { lT++; if (s[k] > 0) lC++; }
                  const b = fc.b || {};
                  let bT = 0, bC = 0;
                  for (const k of Object.keys(b)) { for (const c of b[k]) { bT++; if (c > 0) bC++; } }
                  summary[fp] = {
                    lines: { pct: lT === 0 ? 100 : (lC / lT) * 100 },
                    branches: { pct: bT === 0 ? 100 : (bC / bT) * 100 },
                  };
                }
              }

              const entries = [];
              let cur = null;
              for (const line of toml.split('\n')) {
                if (line.trim() === '[[files]]') { cur = { path: '', branches: false }; entries.push(cur); continue; }
                if (!cur) continue;
                const pm = line.match(/^path\s*=\s*\"(.+)\"/);
                if (pm) cur.path = pm[1];
                const bm = line.match(/^branches\s*=\s*true/);
                if (bm) cur.branches = true;
              }
              let ok = 0, fail = 0;
              console.log('| File | Lines | Branch | Status |');
              console.log('|------|-------|--------|--------|');
              for (const e of entries) {
                const absPath = path.resolve(cwd, e.path);
                const s = summary[absPath];
                if (!s) { console.log('| ' + e.path + ' | - | - | ⚠️ not found |'); fail++; continue; }
                const linesPct = Math.round(s.lines.pct * 100) / 100;
                const branchPct = Math.round(s.branches.pct * 100) / 100;
                const linesOk = linesPct === 100;
                const branchOk = !e.branches || branchPct === 100;
                const passed = linesOk && branchOk;
                if (passed) ok++; else fail++;
                console.log('| ' + e.path + ' | ' + linesPct + '% | ' + branchPct + '% | ' + (passed ? '✅' : '❌') + ' |');
              }
              console.log('');
              console.log('**Result:** ' + ok + ' passed, ' + fail + ' failed / ' + entries.length + ' registered');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ inputs.working_directory }}/coverage/
          retention-days: 30

  typecheck:
    name: Type Check
    needs: [pr-limit]
    if: >-
      always() &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check
        run: |
          CMD="${{ inputs.typecheck_command }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx tsc --noEmit"
            else
              CMD="npx nuxi typecheck"
            fi
          fi
          eval "$CMD"

  integration-test:
    name: API Integration
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_integration &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      # 解決した backend image SHA。report-compatibility がこれを記録するので、
      # 「test した image == 記録 image」が保証される (truthful 突合)。
      backend_image: ${{ steps.resolve-backend.outputs.image }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      # has_integration: true なのに compat_backend_repo が未設定 = backend を
      # 相手に test しているのに Release Wave compatibility edge を記録しない
      # 設定忘れ。silent にグラフから漏れるのを防ぐため loud fail で炙り出す。
      # 意図的に compat report しない integration test は compat_backend_repo:
      # 'none' を明示して opt-out する。
      - name: Require compatibility wiring
        if: inputs.compat_backend_repo == ''
        run: |
          echo "::error::has_integration: true ですが compat_backend_repo が未設定です。integration test は backend を相手に走るので、Release Wave compatibility edge を記録するために compat_backend_repo (例: ippoan/rust-alc-api) と compat_backend_image_env (例: API_IMAGE) を設定してください。backend を相手にしない / 意図的に compat report しない integration test は compat_backend_repo: 'none' を明示して opt-out できます。"
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch init_local_db.sql from rust-alc-api
        run: |
          mkdir -p tests/fixtures
          curl -sfL "https://raw.githubusercontent.com/ippoan/rust-alc-api/main/scripts/init_local_db.sql" \
            -o tests/fixtures/init_local_db.sql

      # compat_backend_repo 指定時、記録対象の backend SHA を test 前に解決する。
      # compat_backend_image_env が指定されていれば、その env 名で
      # `ghcr.io/<repo>:<sha>` を export し、compose が **記録する SHA と同じ
      # image** で API を立てる (truthful 突合)。SHA が解決できなければ何もせず
      # compose は自前 default に従う (従来挙動)。出力 `image` は
      # report-compatibility が記録 SHA として使う。
      - name: Resolve backend image (compatibility)
        id: resolve-backend
        if: inputs.compat_backend_repo != '' && inputs.compat_backend_repo != 'none'
        working-directory: ${{ github.workspace }}
        env:
          CI_DASHBOARD_BASE: ${{ inputs.ci_dashboard_base_url }}
          BACKEND_REPO: ${{ inputs.compat_backend_repo }}
          BACKEND_IMAGE: ${{ inputs.compat_backend_image }}
          IMAGE_ENV_NAME: ${{ inputs.compat_backend_image_env }}
          WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          # compat_backend_repo を指定したら compat_backend_image_env も必須。
          # 無いと「compose default (:dev 等) で test したのに現 SHA を記録」と
          # いう truthful でない緑が黙って出るため、配線忘れを fail で強制検出する。
          if [[ -z "$IMAGE_ENV_NAME" ]]; then
            echo "::error::compat_backend_repo を指定する場合は compat_backend_image_env も必須です。docker-compose が backend image を読む env 名 (例: API_IMAGE) を渡してください。記録 SHA と同じ image で integration test を回す (truthful 突合) ため。compat 報告自体を止めるなら compat_backend_repo を外してください。"
            exit 1
          fi
          image="$BACKEND_IMAGE"
          if [[ -z "$image" && -n "$WEBHOOK_SECRET" ]]; then
            url="$CI_DASHBOARD_BASE/webhooks/release-wave/backend-current-image?repo=$BACKEND_REPO"
            resp=$(curl -sS -w '\n%{http_code}' \
              -H "X-Release-Wave-Webhook-Secret: $WEBHOOK_SECRET" "$url" || echo $'\n000')
            code=$(printf '%s' "$resp" | tail -1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [[ "$code" == "200" ]]; then
              image=$(printf '%s' "$body" | jq -r '.current_image // ""')
            else
              echo "::notice::backend-current-image returned $code; integration test will use compose default image."
            fi
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          # compose の image env を、解決した SHA で上書き (env 名が指定された時のみ)。
          # env 名は caller config (trusted)。値は jq 由来の SHA。
          if [[ -n "$image" && -n "$IMAGE_ENV_NAME" ]]; then
            echo "${IMAGE_ENV_NAME}=ghcr.io/${BACKEND_REPO}:${image}" >> "$GITHUB_ENV"
            echo "::notice::integration test will run against ghcr.io/${BACKEND_REPO}:${image} (recorded SHA)"
          fi

      - name: Start API + DB containers
        run: docker compose -f ${{ inputs.integration_compose_file }} up -d --wait
        timeout-minutes: 5

      - name: Run integration tests
        run: |
          # Parse space-separated KEY=VALUE pairs into env vars
          for pair in ${{ inputs.integration_env }}; do
            export "$pair"
          done
          ${{ inputs.integration_test_command }}

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f ${{ inputs.integration_compose_file }} logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f ${{ inputs.integration_compose_file }} down -v

  # integration test が green な時、この frontend がどの backend image を相手に
  # test したかを ci-dashboard に記録する (Release Wave compatibility のデータ源)。
  # opt-in: compat_backend_repo が空なら job 自体が skip され既存挙動に無影響。
  # retest (repository_dispatch: release-wave-retest) 経路では caller が
  # compat_backend_image に dispatch payload の image を渡す。
  report-compatibility:
    name: Report Compatibility
    needs: [integration-test]
    if: >-
      always() &&
      inputs.compat_backend_repo != '' &&
      inputs.compat_backend_repo != 'none' &&
      needs.integration-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: ippoan/ci-workflows/.github/actions/report-frontend-compat@main
        with:
          ci_dashboard_base_url: ${{ inputs.ci_dashboard_base_url }}
          backend_repo: ${{ inputs.compat_backend_repo }}
          # integration-test が解決・使用した SHA をそのまま記録する (test した
          # image == 記録 image)。明示 input があればそれを優先 (retest 経路)。
          backend_image: ${{ inputs.compat_backend_image != '' && inputs.compat_backend_image || needs.integration-test.outputs.backend_image }}
          prod_version: ${{ github.ref_name }}
          webhook_secret: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}

  # secret-verify は test/typecheck/integration-test の **後**、deploy の
  # **前**。GCP Secret Manager に missing がある状態で wrangler deploy する
  # と worker が起動時に env 参照で死ぬので、deploy を block する位置に置く。
  # opt-in 3 input が空のときは skip され、deploy 側は skip を success
  # 扱いで進める (= backward compat、既存 caller 無影響)。
  #
  # ⚠ Caller permissions 要件:
  # 本 job は nested 内蔵で `secret-verify-gcp.yml` を呼ぶため
  # `permissions: id-token: write` を要求する。これは **`if:` で skip
  # される run でも reusable workflow の parse 段階で caller permissions
  # check が走るため**、caller が `id-token: write` を declare していないと
  # workflow 全体が `startup_failure` になる (job 起動前にエラー、ログ出ず)。
  # caller の `jobs.<id>:` または top-level の `permissions:` で必ず
  # `id-token: write` を declare すること。詳細は本 repo CLAUDE.md。
  # caller の wrangler が `secrets_store_secrets` を 1 つでも宣言している
  # のに `gcp_secret_verify_*` opt-in が空のとき、secret-verify job が skip
  # されて Secrets Store の整合が一切検証されないまま deploy される事故を
  # 防ぐ gate。verify が opt-in (3 input が揃ってる) ときはこの gate 自体
  # が skip される (= secret-verify が実際に走るので gate 不要)。
  #
  # wrangler が無い (= 非 worker) / `secrets_store_secrets` ゼロ件の repo は
  # この gate を素通りする (= 既存 nuxt / Secrets Store 未使用 worker は無影響)。
  secret-verify-required:
    name: secret-verify-required
    if: |
      (inputs.gcp_secret_verify_project == '' && vars.GCP_PROJECT_ID_STAGING == '') ||
      (inputs.gcp_secret_verify_provider == '' && vars.GCP_WIF_PROVIDER == '') ||
      (inputs.gcp_secret_verify_sa == '' && vars.GCP_WIF_SERVICE_ACCOUNT_STAGING == '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Fail if wrangler declares secrets_store_secrets without verify config
        env:
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
          WRANGLER_PATH: ${{ inputs.gcp_secret_verify_wrangler_path }}
        run: |
          set -euo pipefail
          cd "$WORKING_DIRECTORY"
          python3 <<'PY'
          import json, os, re, sys
          from pathlib import Path

          wp = os.environ.get("WRANGLER_PATH", "").strip()
          candidates = [Path(wp)] if wp else [
              Path("wrangler.jsonc"),
              Path("wrangler.json"),
              Path("wrangler.toml"),
          ]
          target = next((c for c in candidates if c.exists()), None)
          if target is None:
              print("No wrangler config found; gate not applicable.")
              sys.exit(0)

          def strip_jsonc_comments(text):
              out, i, in_str, q = [], 0, False, None
              while i < len(text):
                  ch = text[i]
                  if in_str:
                      out.append(ch)
                      if ch == "\\" and i + 1 < len(text):
                          out.append(text[i + 1]); i += 2; continue
                      if ch == q:
                          in_str = False
                      i += 1; continue
                  if ch == '"':
                      in_str, q = True, ch
                      out.append(ch); i += 1; continue
                  if ch == "/" and i + 1 < len(text):
                      nxt = text[i + 1]
                      if nxt == "/":
                          while i < len(text) and text[i] != "\n":
                              i += 1
                          continue
                      if nxt == "*":
                          i += 2
                          while i + 1 < len(text) and not (text[i] == "*" and text[i + 1] == "/"):
                              i += 1
                          i += 2; continue
                  out.append(ch); i += 1
              return "".join(out)

          def count_bindings(node):
              n = 0
              if isinstance(node, dict):
                  v = node.get("secrets_store_secrets")
                  if isinstance(v, list):
                      n += sum(1 for x in v if isinstance(x, dict))
                  for child in node.values():
                      n += count_bindings(child)
              elif isinstance(node, list):
                  for item in node:
                      n += count_bindings(item)
              return n

          ext = target.suffix.lower()
          if ext in (".jsonc", ".json"):
              raw = target.read_text(encoding="utf-8")
              cleaned = re.sub(r",(\s*[}\]])", r"\1", strip_jsonc_comments(raw))
              try:
                  data = json.loads(cleaned)
              except json.JSONDecodeError as e:
                  print(f"::error file={target}::Failed to parse JSON: {e}", file=sys.stderr)
                  sys.exit(1)
          elif ext == ".toml":
              try:
                  import tomllib
              except ImportError:
                  print("::error::Python 3.11+ required for tomllib", file=sys.stderr)
                  sys.exit(1)
              with target.open("rb") as fh:
                  data = tomllib.load(fh)
          else:
              print(f"::error::Unsupported wrangler config extension: {ext}", file=sys.stderr)
              sys.exit(1)

          count = count_bindings(data)
          if count == 0:
              print(f"{target}: no secrets_store_secrets bindings; gate clears.")
              sys.exit(0)

          msg = (
              f"{target} declares {count} secrets_store_secrets binding(s) but "
              "neither the caller inputs (gcp_secret_verify_project/provider/sa) "
              "nor the org vars (GCP_PROJECT_ID_STAGING / GCP_WIF_PROVIDER / "
              "GCP_WIF_SERVICE_ACCOUNT_STAGING) are populated. Secret-verify is "
              "mandatory when Secrets Store is used."
          )
          print(f"::error file={target}::{msg}", file=sys.stderr)
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as fh:
                  fh.write("# ❌ secret-verify required\n\n")
                  fh.write(f"{msg}\n\n")
                  fh.write("## Fix (recommended)\n\n")
                  fh.write("Set the **org-level vars** once at the GitHub org "
                           "settings — every consumer repo picks them up "
                           "automatically with no caller change:\n\n")
                  fh.write("| Var | Value (example) |\n")
                  fh.write("|---|---|\n")
                  fh.write("| `GCP_PROJECT_ID_STAGING` | `cloudsql-sv` |\n")
                  fh.write("| `GCP_WIF_PROVIDER` | `projects/.../providers/github` |\n")
                  fh.write("| `GCP_WIF_SERVICE_ACCOUNT_STAGING` | `staging-deploy@<project>.iam.gserviceaccount.com` |\n\n")
                  fh.write("## Fix (per-caller override)\n\n")
                  fh.write("```yaml\nwith:\n")
                  fh.write("  gcp_secret_verify_project: cloudsql-sv\n")
                  fh.write("  gcp_secret_verify_provider: <WIF provider full resource name>\n")
                  fh.write("  gcp_secret_verify_sa: <verify SA email>\n")
                  fh.write("  gcp_secret_verify_apply_labels: true  # optional\n")
                  fh.write("```\n\n")
                  fh.write("Caller permissions must include `id-token: write`.\n")
          sys.exit(1)
          PY

  secret-verify:
    name: secret-verify
    # `always()` で needs 中の `skipped` (例: has_integration=false の
    # integration-test) を許容する。これが無いと GitHub Actions の default
    # 動作で needs に skip が混ざった瞬間 dependency-skip cascade で本 job
    # も skipped になり、`if:` 評価すらされず verify が動かない。
    if: >-
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (inputs.gcp_secret_verify_project != '' || vars.GCP_PROJECT_ID_STAGING != '') &&
      (inputs.gcp_secret_verify_provider != '' || vars.GCP_WIF_PROVIDER != '') &&
      (inputs.gcp_secret_verify_sa != '' || vars.GCP_WIF_SERVICE_ACCOUNT_STAGING != '')
    needs: [test, typecheck, integration-test]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/secret-verify-gcp.yml
    with:
      project: ${{ inputs.gcp_secret_verify_project != '' && inputs.gcp_secret_verify_project || vars.GCP_PROJECT_ID_STAGING }}
      repo_type: worker
      wrangler_path: ${{ inputs.gcp_secret_verify_wrangler_path }}
      workload_identity_provider: ${{ inputs.gcp_secret_verify_provider != '' && inputs.gcp_secret_verify_provider || vars.GCP_WIF_PROVIDER }}
      service_account: ${{ inputs.gcp_secret_verify_sa != '' && inputs.gcp_secret_verify_sa || vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}
      apply_labels: ${{ inputs.gcp_secret_verify_apply_labels }}

  deploy-staging:
    name: Deploy Staging
    needs: [test, typecheck, integration-test, branch-protection, secret-verify-required, secret-verify]
    if: >-
      always() &&
      inputs.has_deploy &&
      inputs.has_staging_deploy &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.branch-protection.result == 'success' || needs.branch-protection.result == 'skipped') &&
      (needs.secret-verify-required.result == 'success' || needs.secret-verify-required.result == 'skipped') &&
      (needs.secret-verify.result == 'success' || needs.secret-verify.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CMD="${{ inputs.deploy_staging_script }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx wrangler deploy --env staging"
            else
              CMD="npm run build && npx wrangler deploy --env staging"
            fi
          fi
          eval "$CMD"

  deploy-release:
    name: Deploy Release
    needs: [test, typecheck, integration-test]
    if: >-
      always() &&
      inputs.has_deploy &&
      startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to production
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RELEASE_SCRIPT: ${{ inputs.deploy_release_script }}
          PROJECT_TYPE: ${{ inputs.project_type }}
          RELEASE_NO_TRAFFIC: ${{ inputs.release_no_traffic }}
          # no-traffic release を report する先 (Refs ippoan/ci-dashboard#181)。
          CI_DASHBOARD_BASE: ${{ inputs.ci_dashboard_base_url }}
          RELEASE_WAVE_WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          CMD="$RELEASE_SCRIPT"
          if [ -z "$CMD" ]; then
            if [ "$PROJECT_TYPE" = "worker" ]; then
              CMD="npx wrangler deploy"
            else
              CMD="npm run build && npx wrangler deploy"
            fi
          fi
          # 全 frontend 共通 no-traffic release (Refs ippoan/ci-dashboard#174):
          # `wrangler deploy` (= 即 100% traffic) を `wrangler versions upload`
          # (no-traffic version 作成) に置換する。traffic flip は Cloudflare
          # ダッシュボード / `wrangler versions deploy <id>@100%` で明示的に行う。
          # `wrangler versions upload` は --var / --env 等の flag をそのまま受ける
          # ので、caller の deploy_release_script の置換で足りる。
          NO_TRAFFIC_UPLOAD=false
          if [ "$RELEASE_NO_TRAFFIC" = "true" ]; then
            if printf '%s' "$CMD" | grep -q 'wrangler deploy'; then
              CMD="${CMD//wrangler deploy/wrangler versions upload}"
              NO_TRAFFIC_UPLOAD=true
            elif printf '%s' "$CMD" | grep -q 'wrangler versions upload'; then
              : # 既に no-traffic (caller が直接 versions upload を指定) — そのまま
              NO_TRAFFIC_UPLOAD=true
            else
              # release_no_traffic=true だが置換対象が無い → no-traffic を保証
              # できない。silent に traffic deploy せず loud に fail させる
              # (silent な 100% deploy 事故を防ぐ)。Refs ippoan/ci-dashboard#174。
              echo "::error::release_no_traffic=true だが deploy script に 'wrangler deploy' / 'wrangler versions upload' が無く no-traffic を保証できません。"
              echo "::error::deploy_release_script を見直すか、即 100% deploy で良いなら release_no_traffic: false を指定してください。"
              echo "::error::script: $CMD"
              exit 1
            fi
          fi
          echo "release deploy: $CMD"
          # 出力を capture しつつログにも出す (version id / preview URL 抽出用)。
          OUT=$(eval "$CMD" 2>&1)
          rc=$?
          printf '%s\n' "$OUT"
          if [ "$rc" -ne 0 ]; then
            echo "::error::release deploy failed (rc=$rc)"
            exit "$rc"
          fi

          # この deploy で生成した version id を後続 step (traffic-report) に渡す。
          # traffic-report はこれを「今 upload した version」として tag (= 今の
          # release tag) を紐付ける。100% deploy / no-traffic upload どちらでも
          # wrangler は "Version ID:" / "Worker Version ID:" を出す。
          VID=$(printf '%s' "$OUT" | grep -oiE 'Version ID:[[:space:]]+[0-9a-f-]+' | tail -1 | awk '{print $NF}')
          echo "uploaded_version_id=${VID:-}" >> "$GITHUB_OUTPUT"

          # ---- pending-release report (Refs ippoan/ci-dashboard#181) ----
          # no-traffic upload した version を ci-dashboard に登録し、
          # /release-wave の「Pending releases」から Flip できるようにする。
          # best-effort: 失敗してもリリース自体は止めない。
          if [ "$NO_TRAFFIC_UPLOAD" != "true" ]; then
            exit 0
          fi
          PREVIEW=$(printf '%s' "$OUT" | grep -iE 'preview url' | grep -oiE 'https://[a-z0-9._-]+\.workers\.dev[^[:space:]]*' | head -1 || true)
          if [ -z "$VID" ]; then
            echo "::warning::could not parse Version ID from wrangler output; skip pending-release report"
            exit 0
          fi
          if [ -z "${RELEASE_WAVE_WEBHOOK_SECRET:-}" ]; then
            echo "::notice::RELEASE_WAVE_WEBHOOK_SECRET 未設定のため pending-release report を skip"
            exit 0
          fi
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg version_id "$VID" \
            --arg tag "$TAG" \
            --arg preview_url "$PREVIEW" \
            '{repo: $repo, version_id: $version_id, tag: $tag, preview_url: $preview_url}
             | with_entries(select(.value != ""))')
          echo "reporting pending release: repo=$REPO version_id=$VID tag=$TAG"
          curl -fsS -X POST "$CI_DASHBOARD_BASE/webhooks/release-wave/pending-release" \
            -H "X-Release-Wave-Webhook-Secret: $RELEASE_WAVE_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "::warning::pending-release report failed (best-effort)"

      # ---- traffic-report (Refs ippoan/ci-dashboard#137) ----
      # deploy 後の worker version traffic split を ci-dashboard に報告し、
      # /release-wave の Compatibility グラフ下に「どの version が 100% (active) /
      # 0% (no-traffic / promote 待ち) で、それぞれいつ deploy/upload されたか」を
      # 出す。
      #
      # 2 つの wrangler 出力をマージする:
      #   - `deployments list`: active deployment の versions[] (version_id →
      #     percentage)。通常 100% の 1 件。0% version は **含まれない**。
      #   - `versions list`: 直近 version 群 (id + metadata.created_on)。
      #     percentage は持たない。
      # → versions list の全 version に、deployments list の percentage を join
      #   (無ければ 0%)、created_on を付けて報告する。これで 0% (promote 待ち) の
      #   version も日時付きで出せる。
      #
      # 方針: best-effort ではなく **失敗したら CI を block** する (user 指定)。
      # secret 未設定 / wrangler 取得失敗 / parse 失敗 / POST 失敗のいずれも fail。
      # 注意: wrangler / npm は stdout に warning ("▲ WARNING ..." / npm warn) を
      # 混ぜるため、stderr は分離し、stdout も最初の '[' 以降だけ取り出して JSON
      # 先頭の non-JSON 行を捨てる (さもないと jq parse error)。
      - name: Report version traffic split
        if: inputs.has_deploy && startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CI_DASHBOARD_BASE: ${{ inputs.ci_dashboard_base_url }}
          RELEASE_WAVE_WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
          REPO: ${{ github.repository }}
          # 今 upload した version_id と、その release tag (github.ref_name)。
          # この version にだけ tag を紐付けて報告する。ci-dashboard は
          # version_id 単位に tag を merge 蓄積するので、過去 version の tag は残る。
          UPLOADED_VID: ${{ steps.deploy.outputs.uploaded_version_id }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_WAVE_WEBHOOK_SECRET:-}" ]; then
            echo "::error::RELEASE_WAVE_WEBHOOK_SECRET が未設定のため traffic-report を送れません。"
            echo "::error::org secret RELEASE_WAVE_WEBHOOK_SECRET を caller に渡す (secrets: inherit) か、"
            echo "::error::traffic 表示が不要なら deploy-release を持たない構成にしてください。"
            exit 1
          fi

          # stdout から最初の JSON 配列だけを取り出す helper (warning 行除去)。
          strip_json() { sed -n '/^[[:space:]]*\[/,$p'; }

          # 1) deployments list → active deployment の version_id → percentage。
          d_err="$(mktemp)"
          D_RAW=$(npx --yes wrangler deployments list --json 2>"$d_err") || {
            echo "::error::wrangler deployments list failed:"; printf '%s\n' "$D_RAW"; cat "$d_err" >&2; exit 1
          }
          DEPLOYMENTS=$(printf '%s' "$D_RAW" | strip_json)
          if [ -z "$DEPLOYMENTS" ]; then
            echo "::error::wrangler deployments list output had no JSON array:"; printf '%s\n' "$D_RAW"; exit 1
          fi
          # 現行 deployment = created_on 昇順の末尾 (.[-1])。version_id→percentage の object に。
          pct_map=$(printf '%s' "$DEPLOYMENTS" | jq -c '
            (if type == "array" then (.[-1] // {}) else . end)
            | (.versions // [])
            | map({ key: (.version_id // .id // ""), value: (.percentage // 0) })
            | map(select(.key != ""))
            | from_entries
          ') || { echo "::error::failed to parse deployments list:"; printf '%s\n' "$DEPLOYMENTS"; exit 1; }

          # 2) versions list → 直近 version 群 (id + created_on)。
          v_err="$(mktemp)"
          V_RAW=$(npx --yes wrangler versions list --json 2>"$v_err") || {
            echo "::error::wrangler versions list failed:"; printf '%s\n' "$V_RAW"; cat "$v_err" >&2; exit 1
          }
          VERSIONS=$(printf '%s' "$V_RAW" | strip_json)
          if [ -z "$VERSIONS" ]; then
            echo "::error::wrangler versions list output had no JSON array:"; printf '%s\n' "$V_RAW"; exit 1
          fi

          # 3) join: 各 version に percentage (pct_map に無ければ 0) と created_on を付け、
          #    今 upload した version (UPLOADED_VID) にだけ release tag を紐付ける。
          #    他 version の tag は null (ci-dashboard 側で既存 record から merge 保持)。
          versions=$(jq -nc \
            --argjson pct "$pct_map" \
            --argjson vers "$VERSIONS" \
            --arg uploaded "${UPLOADED_VID:-}" \
            --arg tag "${TAG:-}" '
            $vers
            | map({
                version_id: (.id // .version_id // ""),
                percentage: ($pct[(.id // .version_id // "")] // 0),
                created_on: (.metadata.created_on // .created_on // null),
                tag: (if ($uploaded != "" and (.id // .version_id // "") == $uploaded and $tag != "")
                      then $tag else null end)
              })
            | map(select(.version_id != ""))
          ') || { echo "::error::failed to join versions/deployments"; exit 1; }

          n=$(printf '%s' "$versions" | jq 'length')
          if [ "$n" -eq 0 ]; then
            echo "::error::no versions parsed (deployments=$DEPLOYMENTS versions=$VERSIONS)"
            exit 1
          fi

          payload=$(jq -nc --arg repo "$REPO" --argjson versions "$versions" \
            '{repo: $repo, versions: $versions}')
          echo "reporting traffic split: repo=$REPO versions=$versions"
          curl -fsS -X POST "$CI_DASHBOARD_BASE/webhooks/release-wave/traffic-report" \
            -H "X-Release-Wave-Webhook-Secret: $RELEASE_WAVE_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload"
          echo ""
          echo "✅ traffic split reported"

  publish-dev:
    name: Publish Dev
    needs: [test, typecheck]
    if: >-
      always() &&
      inputs.npm_publish_directory != '' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: ${{ inputs.npm_scope }}

      - name: Set dev version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_PUBLISH_DIRECTORY: ${{ inputs.npm_publish_directory }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          # `npm_publish_directory` accepts a single path or a comma-separated
          # list (monorepo). Loop and publish each. Each loop iteration uses
          # its own working directory so the surrounding `working-directory:`
          # has been moved into the step body.
          IFS=',' read -ra DIRS <<<"$NPM_PUBLISH_DIRECTORY"
          for RAW_DIR in "${DIRS[@]}"; do
            DIR="$(echo "$RAW_DIR" | xargs)"  # trim surrounding whitespace
            [ -z "$DIR" ] && continue
            pushd "$GITHUB_WORKSPACE/$DIR" >/dev/null
            # Dev tag versioning: `0.0.<PR>-dev.<SHA>`. Patch-only increment
            # keeps the dev channel below any stable 0.1+ that has shipped
            # to `latest`; `--tag dev` keeps the channels disjoint anyway.
            VERSION="0.0.${PR_NUMBER}-dev.${SHORT_SHA}"
            PKG_NAME=$(node -p "require('./package.json').name")
            # rerun 耐性: 既に同 SHA で publish 済なら skip (409 Conflict 回避)。
            # PR の同一 commit に対して何回 rerun しても idempotent。
            if npm view "${PKG_NAME}@${VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
              echo "::notice ::Already published ${PKG_NAME}@${VERSION} (rerun no-op)"
              echo "### ⏭ Skipped \`${PKG_NAME}@${VERSION}\` (already published)" >> "$GITHUB_STEP_SUMMARY"
              popd >/dev/null
              continue
            fi
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            echo "@ippoan:registry=https://npm.pkg.github.com" > .npmrc
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
            npm publish --tag dev
            echo "### 📦 Published \`$(node -p "require('./package.json').name")@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
            popd >/dev/null
          done

  publish-release:
    name: Publish Release
    needs: [test, typecheck, integration-test, deploy-release]
    if: >-
      always() &&
      inputs.npm_publish_directory != '' &&
      startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.deploy-release.result == 'success' || needs.deploy-release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: ${{ inputs.npm_scope }}

      - name: Set release version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_PUBLISH_DIRECTORY: ${{ inputs.npm_publish_directory }}
        run: |
          set -euo pipefail
          # Extract version from tag: v0.2.3 → 0.2.3
          VERSION="${GITHUB_REF_NAME#v}"
          # `npm_publish_directory` accepts a single path or a comma-separated
          # list. Loop and publish each — all packages share the same tag
          # version (monorepo lock-step). Independent versioning per package
          # would require per-package tags (e.g. `auth-client/v0.2.3`), which
          # is out of scope here.
          IFS=',' read -ra DIRS <<<"$NPM_PUBLISH_DIRECTORY"
          for RAW_DIR in "${DIRS[@]}"; do
            DIR="$(echo "$RAW_DIR" | xargs)"
            [ -z "$DIR" ] && continue
            pushd "$GITHUB_WORKSPACE/$DIR" >/dev/null
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            echo "@ippoan:registry=https://npm.pkg.github.com" > .npmrc
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
            npm publish
            echo "### 📦 Published \`$(node -p "require('./package.json').name")@${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
            popd >/dev/null
          done

  propagate:
    name: Propagate Package
    needs: [publish-release]
    if: >-
      always() &&
      inputs.npm_publish_propagate_repos != '' &&
      needs.publish-release.result == 'success'
    uses: ippoan/ci-workflows/.github/workflows/propagate-package.yml@main
    with:
      package_name: ${{ inputs.npm_publish_name }}
      package_version: ''
      target_repos: ${{ inputs.npm_publish_propagate_repos }}
      working_directories: ${{ inputs.npm_publish_propagate_dirs }}
      npm_scope: ${{ inputs.npm_scope }}
    secrets:
      PAT: ${{ secrets.PROPAGATE_PAT }}

  auto-merge:
    name: Auto Merge
    needs: [test, typecheck, integration-test, branch-protection, secret-verify-required, secret-verify, deploy-staging]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.branch-protection.result == 'success' || needs.branch-protection.result == 'skipped') &&
      (needs.secret-verify-required.result == 'success' || needs.secret-verify-required.result == 'skipped') &&
      (needs.secret-verify.result == 'success' || needs.secret-verify.result == 'skipped') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    permissions:
      contents: write
      pull-requests: write
    # `secrets: inherit` is required so the nested auto-merge.yml sees the
    # org-level `TAG_RELEASE_PAT` (which carries the `workflow` scope needed
    # to merge PRs touching `.github/workflows/**`). Without inherit the
    # nested call falls back to `github.token`, which lacks `workflow` scope
    # and returns HTTP 401 "Bad credentials" from the merge mutation while
    # leaving `gh pr view` working — see ippoan/mcp-cf-workers#3.
    secrets: inherit
