name: Auto Merge
# smoke: verify App-token mint on the new auto-merge path (ippoan-ci-bot). Refs #65

on:
  workflow_call:
    secrets:
      CI_APP_ID:
        description: |
          GitHub App ID (org secret). When set together with
          `CI_APP_PRIVATE_KEY`, an installation access token is minted at
          runtime via `actions/create-github-app-token` and used in
          preference to any PAT below.

          Why this is preferred: a merge performed with an App token pushes
          the `push: main` (and `pull_request: closed`) events as the App
          actor — NOT `github-actions[bot]` — so downstream workflows
          (release.yml chain, dev-tag-release, post-merge close jobs) DO
          fire. The App's installation permissions (Contents / Pull requests
          / Workflows = write) also cover merging PRs that touch
          `.github/workflows/**`. And the App has its own rate-limit bucket,
          so it does not exhaust an individual user's 5,000 pts/hr GraphQL
          quota (the cause of the intermittent "API rate limit already
          exceeded for user ID" failures on `gh pr merge --auto`).
        required: false
      CI_APP_PRIVATE_KEY:
        description: |
          PEM private key for the GitHub App identified by `CI_APP_ID`
          (org secret, multi-line). Required alongside `CI_APP_ID`.
        required: false
      AUTO_MERGE_PAT:
        description: |
          Optional PAT (legacy name). Fallback used only when the GitHub App
          secrets above are not set. If set, takes precedence over
          `TAG_RELEASE_PAT`. Both fall back to `github.token` when unset.
        required: false
      TAG_RELEASE_PAT:
        description: |
          Org-standard PAT used across `tag-release.yml` /
          `dev-tag-release.yml`. Fallback used only when the GitHub App
          secrets are not set. Required scopes: `repo` + `workflow`
          (classic) or Contents/PR/Workflow Read-Write (fine-grained).
          `workflow` scope is required to merge PRs that touch
          `.github/workflows/**` — without it the merge mutation fails with
          HTTP 401 "Bad credentials" even though `gh pr view` succeeds with
          the same token (ippoan/mcp-cf-workers#3 で実害発生)。
        required: false

jobs:
  auto-merge:
    name: Auto Merge
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # App ID は数値で非機密。step `if:` の gate に使うため job-level env に置く
      # (env context は if で参照可、secrets context は不可)。private key は
      # env に置かず create-github-app-token の `with:` に直接渡す。
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
    steps:
      # GitHub App installation token を mint (org が CI_APP_ID/KEY を設定済の時)。
      # 未設定の caller は skip され、下の GH_TOKEN は PAT → github.token に fallback
      # するので後方互換。
      - name: Mint GitHub App installation token (preferred over PAT)
        id: app-token
        if: env.CI_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Check mergeable and queue squash merge
        env:
          # 優先順位: App token > AUTO_MERGE_PAT > TAG_RELEASE_PAT > github.token。
          # App token / PAT は merge commit の push actor を非 GITHUB_TOKEN にする
          # ため、resulting `push: main` / `pull_request: closed` イベントが
          # downstream workflow を発火させられる (= release.yml chain 等)。
          # github.token だと github-actions[bot] 扱いになり Actions に無視される
          # (ippoan/mcp-relay-rs#21 の silent skip 実害)。App token なら個人 PAT の
          # GraphQL クォータも食わない (rate-limit cosmetic fail 回避)。
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.AUTO_MERGE_PAT || secrets.TAG_RELEASE_PAT || github.token }}
        run: |
          PR=${{ github.event.number }}
          REPO=${{ github.repository }}
          MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable --jq .mergeable)
          echo "PR #$PR mergeable: $MERGEABLE"
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "::error::PR #$PR has merge conflicts. Resolve conflicts before merging."
            exit 1
          fi
          # `--auto` queues the merge so GitHub fires it once all required
          # status checks + branch-protection gates clear. Without `--auto`,
          # this job tries to merge immediately and gets rejected with
          # "base branch policy prohibits the merge" because the very job
          # that's running IS one of the required checks (chicken/egg).
          gh pr merge "$PR" --auto --squash --repo "$REPO"
