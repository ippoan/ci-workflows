name: Symbol Index

# cross-repo symbol index の generator (reusable)。
#
# caller repo の main push 時に呼ぶ。universal-ctags でソースから symbol を抽出し
# (依存ビルド不要)、ci-dashboard の D1 (POST /webhooks/symbol-index、CF Access
# bypass 配下) に投入する。初回フル → 以後は前回 head_sha からの git 差分のみ。
#
# install.sh で cold に走らせると毎 session 依存解決を繰り返すため、CI 側で
# 行う。消費側 (Claude) は ci-dashboard の search_symbols を呼ぶだけ。
#
# 設計: ippoan/claude-skills の cross-repo-symbol-index skill。
# スクリプト: scripts/build-payload.mjs。投入先: ippoan/ci-dashboard。
#
# 呼び出し例 (caller):
#   symbol-index:
#     needs: [test]
#     uses: ippoan/ci-workflows/.github/workflows/symbol-index.yml@main
#     secrets:
#       ingest_secret: ${{ secrets.SYMBOL_INDEX_INGEST_SECRET }}

on:
  workflow_call:
    inputs:
      repo_name:
        description: "index に記録する短い repo 名 (default: このリポジトリ名)"
        type: string
        required: false
        default: ${{ github.event.repository.name }}
      ingest_url:
        description: "ci-dashboard の ingest endpoint"
        type: string
        required: false
        default: https://ci-dashboard.ippoan.org/webhooks/symbol-index
      languages:
        description: "ctags の --languages フィルタ (カンマ区切り)。空 = 全言語"
        type: string
        required: false
        default: ""
      scripts_ref:
        description: "generator スクリプトを取得する ci-workflows の ref"
        type: string
        required: false
        default: main
    secrets:
      ingest_secret:
        description: "ingest endpoint の Bearer secret (SYMBOL_INDEX_INGEST_SECRET)"
        required: true

permissions:
  contents: read

jobs:
  symbol-index:
    name: Extract & push symbols
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          # incremental の git diff に履歴が要るが fetch-depth:0 (全履歴) は遅い。
          # 直近 200 commit で基点が辿れなければ full に倒す (下の fallback)。
          fetch-depth: 200

      - name: Install universal-ctags
        run: |
          set -euo pipefail
          # runner の apt cache が新しければ update 無しで入る (速い)。
          # 失敗時だけ update して入れ直す (確実)。
          sudo apt-get install -y --no-install-recommends universal-ctags \
            || { sudo apt-get update && sudo apt-get install -y --no-install-recommends universal-ctags; }

      # 前回 index した head_sha を ci-dashboard から取得し、初回/基点不明なら
      # full、そうでなければ git diff で変更/削除ファイルを出して incremental。
      - name: Determine baseline (incremental vs full)
        id: baseline
        env:
          SYMBOL_REPO: ${{ inputs.repo_name }}
          INGEST_URL: ${{ inputs.ingest_url }}
        run: |
          set -euo pipefail
          last="$(curl -fsS --max-time 15 "${INGEST_URL}/head/${SYMBOL_REPO}" 2>/dev/null \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("head_sha") or "")' 2>/dev/null || echo "")"
          : > changed_files.txt
          : > deleted_files.txt
          mode=full
          if [ -n "$last" ] && git cat-file -e "${last}^{commit}" 2>/dev/null; then
            mode=incremental
            git diff --name-only --diff-filter=ACMR "$last" HEAD > changed_files.txt
            git diff --name-only --diff-filter=D   "$last" HEAD > deleted_files.txt
            echo "incremental from ${last}: changed=$(wc -l < changed_files.txt) deleted=$(wc -l < deleted_files.txt)"
          else
            echo "full scan (baseline ${last:-none} not usable)"
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

      - name: Extract symbols (ctags JSON)
        env:
          LANGS: ${{ inputs.languages }}
          MODE: ${{ steps.baseline.outputs.mode }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "incremental" ]; then
            if [ -s changed_files.txt ]; then
              if [ -n "$LANGS" ]; then
                ctags --output-format=json --fields=+ne --languages="$LANGS" -L changed_files.txt -f tags.json || true
              else
                ctags --output-format=json --fields=+ne -L changed_files.txt -f tags.json || true
              fi
            else
              : > tags.json
            fi
          else
            # full は repo 全体だが、.git / 依存 / ビルド成果物は走査しない (速度)。
            EX="--exclude=.git --exclude=node_modules --exclude=dist --exclude=.wrangler --exclude=target --exclude=coverage --exclude=build --exclude=.next"
            if [ -n "$LANGS" ]; then
              ctags -R $EX --output-format=json --fields=+ne --languages="$LANGS" -f tags.json . || true
            else
              ctags -R $EX --output-format=json --fields=+ne -f tags.json . || true
            fi
          fi
          echo "tags lines: $(wc -l < tags.json 2>/dev/null || echo 0)"

      - name: Checkout generator scripts
        uses: actions/checkout@v4
        with:
          repository: ippoan/ci-workflows
          ref: ${{ inputs.scripts_ref }}
          path: _ci-workflows
          sparse-checkout: scripts

      - name: Build payload & push to index
        env:
          SYMBOL_REPO: ${{ inputs.repo_name }}
          SYMBOL_INGEST_URL: ${{ inputs.ingest_url }}
          SYMBOL_INGEST_SECRET: ${{ secrets.ingest_secret }}
          SYMBOL_MODE: ${{ steps.baseline.outputs.mode }}
        run: |
          set -euo pipefail
          SYMBOL_SRC_HASH="$(git rev-parse 'HEAD^{tree}')"
          export SYMBOL_SRC_HASH
          export SYMBOL_CHANGED_FILE="${PWD}/changed_files.txt"
          export SYMBOL_DELETED_FILE="${PWD}/deleted_files.txt"
          node _ci-workflows/scripts/build-payload.mjs
