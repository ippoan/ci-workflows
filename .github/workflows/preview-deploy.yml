name: Preview Deploy

# 軽量な「push だけでプレビュー環境にデプロイする」ための reusable workflow。
# frontend-ci.yml (テスト/typecheck込みのフル CI、PR trigger、staging deploy)
# とは別に、UI 変更の見た目確認を主目的とした test なし・deploy のみの
# パイプライン。caller 側で `on: push` (main 以外の branch) を設定して呼ぶ想定。
#
# Refs ippoan/secrets-inventory#85

on:
  workflow_call:
    inputs:
      project_type:
        description: 'Project type: "nuxt" (build + deploy) or "worker" (deploy only)'
        type: string
        default: 'nuxt'
      working_directory:
        description: Working directory for npm commands (e.g. "web" for monorepos)
        type: string
        default: '.'
      node_version:
        description: Node.js version
        type: string
        default: '24'
      install_command:
        description: Command to install dependencies
        type: string
        default: 'npm ci'
      npm_scope:
        description: GitHub Packages scope (e.g. "@ippoan") — set when installing @ippoan/* deps
        type: string
        default: ''
      cache_dependency_path:
        description: Override cache-dependency-path for actions/setup-node
        type: string
        default: ''
      pre_install_script:
        description: Script to run before npm install
        type: string
        default: ''
      post_install_script:
        description: Script to run after npm install (e.g. "npx nuxt prepare", "npx wrangler types")
        type: string
        default: ''
      use_auth_client_dev:
        description: Whether to use the auth-client dev action
        type: boolean
        default: false
      preview_deploy_script:
        description: 'Override preview deploy script (default: auto by project_type, targets --env preview)'
        type: string
        default: ''

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CMD="${{ inputs.preview_deploy_script }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx wrangler deploy --env preview"
            else
              CMD="npm run build && npx wrangler deploy --env preview"
            fi
          fi
          eval "$CMD"
