name: Cloud Run Deploy

# GHCR に push 済みの image を Cloud Run にデプロイする reusable。
#
# 解決する落とし穴:
#  1. `gcloud run deploy` で traffic が latest 自動 shift しない → 明示的に
#     `update-traffic --to-latest` を叩く
#  2. AR (Artifact Registry) pull-through cache の `:latest` タグが stale な
#     digest を指す問題 → tag ではなく digest (`@sha256:...`) で指定する
#  3. `gcloud run services replace` は ghcr.io:// スキーム拒否 →
#     AR remote-repo 経由の参照に統一
#  4. `services update --image` は env / secret / runtime SA を触らず、初回
#     作成時の設定が必須 → declarative にしたい caller は
#     `set_env_vars` / `update_secrets` / `runtime_service_account`
#     input を使う
#
# 対象: daiun-salary, dtako-scraper, secrets-inventory-gcp など
# single-service の Cloud Run デプロイ。
# rust-alc-api のようなマルチサービス + `cloudrun/render.sh` テンプレート化された
# deploy (そちらは `services replace -f yaml`) は対象外。
#
# Auth 2 経路 (caller が選ぶ):
#  - WIF (推奨): `workload_identity_provider` + `service_account` input を渡す。
#    caller workflow の job permissions に `id-token: write` が必要。
#    `GCP_SA_KEY` secret は不要。
#  - SA JSON key (既存パターン): `GCP_SA_KEY` secret を渡す。WIF inputs は省略。
#  どちらも auth@v2 経由で ADC を立てるので、後続 gcloud は両者で共通。

on:
  workflow_call:
    inputs:
      service:
        description: 'Cloud Run service name (e.g. "daiun-salary")'
        type: string
        required: true
      region:
        description: 'GCP region'
        type: string
        default: asia-northeast1
      project:
        description: 'GCP project ID (e.g. "cloudsql-sv")'
        type: string
        required: true
      ghcr_image:
        description: 'GHCR image reference without tag (e.g. "ghcr.io/ippoan/daiun-salary")'
        type: string
        required: true
      image_tag:
        description: 'Image tag to deploy (e.g. "v0.1.2" or sha)'
        type: string
        required: true
      ar_repo:
        description: 'AR remote-repo reference matching ghcr_image (e.g. "asia-northeast1-docker.pkg.dev/cloudsql-sv/ghcr/ippoan/daiun-salary")'
        type: string
        required: true
      workload_identity_provider:
        description: 'WIF provider full resource name (e.g. "projects/123/locations/global/workloadIdentityPools/github/providers/ippoan"). 指定時は WIF auth を使い GCP_SA_KEY を要求しない。'
        type: string
        required: false
        default: ''
      service_account:
        description: 'WIF で impersonate する deployer SA email (e.g. "cloud-run-deployer-staging@cloudsql-sv.iam.gserviceaccount.com")。`workload_identity_provider` と対で指定する。これは deploy 側の SA で、Cloud Run service の attached runtime SA とは別。'
        type: string
        required: false
        default: ''
      set_env_vars:
        description: 'gcloud run --set-env-vars にそのまま渡す (KEY=VAL,KEY2=VAL2 形式)。declarative replace: workflow が env を完全に所有する semantics。空なら env を触らない。'
        type: string
        required: false
        default: ''
      update_secrets:
        description: 'gcloud run --update-secrets にそのまま渡す (ENV=SECRET:VERSION 形式)。additive update: listed な binding のみ追加/更新し、他は保持。空なら secrets を触らない。'
        type: string
        required: false
        default: ''
      runtime_service_account:
        description: 'Cloud Run service に attach する runtime SA email (e.g. "secrets-inventory-viewer@cloudsql-sv.iam.gserviceaccount.com")。gcloud run --service-account に渡す。指定時は毎 deploy で enforce され、誰かが手動で別 SA に戻しても次の deploy で自動修正される。空なら runtime SA を触らない (初回作成時の SA が保持される)。これは Cloud Run 側の SA で、WIF impersonate 対象の deployer SA (`service_account`) とは別。'
        type: string
        required: false
        default: ''
    secrets:
      GCP_SA_KEY:
        description: 'SA JSON key (WIF を使わない caller 向け、Cloud Run deploy + AR reader 権限)。WIF inputs を指定する場合は不要。'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write   # WIF auth で OIDC token を mint するため
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GCP (WIF)
        if: inputs.workload_identity_provider != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Authenticate to GCP (SA JSON key)
        if: inputs.workload_identity_provider == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve GHCR digest
        id: digest
        run: |
          IMAGE="${{ inputs.ghcr_image }}:${{ inputs.image_tag }}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{.Manifest.Digest}}')
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "<no value>" ]; then
            echo "::error::Failed to resolve digest for $IMAGE"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          {
            echo "### Cloud Run Deploy"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Service | \`${{ inputs.service }}\` |"
            echo "| Region | \`${{ inputs.region }}\` |"
            echo "| Tag | \`${{ inputs.image_tag }}\` |"
            echo "| Digest | \`$DIGEST\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy image (digest-pinned)
        env:
          SET_ENV_VARS: ${{ inputs.set_env_vars }}
          UPDATE_SECRETS: ${{ inputs.update_secrets }}
          RUNTIME_SA: ${{ inputs.runtime_service_account }}
        run: |
          AR_IMAGE="${{ inputs.ar_repo }}@${{ steps.digest.outputs.digest }}"
          echo "Deploying $AR_IMAGE to ${{ inputs.service }}..."
          ARGS=(
            --region "${{ inputs.region }}"
            --project "${{ inputs.project }}"
            --image "$AR_IMAGE"
          )
          if [ -n "$RUNTIME_SA" ]; then
            ARGS+=(--service-account "$RUNTIME_SA")
            echo "  --service-account: $RUNTIME_SA"
          fi
          if [ -n "$SET_ENV_VARS" ]; then
            ARGS+=(--set-env-vars "$SET_ENV_VARS")
            echo "  --set-env-vars: $SET_ENV_VARS"
          fi
          if [ -n "$UPDATE_SECRETS" ]; then
            ARGS+=(--update-secrets "$UPDATE_SECRETS")
            echo "  --update-secrets: $UPDATE_SECRETS"
          fi
          gcloud run services update "${{ inputs.service }}" "${ARGS[@]}"

      - name: Route 100% traffic to latest revision
        run: |
          gcloud run services update-traffic "${{ inputs.service }}" \
            --region "${{ inputs.region }}" \
            --project "${{ inputs.project }}" \
            --to-latest

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe "${{ inputs.service }}" \
            --region "${{ inputs.region }}" --project "${{ inputs.project }}" \
            --format 'value(status.url)')
          LATEST_READY=$(gcloud run services describe "${{ inputs.service }}" \
            --region "${{ inputs.region }}" --project "${{ inputs.project }}" \
            --format 'value(status.latestReadyRevisionName)')
          LATEST_CREATED=$(gcloud run services describe "${{ inputs.service }}" \
            --region "${{ inputs.region }}" --project "${{ inputs.project }}" \
            --format 'value(status.latestCreatedRevisionName)')
          SERVING=$(gcloud run services describe "${{ inputs.service }}" \
            --region "${{ inputs.region }}" --project "${{ inputs.project }}" \
            --format 'value(status.traffic[0].revisionName)')
          echo "- URL: $URL"
          echo "- latestReady:   $LATEST_READY"
          echo "- latestCreated: $LATEST_CREATED"
          echo "- serving:       $SERVING"
          {
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| URL | $URL |"
            echo "| latestReady | \`$LATEST_READY\` |"
            echo "| latestCreated | \`$LATEST_CREATED\` |"
            echo "| serving | \`$SERVING\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$LATEST_READY" != "$LATEST_CREATED" ]; then
            echo "::warning::latestReadyRevisionName != latestCreatedRevisionName (may still be transitioning)"
          fi
          if [ "$SERVING" != "$LATEST_READY" ]; then
            echo "::error::Traffic not routed to latest ready revision"
            exit 1
          fi
          echo "::notice ::${{ inputs.service }} deployed successfully at $URL"
