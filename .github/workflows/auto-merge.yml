name: Auto Merge

on:
  workflow_call:
    secrets:
      AUTO_MERGE_PAT:
        description: |
          Optional PAT (legacy name). If set, takes precedence over
          `TAG_RELEASE_PAT`. Both fall back to `github.token` when unset.
        required: false
      TAG_RELEASE_PAT:
        description: |
          Org-standard PAT used across `tag-release.yml` /
          `dev-tag-release.yml`. Recommended — set this once at org level
          and `auto-merge.yml` picks it up automatically (no need to mint a
          separate `AUTO_MERGE_PAT`). Required scopes: `repo` + `workflow`
          (classic) or Contents/PR/Workflow Read-Write (fine-grained).
          `workflow` scope is required to merge PRs that touch
          `.github/workflows/**` — without it the merge mutation fails with
          HTTP 401 "Bad credentials" even though `gh pr view` succeeds with
          the same token (ippoan/mcp-cf-workers#3 で実害発生)。
        required: false

jobs:
  auto-merge:
    name: Auto Merge
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # `enablePullRequestAutoMerge` mutation が cross-repo reusable chain
      # から呼ばれた github.token で 401 になる事象の workaround。
      # cli/cli#11493 で actions:write 不足が misleading な 401 を出すケース
      # が報告されている。先に actions:write を追加して試し、それでも 401
      # が出るなら peter-evans/enable-pull-request-automerge action に
      # 切り替える二段方針 (ci-dashboard#125 で再現)。
      actions: write
    steps:
      - name: Check mergeable and queue squash merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.number }}
          REPO=${{ github.repository }}
          MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable --jq .mergeable)
          echo "PR #$PR mergeable: $MERGEABLE"
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "::error::PR #$PR has merge conflicts. Resolve conflicts before merging."
            exit 1
          fi
          # `--auto` queues the merge so GitHub fires it once all required
          # status checks + branch-protection gates clear. Without `--auto`,
          # this job tries to merge immediately and gets rejected with
          # "base branch policy prohibits the merge" because the very job
          # that's running IS one of the required checks (chicken/egg).
          gh pr merge "$PR" --auto --squash --repo "$REPO"
