name: CI

# Self-CI for the ci-workflows repo. Until this existed every change to a
# reusable workflow (e.g. the new branch-protection-drift-check.yml) shipped
# to consumers without even a syntax check — a YAML typo could break every
# downstream repo on next reference.
#
# actionlint catches:
#   - YAML syntax / structure errors in workflow files
#   - invalid action references (`uses:` tag/version typos)
#   - workflow_call input/output schema mismatches
#   - GitHub Actions expression syntax (`${{ ... }}`)
#   - deprecated syntax
#   - shellcheck on inline `run:` blocks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        id: install
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "path=$PWD/actionlint" >> "$GITHUB_OUTPUT"

      - name: Run actionlint
        env:
          ACTIONLINT: ${{ steps.install.outputs.path }}
        run: |
          set -euo pipefail
          # -color: colored output in Actions logs
          # -shellcheck=: pass empty to use the bundled shellcheck on $PATH
          #               (ubuntu-latest ships with shellcheck preinstalled)
          "$ACTIONLINT" -color
