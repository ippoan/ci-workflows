name: Node Lib CI

# Reusable CI for Node.js library packages published to GitHub Packages
# (e.g. @ippoan/mcp-cf-workers). Runs typecheck + (optional) lint + test on
# PR + push.
#
# Lockfile policy: if `package-lock.json` is committed, uses `npm ci` for
# reproducible installs. Otherwise falls back to `npm install --no-audit
# --no-fund` so brand-new repos work before a lockfile lands. Library repos
# are encouraged to commit a lockfile once stable for supply-chain hygiene.
#
# Dual-step auto-merge pattern (mirrors frontend-ci.yml / go-ci.yml):
#   1. `disable-auto-merge` job at start: defense-in-depth that forcibly
#      disables any existing auto-merge state when CI starts, so a stale
#      merge queue can't fire before fresh CI passes.
#   2. `auto-merge` job at end: after typecheck + test succeed, calls
#      ci-workflows/auto-merge.yml which queues `gh pr merge --auto
#      --squash`. GitHub then merges automatically when required_checks
#      (typecheck + test) clear. This removes the need to run
#      `gh pr merge --auto --squash` from the local CLI (which has
#      well-known wrinkles around required-checks chicken/egg).
#
# Caller must declare these `permissions:` at top-level (Option A):
#
#   permissions:
#     contents: write        # auto-merge job (merge to main)
#     pull-requests: write   # disable-auto-merge + auto-merge jobs
#     packages: read         # GitHub Packages dependency install
#
# Without `pull-requests: write` the disable-auto-merge job triggers
# `startup_failure` at reusable-parse time and the entire workflow run
# silently fails before any check fires (see ci-workflows CLAUDE.md
# "startup_failure" troubleshoot).
#
# Typical caller (drops into a consumer repo's `.github/workflows/ci.yml`):
#
#   name: ci
#   on:
#     pull_request: {}
#     push:
#       branches: [main]
#   permissions:
#     contents: write
#     pull-requests: write
#     packages: read
#   jobs:
#     ci:
#       uses: ippoan/ci-workflows/.github/workflows/lib-ci.yml@main
#       with:
#         node_version: '20'
#       secrets: inherit
#
# Required-check names produced by this workflow (for branch protection):
#
#   ci / typecheck
#   ci / lint        (only emitted when lint is detected or run_lint=true)
#   ci / test
#
# The `disable-auto-merge` and `auto-merge` jobs are intentionally **NOT**
# in the required-checks set — they only run on PRs and would block push-
# to-main otherwise. They are scaffolding around the real checks.

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version (passed to actions/setup-node).'
        type: string
        required: false
        default: '20'
      package_path:
        description: |
          Working directory containing `package.json`. Default `.` for
          repos that put the package at the repo root. Set to a subpath
          (e.g. `packages/foo`) for monorepo packages.
        type: string
        required: false
        default: '.'
      run_lint:
        description: |
          One of `auto` (default) | `true` | `false`.
          - `auto`: emit the `lint` job + run `npm run lint` only if an
            eslint config (`.eslintrc.*` / `eslint.config.*`) or a `lint`
            npm script is present.
          - `true`: always run `npm run lint`. Fails if missing.
          - `false`: skip the lint job entirely (no check produced).
        type: string
        required: false
        default: 'auto'
      coverage:
        description: |
          If true and a `test:coverage` npm script exists, runs
          `npm run test:coverage` instead of `npm test`. Default true.
        type: boolean
        required: false
        default: true

    secrets:
      CI_APP_ID:
        description: >-
          GitHub App ID。内蔵 auto-merge job (nested auto-merge.yml) が
          installation token を mint するのに使う。同 org (ippoan) caller は
          `secrets: inherit` で org secret が届くため宣言不要だが、
          **cross-org caller (ohishi-exp 等) は inherit が効かない**ため、
          ここで宣言して明示渡しを可能にする (Refs #125)。
        required: false
      CI_APP_PRIVATE_KEY:
        description: GitHub App private key (CI_APP_ID とペア。Refs #125)
        required: false

jobs:
  # Defense-in-depth: forcibly disable any existing auto-merge state at the
  # very start of CI so a stale merge queue cannot fire before fresh CI
  # passes. Idempotent (no-op if auto-merge is already off). Mirrors the
  # `disable-auto-merge` job in `frontend-ci.yml` / `go-ci.yml`.
  #
  # Requires caller permissions: `pull-requests: write` (top-level or job-
  # level). Without it the reusable parse step produces `startup_failure`
  # and the run silently dies before any job starts.
  disable-auto-merge:
    name: Disable PR auto-merge (CI start)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Force-disable PR auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge --disable-auto "$PR_NUMBER" -R "$REPO" || true

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.package_path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            echo "::notice::Using npm ci (lockfile present)"
            npm ci
          else
            echo "::notice::No package-lock.json found — falling back to npm install"
            npm install --no-audit --no-fund
          fi
      - name: Run typecheck
        run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    if: inputs.run_lint != 'false'
    defaults:
      run:
        working-directory: ${{ inputs.package_path }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect lint config
        id: detect
        run: |
          set -euo pipefail
          mode='${{ inputs.run_lint }}'
          if [ "$mode" = 'true' ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # mode == 'auto' (the != 'false' job-level if already filtered out 'false')
          if grep -q '"lint"[[:space:]]*:' package.json 2>/dev/null \
            || compgen -G '.eslintrc*' > /dev/null \
            || compgen -G 'eslint.config.*' > /dev/null; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.should_run == 'true'
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install
        if: steps.detect.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Run lint
        if: steps.detect.outputs.should_run == 'true'
        run: npm run lint
      - name: Skip note
        if: steps.detect.outputs.should_run != 'true'
        run: |
          echo "lint skipped — no eslint config / no \`lint\` script detected"
          echo "::notice::To force lint, pass \`run_lint: 'true'\` in the caller workflow."

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.package_path }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Run tests
        env:
          COVERAGE: ${{ inputs.coverage }}
        run: |
          set -euo pipefail
          if [ "$COVERAGE" = 'true' ] && grep -q '"test:coverage"[[:space:]]*:' package.json; then
            npm run test:coverage
          else
            npm test
          fi

  # Final step of the dual-step auto-merge pattern. Calls
  # ci-workflows/auto-merge.yml which queues `gh pr merge --auto --squash`
  # so GitHub fires the merge once required_checks (typecheck + test)
  # clear. The `if:` guards ensure:
  #   - PR event only (auto-merge has no meaning for push to main).
  #   - PR is not a draft (drafts should not merge).
  #   - typecheck + test succeeded (lint skipped is fine — it's optional).
  # `always()` is required so this job runs even when an upstream job is
  # skipped (e.g. lint auto-skip); without it the whole job is skipped by
  # default propagation.
  auto-merge:
    name: Auto Merge
    needs: [typecheck, lint, test]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      needs.typecheck.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
