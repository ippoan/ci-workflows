name: Dev Tag Release

# `dev-{N}` タグを自動採番して push する reusable workflow。
# オプションで同 job 内に GitHub Release 作成も含められる。
#
# 2 つの運用 mode:
#
# ## Mode A: tag push のみ (旧来 / binary repo 向け、default)
#
#   uses: ippoan/ci-workflows/.github/workflows/dev-tag-release.yml@main
#   secrets:
#     TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
#
# tag が push された後、caller 側 `release.yml` (`on: push: tags: ["dev-*"]`)
# が発火する想定。GITHUB_TOKEN-pushed tag は他 workflow を triggerしないので、
# PAT push が必須。caller 側で binary build + asset attach を行う構成。
#
# ## Mode B: tag push + release 作成 (lib repo / asset 不要なら推奨)
#
#   uses: ippoan/ci-workflows/.github/workflows/dev-tag-release.yml@main
#   with:
#     create_release: true
#   # secrets.TAG_RELEASE_PAT は不要 (release.yml チェーンを使わないため
#   #  GITHUB_TOKEN だけで push できる)。
#
# 同 job 内で `gh release create --prerelease --generate-notes` を呼ぶ。
# caller に `release.yml` がある場合は **二重作成になる**ので削除すること。
#
# 採番ロジック:
#   - 既存 `{prefix}{N}` タグから最大 N を取り出し、N+1 を新タグとして push
#   - HEAD が既に `{prefix}*` タグを持っていれば skip (重複防止)

on:
  workflow_call:
    inputs:
      prefix:
        description: 'Tag prefix (default: "dev-")'
        type: string
        default: 'dev-'
      create_release:
        description: |
          true なら同 job 内で `gh release create --prerelease` を実行する
          (Mode B、binary asset 不要な lib repo 向け)。false (default) なら
          tag push のみ (Mode A、caller の release.yml 発火を期待)。
        type: boolean
        default: false
    secrets:
      TAG_RELEASE_PAT:
        description: |
          tag push 後の caller release workflow 連鎖発火に必要な PAT。
          `create_release: true` の Mode B では caller 連鎖を使わないため省略可能
          (省略時は `github.token` で push する)。Mode A では必須。
        required: false

jobs:
  dev-tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT があれば PAT で (Mode A の caller release.yml 連鎖用)、
          # 無ければ workflow 標準 GITHUB_TOKEN で push。
          token: ${{ secrets.TAG_RELEASE_PAT || github.token }}

      - name: Guard — Mode A requires TAG_RELEASE_PAT
        if: ${{ !inputs.create_release }}
        env:
          PAT: ${{ secrets.TAG_RELEASE_PAT }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "::error::Mode A (create_release=false) は TAG_RELEASE_PAT 必須。" >&2
            echo "::error::caller の release.yml チェーンを使わないなら create_release: true を指定して" >&2
            echo "::error::Mode B に切り替えるか、repo に PAT を登録してください。" >&2
            exit 1
          fi

      - name: Compute next dev tag
        id: tag
        env:
          PREFIX: ${{ inputs.prefix }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Skip if HEAD already has a tag with this prefix — avoids
          # re-tagging the same commit when the workflow re-fires (e.g.
          # rerun-failed-jobs, branch protection re-evaluation).
          EXISTING_AT_HEAD="$(git tag --points-at HEAD | grep -E "^${PREFIX}[0-9]+\$" | sort -V | tail -1 || true)"
          if [ -n "$EXISTING_AT_HEAD" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "existing=$EXISTING_AT_HEAD" >> "$GITHUB_OUTPUT"
            echo "### Dev Tag Release" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped: HEAD already tagged as \`$EXISTING_AT_HEAD\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Find the highest existing dev counter (or 0 if none).
          LATEST_N="$(git tag -l "${PREFIX}*" \
            | grep -oE "^${PREFIX}[0-9]+\$" \
            | sed "s|^${PREFIX}||" \
            | sort -n \
            | tail -1 || true)"
          NEXT_N=$(( ${LATEST_N:-0} + 1 ))
          NEW_TAG="${PREFIX}${NEXT_N}"
          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          {
            echo "### Dev Tag Release"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| prefix | \`${PREFIX}\` |"
            echo "| previous | \`${PREFIX}${LATEST_N:-(none)}\` |"
            echo "| new | \`${NEW_TAG}\` |"
            echo "| commit | \`${SHORT_SHA}\` |"
            echo "| create_release | \`${{ inputs.create_release }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push tag
        if: steps.tag.outputs.skipped == 'false'
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          SHORT_SHA: ${{ steps.tag.outputs.short_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Dev release ${NEW_TAG} (auto, commit ${SHORT_SHA})"
          git push origin "$NEW_TAG"
          echo "Pushed ${NEW_TAG}"

      - name: Create GitHub Release (Mode B)
        if: steps.tag.outputs.skipped == 'false' && inputs.create_release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          # `-` 入り tag は prerelease (releases/latest に出ない、stable consumer 影響無し)
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --generate-notes \
            --prerelease
