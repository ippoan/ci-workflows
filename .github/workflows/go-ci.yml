name: Go CI

# Reusable CI pipeline for Go services in the ippoan org.
# go vet / go test / go build を 3 job に分けて、caller 側で `jobs.ci:` から
# 呼ばれた時に status check 名が `ci / vet` / `ci / test` / `ci / build`
# となるようにする (caller job id + ' / ' + reusable job name)。
#
# 名前を 3 つ固定値にしているのは、auth-worker 側の
# `branch-protection-presets.ts` の `ippoan-go-default` preset が同じ 3 つを
# required_status_checks にピン留めしているため。どちらかが動いたら drift
# になるので preset 側の unit test (`branch-protection-presets.test.ts`) も
# 連動して更新すること。
#
# Caller 例 (ippoan/secrets-inventory-gcp/.github/workflows/ci.yml):
#
#   permissions:
#     contents: read
#
#   jobs:
#     ci:
#       uses: ippoan/ci-workflows/.github/workflows/go-ci.yml@main

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'go コマンドの作業 directory (default: repo root)'
        required: false
        type: string
        default: '.'
      go_version_file:
        description: 'setup-go の go-version-file 入力 (default: go.mod)'
        required: false
        type: string
        default: 'go.mod'
      vet_args:
        description: 'go vet に渡す追加 args'
        required: false
        type: string
        default: './...'
      test_args:
        description: 'go test に渡す追加 args'
        required: false
        type: string
        default: './...'
      build_args:
        description: 'go build に渡す追加 args (artifact が要らないので /tmp/server に吐く)'
        required: false
        type: string
        default: '-o /tmp/server ./...'
      # ----- Optional opt-in: GCP secret-verify integration -----
      # secret-verify-gcp.yml を **本 reusable の中に直列 (vet/test/build の
      # 後)** で組み込むためのフック。3 つの input すべてが non-empty のとき
      # だけ verify job が動く。caller 側で別ワークフロー (`secret-verify.yml`)
      # を書く必要が無くなり、status check の DAG が `ci / {vet,test,build,
      # secret-verify}` の 1 chain に揃う (= branch protection 設計が単純化)。
      gcp_secret_verify_project:
        description: 'GCP project to verify against (e.g. cloudsql-sv). Empty = skip the verify job entirely.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_provider:
        description: 'WIF provider full resource name. Pass vars.GCP_WIF_PROVIDER from caller.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_sa:
        description: 'WIF impersonation target SA email. Reuse vars.GCP_WIF_SERVICE_ACCOUNT_STAGING etc (secretmanager.viewer role required).'
        required: false
        type: string
        default: ''
      gcp_secret_verify_ci_workflow_path:
        description: 'cloud-run extraction path で参照する workflow file。default は本 caller の ci.yml。'
        required: false
        type: string
        default: '.github/workflows/ci.yml'
      gcp_secret_verify_apply_labels:
        description: 'Verify 成功後に GCP Secret Manager の secret に `used-by-<owner>-<repo>=active|removed` label を打つ。requires `secretmanager.secrets.update` on the verify SA. default false (= label を触らない、IAM 追加 grant 不要)。'
        required: false
        type: boolean
        default: false

jobs:
  # PR auto-merge を CI 開始時に強制 disable する defense-in-depth step。
  # branch protection の required check に CI が含まれていない repo で、
  # `enable_pr_auto_merge` API call が即 merge を引き起こす事故 (ippoan/
  # secrets-inventory-gcp#20 で被害発生済) を防ぐ。本 step は idempotent
  # (= 既に disable なら no-op)。
  #
  # caller は本 job 用に top-level または `ci:` job-level の `permissions:`
  # に **`pull-requests: write`** を declare する必要あり。declare していない
  # と `startup_failure` (= GitHub Actions の reusable parse 時の permissions
  # check)。go-ci.yml は本 job 以前は `pull-requests:` を使う job が無かった
  # ため、本 commit は caller の breaking change を伴う (詳細: CLAUDE.md)。
  #
  # CI 完走後の auto-merge 再 enable は caller 側で ci-workflows の
  # auto-merge.yml@main を call する (go-ci.yml には embed されない)。
  disable-auto-merge:
    name: Disable PR auto-merge (CI start)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Force-disable PR auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge --disable-auto "$PR_NUMBER" -R "$REPO" || true

  vet:
    name: vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum
      - run: go vet ${{ inputs.vet_args }}

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum
      - run: go test ${{ inputs.test_args }}

  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum
      - run: go build ${{ inputs.build_args }}

  # secret-verify は **vet/test/build が全部 success のあと**だけ走る。
  # Secret Manager を叩いて gcloud quota を消費する前に local lint/test を
  # 通しておく方針 (= rerun コスト最小化)。
  # 3 つの opt-in input すべてが non-empty のとき以外は skip — 既存 caller
  # への影響無し (default 値が空文字列で if 評価 false になるため backward
  # compatible)。
  #
  # ⚠ Caller permissions 要件:
  # 本 job は nested 内蔵で `secret-verify-gcp.yml` を呼ぶため
  # `permissions: id-token: write` を要求する。これは **`if:` で skip
  # される run でも reusable workflow の parse 段階で caller permissions
  # check が走るため**、caller が `id-token: write` を declare していないと
  # workflow 全体が `startup_failure` になる (job 起動前にエラー、ログ出ず)。
  # caller の `jobs.<id>:` または top-level の `permissions:` で必ず
  # `id-token: write` を declare すること。詳細は本 repo CLAUDE.md。
  secret-verify:
    name: secret-verify
    if: |
      inputs.gcp_secret_verify_project != '' &&
      inputs.gcp_secret_verify_provider != '' &&
      inputs.gcp_secret_verify_sa != ''
    needs: [vet, test, build]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/secret-verify-gcp.yml
    with:
      project: ${{ inputs.gcp_secret_verify_project }}
      repo_type: cloud-run
      workload_identity_provider: ${{ inputs.gcp_secret_verify_provider }}
      service_account: ${{ inputs.gcp_secret_verify_sa }}
      ci_workflow_path: ${{ inputs.gcp_secret_verify_ci_workflow_path }}
      apply_labels: ${{ inputs.gcp_secret_verify_apply_labels }}
