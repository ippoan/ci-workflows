name: Branch Protection (self)

# Dogfood: ci-workflows applies its own branch protection via the reusable
# `branch-protection.yml` shipped in this same directory, matching the
# `auto-merge.yml` ↔ `auto-merge-self.yml` pattern.
#
# Requires the `TAG_RELEASE_PAT` repo secret (the existing PAT used by
# the release reusables, extended with "Administration: write" on this
# repo) — `GITHUB_TOKEN` cannot be used because `administration` is not
# a supported `GITHUB_TOKEN` permission scope (see the reusable's header
# comment for the full rationale and #23 for the empirical write-up).
#
# Only `push: branches: [main]` is used as the trigger — deliberately
# *not* `workflow_dispatch`, to avoid the separate actions/runner#4001
# evaluator bug. For ad-hoc re-application push an empty commit to
# `main`, or invoke the Branches API directly via `gh api -X PUT
# repos/ippoan/ci-workflows/branches/main/protection ...`.
#
# Required check `actionlint` matches the job name in `ci.yml` so a PR
# can only merge once the workflow YAML lints clean.

on:
  push:
    branches: [main]

jobs:
  apply:
    uses: ./.github/workflows/branch-protection.yml
    secrets:
      TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
    with:
      branch: main
      required_checks: |
        actionlint
    permissions:
      contents: read
