name: Rust CI

# Reusable CI pipeline for Rust binary crates in the ippoan org.
# rustfmt / clippy / cargo test / cargo build --release + artifact upload を 1 本にまとめる。
# sccache + Swatinem/rust-cache を `shared_key` で共有し、release.yml (rust-binary-release)
# と cache を共用できる。
#
# Caller 例: ippoan/github-mcp-server-rs/.github/workflows/ci.yml
#
# build 時に環境変数として注入したい secret がある場合は `build_secret_env_name` を指定し、
# caller 側で `secrets.BUILD_SECRET` (= 注入したい secret 値) を渡す:
#
#   jobs:
#     ci:
#       uses: ippoan/ci-workflows/.github/workflows/rust-ci.yml@main
#       with:
#         binary_name: github-mcp-server-rs
#         shared_key: github-mcp-server-rs
#         build_secret_env_name: MCP_INTERNAL_SECRET
#       secrets:
#         BUILD_SECRET: ${{ secrets.MCP_INTERNAL_SECRET }}

on:
  workflow_call:
    inputs:
      binary_name:
        description: 'Binary name produced by `cargo build --release` (used for `--help` smoke test and artifact prefix).'
        required: true
        type: string
      shared_key:
        description: 'Swatinem/rust-cache shared-key. デフォルトは repository name。release.yml と同じ key にして cache を共用する。'
        required: false
        type: string
        default: ''
      build_secret_env_name:
        description: 'Optional env var name to expose `secrets.BUILD_SECRET` as during `cargo build --release` (e.g. `MCP_INTERNAL_SECRET`).'
        required: false
        type: string
        default: ''
      extra_smoke_test:
        description: 'Optional bash script run after `--help` smoke test. Only executed on push to main (fork PR では secret 不可視のため誤検知を避ける目的)。'
        required: false
        type: string
        default: ''
      upload_artifact:
        description: 'release binary を GitHub Actions artifact として upload するか。'
        required: false
        type: boolean
        default: true
      artifact_retention_days:
        description: 'Artifact retention days.'
        required: false
        type: number
        default: 14
      cargo_test_args:
        description: 'Extra args appended to `cargo test`.'
        required: false
        type: string
        default: '--all-features --no-fail-fast'
      cargo_clippy_args:
        description: 'Extra args appended to `cargo clippy`.'
        required: false
        type: string
        default: '--all-targets --all-features -- -D warnings'
      cargo_build_args:
        description: 'Extra args appended to `cargo build --release`.'
        required: false
        type: string
        default: '--locked'
      working_directory:
        description: 'cargo を実行する作業ディレクトリ (workspace が subdir にある場合、例: "rust")。デフォルト "." = repo root。'
        required: false
        type: string
        default: '.'
      submodules:
        description: 'actions/checkout@v4 の `submodules` 値 (`""` = 取らない / `"true"` = top-level のみ / `"recursive"` = 再帰)。submodule に Cargo.toml が居る workspace (例: ohishi-exp/browser-render-rust) で `recursive` を渡す。default は空文字 (= 既存挙動を維持)。'
        required: false
        type: string
        default: ''
    secrets:
      BUILD_SECRET:
        description: 'Optional secret value injected into `cargo build --release` env under `build_secret_env_name`.'
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.shared_key != '' && inputs.shared_key || github.event.repository.name }}
          cache-targets: false
          workspaces: ${{ inputs.working_directory }}
      - run: cargo clippy ${{ inputs.cargo_clippy_args }}
      - run: sccache --show-stats

  test:
    name: cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.shared_key != '' && inputs.shared_key || github.event.repository.name }}
          cache-targets: false
          workspaces: ${{ inputs.working_directory }}
      - run: cargo test ${{ inputs.cargo_test_args }}
      - run: sccache --show-stats

  build:
    name: cargo build --release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.shared_key != '' && inputs.shared_key || github.event.repository.name }}
          cache-targets: false
          workspaces: ${{ inputs.working_directory }}
      - name: cargo build --release
        env:
          BUILD_SECRET: ${{ secrets.BUILD_SECRET }}
          BUILD_SECRET_ENV_NAME: ${{ inputs.build_secret_env_name }}
          CARGO_BUILD_ARGS: ${{ inputs.cargo_build_args }}
        run: |
          set -euo pipefail
          if [ -n "$BUILD_SECRET_ENV_NAME" ]; then
            # 動的 env 名で BUILD_SECRET を expose
            export "$BUILD_SECRET_ENV_NAME=$BUILD_SECRET"
          fi
          # shellcheck disable=SC2086
          cargo build --release $CARGO_BUILD_ARGS
      - run: sccache --show-stats
      - name: Smoke test (CLI --help)
        env:
          BINARY: ${{ inputs.binary_name }}
        run: ./target/release/"$BINARY" --help
      - name: Extra smoke test
        if: inputs.extra_smoke_test != '' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          BINARY: ${{ inputs.binary_name }}
        run: |
          set -euo pipefail
          ${{ inputs.extra_smoke_test }}
      - uses: actions/upload-artifact@v4
        if: inputs.upload_artifact
        with:
          name: ${{ inputs.binary_name }}-linux-x86_64
          path: ${{ inputs.working_directory }}/target/release/${{ inputs.binary_name }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

  # Coverage 100% gate (opt-in, auto-detect)。working_directory に coverage_100.toml が
  # あれば cargo llvm-cov --text を回し、登録ファイルの missed line == 0 を CI で強制する。
  # toml が無ければ全 step skip して green (= 既存 caller への backward compat)。
  # go-ci.yml の coverage_100.toml gate と同思想 (Rust は file 単位の --text line miss)。
  coverage:
    name: coverage 100
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      # sccache は llvm-cov の計装ビルドと相性が悪いので coverage job では無効化。
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}
      - name: Detect coverage_100.toml
        id: detect
        run: |
          if [ -f coverage_100.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "coverage_100.toml なし → coverage gate skip"
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.detect.outputs.present == 'true'
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        if: steps.detect.outputs.present == 'true'
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        if: steps.detect.outputs.present == 'true'
        with:
          shared-key: ${{ inputs.shared_key != '' && inputs.shared_key || github.event.repository.name }}-cov
          workspaces: ${{ inputs.working_directory }}
      - name: cargo llvm-cov + 100% gate
        if: steps.detect.outputs.present == 'true'
        run: |
          set -euo pipefail
          if ! cargo llvm-cov --text --no-fail-fast > cov.txt 2> cov.err; then
            echo "::error::cargo llvm-cov failed"; tail -80 cov.err cov.txt; exit 1
          fi
          # 登録 path (working_directory からの相対) を取り出す。
          mapfile -t PATHS < <(grep -E '^[[:space:]]*path[[:space:]]*=' coverage_100.toml \
            | sed -E 's/.*"(.+)".*/\1/')
          if [ "${#PATHS[@]}" -eq 0 ]; then
            echo "coverage_100.toml に path 登録なし → skip"; exit 0
          fi
          # --text 出力からファイルごとの missed line 数 (exec count 0 の行) を集計。
          awk '
            /^\/.*\.rs:$/ { cur=$0; sub(/:$/,"",cur); seen[cur]=1; if (!(cur in miss)) miss[cur]=0; next }
            cur!="" && /^[[:space:]]*[0-9]+\|[[:space:]]*0\|/ { miss[cur]++ }
            END { for (f in seen) printf "%s %d\n", f, miss[f] }
          ' cov.txt > miss.txt
          fail=0
          for p in "${PATHS[@]}"; do
            line=$(awk -v p="$p" 'length($1) >= length(p) && substr($1, length($1)-length(p)+1) == p {print; exit}' miss.txt)
            if [ -z "$line" ]; then
              echo "::error::coverage_100: registered file not found in coverage output: $p"; fail=1; continue
            fi
            m=$(echo "$line" | awk '{print $2}')
            if [ "$m" -gt 0 ]; then
              echo "::error::coverage_100: $p has $m uncovered line(s) (must be 0)"; fail=1
            else
              echo "OK 100%: $p"
            fi
          done
          exit $fail
