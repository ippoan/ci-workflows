name: Go CI

# Reusable CI pipeline for Go services in the ippoan org.
# go vet / go test / go build を 3 job に分けて、caller 側で `jobs.ci:` から
# 呼ばれた時に status check 名が `ci / vet` / `ci / test` / `ci / build`
# となるようにする (caller job id + ' / ' + reusable job name)。
#
# 名前を 3 つ固定値にしているのは、auth-worker 側の
# `branch-protection-presets.ts` の `ippoan-go-default` preset が同じ 3 つを
# required_status_checks にピン留めしているため。どちらかが動いたら drift
# になるので preset 側の unit test (`branch-protection-presets.test.ts`) も
# 連動して更新すること。
#
# Caller 例 (ippoan/secrets-inventory-gcp/.github/workflows/ci.yml):
#
#   permissions:
#     contents: read
#
#   jobs:
#     ci:
#       uses: ippoan/ci-workflows/.github/workflows/go-ci.yml@main

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'go コマンドの作業 directory (default: repo root)'
        required: false
        type: string
        default: '.'
      go_version_file:
        description: 'setup-go の go-version-file 入力 (default: go.mod)'
        required: false
        type: string
        default: 'go.mod'
      vet_args:
        description: 'go vet に渡す追加 args'
        required: false
        type: string
        default: './...'
      test_args:
        description: 'go test に渡す追加 args'
        required: false
        type: string
        default: './...'
      build_args:
        description: 'go build に渡す追加 args (artifact が要らないので /tmp/server に吐く)'
        required: false
        type: string
        default: '-o /tmp/server ./...'
      # ----- Optional opt-in: GCP secret-verify integration -----
      # secret-verify-gcp.yml を **本 reusable の中に直列 (vet/test/build の
      # 後)** で組み込むためのフック。3 つの input すべてが non-empty のとき
      # だけ verify job が動く。caller 側で別ワークフロー (`secret-verify.yml`)
      # を書く必要が無くなり、status check の DAG が `ci / {vet,test,build,
      # secret-verify}` の 1 chain に揃う (= branch protection 設計が単純化)。
      gcp_secret_verify_project:
        description: 'GCP project to verify against (e.g. cloudsql-sv). Empty = skip the verify job entirely.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_provider:
        description: 'WIF provider full resource name. Pass vars.GCP_WIF_PROVIDER from caller.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_sa:
        description: 'WIF impersonation target SA email. Reuse vars.GCP_WIF_SERVICE_ACCOUNT_STAGING etc (secretmanager.viewer role required).'
        required: false
        type: string
        default: ''
      gcp_secret_verify_ci_workflow_path:
        description: 'cloud-run extraction path で参照する workflow file。default は本 caller の ci.yml。'
        required: false
        type: string
        default: '.github/workflows/ci.yml'
      gcp_secret_verify_apply_labels:
        description: 'Verify 成功後に GCP Secret Manager の secret に `used-by-<owner>-<repo>=active|removed` label を打つ。requires `secretmanager.secrets.update` on the verify SA. default false (= label を触らない、IAM 追加 grant 不要)。'
        required: false
        type: boolean
        default: false

jobs:
  # PR auto-merge を CI 開始時に強制 disable する defense-in-depth step。
  # branch protection の required check に CI が含まれていない repo で、
  # `enable_pr_auto_merge` API call が即 merge を引き起こす事故 (ippoan/
  # secrets-inventory-gcp#20 で被害発生済) を防ぐ。本 step は idempotent
  # (= 既に disable なら no-op)。
  #
  # caller は本 job 用に top-level または `ci:` job-level の `permissions:`
  # に **`pull-requests: write`** を declare する必要あり。declare していない
  # と `startup_failure` (= GitHub Actions の reusable parse 時の permissions
  # check)。go-ci.yml は本 job 以前は `pull-requests:` を使う job が無かった
  # ため、本 commit は caller の breaking change を伴う (詳細: CLAUDE.md)。
  #
  # CI 完走後の auto-merge 再 enable は caller 側で ci-workflows の
  # auto-merge.yml@main を call する (go-ci.yml には embed されない)。
  disable-auto-merge:
    name: Disable PR auto-merge (CI start)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Force-disable PR auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge --disable-auto "$PR_NUMBER" -R "$REPO" || true

  vet:
    name: vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum
      - run: go vet ${{ inputs.vet_args }}

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum
      # coverage_100.toml が working_directory に存在すれば coverprofile を取り、
      # 後段の `coverage-100-check` step で 100% gate にかける。存在しなければ
      # 既存挙動 (plain `go test ${test_args}`) のまま。
      - name: go test (with coverage when gate exists)
        id: gotest
        env:
          # inputs.test_args は caller workflow 側で宣言される static string。
          # `eval` ではなく shell word splitting (unquoted $TEST_ARGS) で展開する
          # ことで意図しない command 実行 (e.g. `$(...)` / `;`) を回避する。
          TEST_ARGS: ${{ inputs.test_args }}
        run: |
          set -euo pipefail
          if [ -f coverage_100.toml ]; then
            echo "coverage_100.toml detected — generating coverprofile for gate check"
            # shellcheck disable=SC2086  # 意図的に word splitting
            go test $TEST_ARGS -coverprofile=cover.out
            echo "have_profile=true" >> "$GITHUB_OUTPUT"
          else
            # shellcheck disable=SC2086
            go test $TEST_ARGS
            echo "have_profile=false" >> "$GITHUB_OUTPUT"
          fi
      # 100% gate: coverage_100.toml に列挙された file の registered function が
      # 全部 100% カバー されているか確認。exclude_funcs に列挙した function は
      # 要求から除外 (= bootstrap / ADC fetch / log.Fatal 等の untestable な
      # path を逃がす)。
      #
      # gate が fail した場合は CI fail。warning ではなく block。staging=prod
      # 運用前提 (= 各 service が staging に出る = 本番反映) なので、CI green
      # = 100% カバー維持を強制する。
      - name: coverage 100% gate
        if: steps.gotest.outputs.have_profile == 'true'
        run: |
          set -euo pipefail
          go tool cover -func=cover.out > cover.func.txt
          python3 - <<'PY'
          import re, sys, os

          # ---- 1) coverage_100.toml を簡易パース ----
          # 期待する format:
          #   [file/path.go]
          #   exclude_funcs = ["FuncA", "FuncB"]
          #
          # 厳密な TOML parser は使わず、本 gate に必要な subset だけ正規表現で取る。
          # caller が複雑な TOML を書いた場合は読み落とすが、gate の目的 (= 登録 file
          # の 100% 確認) には十分。
          with open("coverage_100.toml", encoding="utf-8") as f:
              text = f.read()

          registered = {}   # path -> set of excluded func names
          current_file = None
          for raw in text.splitlines():
              line = raw.split("#", 1)[0].rstrip()
              if not line.strip():
                  continue
              m_sec = re.match(r"^\[([^\]]+)\]\s*$", line)
              if m_sec:
                  current_file = m_sec.group(1).strip().strip('"')
                  registered.setdefault(current_file, set())
                  continue
              m_ex = re.match(r"^\s*exclude_funcs\s*=\s*\[(.*)\]\s*$", line)
              if m_ex and current_file:
                  for n in re.findall(r'"([^"]+)"', m_ex.group(1)):
                      registered[current_file].add(n)
                  continue
              # それ以外の行は本 gate では無視

          if not registered:
              print("coverage_100.toml has no [<file>] sections — nothing to check.")
              sys.exit(0)

          # ---- 2) go tool cover -func の出力を per-(file, func) pct に分解 ----
          # 行 format (空白区切り):
          #   <module/path/file.go>:<line>:\t<funcName>\t<pct>%
          # 例:
          #   github.com/foo/bar/main.go:40:	main	0.0%
          func_re = re.compile(r"^(\S+\.go):\d+:\s+(\S+)\s+([\d.]+)%\s*$")
          uncovered = {}   # registered_path -> list of (func, pct)
          # registered file の path は repo-relative (例: "main.go"、"sub/foo.go")。
          # go tool cover の出力は module-fullpath ("github.com/x/y/main.go") なので、
          # registered path で suffix match する。
          with open("cover.func.txt", encoding="utf-8") as f:
              for line in f:
                  m = func_re.match(line.rstrip())
                  if not m:
                      continue
                  full_path, fname, pct_s = m.group(1), m.group(2), m.group(3)
                  pct = float(pct_s)
                  for reg_path, excludes in registered.items():
                      # suffix match (前方の module/dir 差分を吸収)
                      if full_path == reg_path or full_path.endswith("/" + reg_path):
                          if fname in excludes:
                              continue
                          if pct < 100.0:
                              uncovered.setdefault(reg_path, []).append((fname, pct))

          # ---- 3) 結果 ----
          # registered だが cover.func.txt に 1 行も無い場合 → file 自体が
          # build に含まれていないか名前 typo。これも fail にする。
          matched = set()
          with open("cover.func.txt", encoding="utf-8") as f:
              for line in f:
                  m = func_re.match(line.rstrip())
                  if not m:
                      continue
                  full_path = m.group(1)
                  for reg_path in registered.keys():
                      if full_path == reg_path or full_path.endswith("/" + reg_path):
                          matched.add(reg_path)

          missing = [p for p in registered.keys() if p not in matched]

          if not uncovered and not missing:
              print("coverage 100% gate: OK ({} file(s) registered)".format(len(registered)))
              sys.exit(0)

          print("::group::coverage 100% gate FAILED")
          for path, items in uncovered.items():
              print("::error file=" + path + "::below 100% coverage:")
              for fname, pct in items:
                  print("  - {}: {}%".format(fname, pct))
          for path in missing:
              print("::error file=" + path + "::registered in coverage_100.toml but not found in cover.func.txt")
          print("::endgroup::")
          sys.exit(1)
          PY

  build:
    name: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum
      - run: go build ${{ inputs.build_args }}

  # secret-verify は **vet/test/build が全部 success のあと**だけ走る。
  # Secret Manager を叩いて gcloud quota を消費する前に local lint/test を
  # 通しておく方針 (= rerun コスト最小化)。
  # 3 つの opt-in input すべてが non-empty のとき以外は skip — 既存 caller
  # への影響無し (default 値が空文字列で if 評価 false になるため backward
  # compatible)。
  #
  # ⚠ Caller permissions 要件:
  # 本 job は nested 内蔵で `secret-verify-gcp.yml` を呼ぶため
  # `permissions: id-token: write` を要求する。これは **`if:` で skip
  # される run でも reusable workflow の parse 段階で caller permissions
  # check が走るため**、caller が `id-token: write` を declare していないと
  # workflow 全体が `startup_failure` になる (job 起動前にエラー、ログ出ず)。
  # caller の `jobs.<id>:` または top-level の `permissions:` で必ず
  # `id-token: write` を declare すること。詳細は本 repo CLAUDE.md。
  secret-verify:
    name: secret-verify
    if: |
      inputs.gcp_secret_verify_project != '' &&
      inputs.gcp_secret_verify_provider != '' &&
      inputs.gcp_secret_verify_sa != ''
    needs: [vet, test, build]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/secret-verify-gcp.yml
    with:
      project: ${{ inputs.gcp_secret_verify_project }}
      repo_type: cloud-run
      workload_identity_provider: ${{ inputs.gcp_secret_verify_provider }}
      service_account: ${{ inputs.gcp_secret_verify_sa }}
      ci_workflow_path: ${{ inputs.gcp_secret_verify_ci_workflow_path }}
      apply_labels: ${{ inputs.gcp_secret_verify_apply_labels }}
