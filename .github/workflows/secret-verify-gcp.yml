name: Verify Secrets in GCP Secret Manager

# Reusable workflow that verifies every secret a repo declares is backed up
# in GCP Secret Manager. Missing backups fail the job + block merges, so
# the Cloudflare-Secrets-Store integration period cannot drift "declared
# but not yet backed up" — declarations only land when GCP already has the
# value, or the PR is blocked until somebody runs `gcloud secrets create`.
#
# # Three extraction sources, one verification target
#
# The verification target is always GCP Secret Manager (`gcloud secrets list`
# in `inputs.project`). What gets declared as "required" depends on the repo
# type:
#
#   | repo_type  | source of declarations |
#   |------------|-------------------------|
#   | rust       | `cloudrun/render.sh <svc> <env> <sha>` → service.yaml → secretKeyRef.name |
#   | worker     | `wrangler.jsonc` / `wrangler.toml` → `secrets.required` array |
#   | cloud-run  | `.github/workflows/<ci>.yml` → any job's `with.update_secrets` / `with.set_secrets` → `ENV=SECRET[:VER]` → SECRET |
#
# `cloud-run` covers Go / Node / etc Cloud Run services that don't use the
# rust-style `cloudrun/render.sh` template, and instead pass secret bindings
# inline to the `cloud-run-deploy.yml` reusable via its `update_secrets:`
# input. The same ci.yml that declares those bindings to the deployer is the
# verification source — extracting both from the same string in the same file
# guarantees deploy and verify cannot drift apart. The actual parsing lives
# in `scripts/cloud-run/deploy.sh extract-secrets` in this repo (= centralised
# helper that both this workflow and any future caller can shell out to).
#
# Worker side enforces three explicit states for `secrets.required`:
#
#   - **未宣言** (`secrets` key absent): FAIL. "Declare an explicit list — use
#     `[]` if no secrets needed". Forces the audit decision to be conscious.
#   - **ゼロ明示** (`required: []`): PASS, nothing to compare.
#   - **列挙** (`required: ["A", "B"]`): each name compared against GCP.
#
# # Why no warn mode
#
# A warn-only mode produces "yellow on GitHub UI" output everyone ignores
# until something breaks weeks later. fail+required from day one drives
# the integration: every declared-but-not-backed-up secret blocks the PR,
# the operator runs `gcloud secrets create`, the block clears.
#
# Caller opt-in controls blast radius: only repos that have aligned their
# secret naming with GCP (and added the caller workflow) get enforcement.
#
# # Auth
#
# Two paths, mirroring cloud-run-deploy.yml:
#  - WIF (recommended): pass `workload_identity_provider` + `service_account`
#    inputs. caller needs `permissions: id-token: write`.
#  - SA JSON key: pass `GCP_SA_KEY` secret. WIF inputs omitted.
# Either path needs `secretmanager.secrets.list` on the target project —
# Secret Manager Viewer role on a viewer-only SA is the minimum surface.
# We never read secret payloads, only names.
#
# # Typical caller (Rust + Cloud Run)
#
#   name: Verify GCP Secrets
#   on:
#     pull_request:
#       branches: [main]
#     push:
#       branches: [main]
#   permissions:
#     contents: read
#     id-token: write
#   jobs:
#     verify:
#       uses: ippoan/ci-workflows/.github/workflows/secret-verify-gcp.yml@main
#       with:
#         project: cloudsql-sv
#         repo_type: rust
#         render_services: 'backend gateway tenko carins dtako trouble'
#         workload_identity_provider: projects/123/locations/global/workloadIdentityPools/github/providers/ippoan
#         service_account: gcp-secret-verifier@cloudsql-sv.iam.gserviceaccount.com
#
# # Typical caller (Worker)
#
#   jobs:
#     verify:
#       uses: ippoan/ci-workflows/.github/workflows/secret-verify-gcp.yml@main
#       with:
#         project: cloudsql-sv
#         repo_type: worker
#         # wrangler_path: '' → autodetect wrangler.jsonc / .toml / .json
#       secrets:
#         GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
#
# # Typical caller (Cloud Run, Go / Node / etc)
#
#   jobs:
#     verify:
#       uses: ippoan/ci-workflows/.github/workflows/secret-verify-gcp.yml@main
#       with:
#         project: cloudsql-sv
#         repo_type: cloud-run
#         # ci_workflow_path: '.github/workflows/ci.yml' (default)
#         workload_identity_provider: projects/123/locations/global/workloadIdentityPools/github/providers/ippoan
#         service_account: gcp-secret-verifier@cloudsql-sv.iam.gserviceaccount.com

on:
  workflow_call:
    inputs:
      project:
        description: 'GCP project ID whose Secret Manager is the backup target (e.g. "cloudsql-sv").'
        type: string
        required: true
      repo_type:
        description: 'Source of declarations: "rust" (render.sh → service.yaml secretKeyRef), "worker" (wrangler secrets.required), or "cloud-run" (workflow with.update_secrets).'
        type: string
        required: true
      render_services:
        description: 'rust 用. Space-separated Cloud Run service names passed to render.sh.'
        type: string
        required: false
        default: ''
      render_env:
        description: 'rust 用. Environment argument for render.sh (e.g. "production" / "staging").'
        type: string
        required: false
        default: 'production'
      render_script:
        description: 'rust 用. Path to render.sh in the caller repo.'
        type: string
        required: false
        default: 'cloudrun/render.sh'
      render_sha:
        description: 'rust 用. SHA passed as the third positional arg to render.sh. Any non-empty placeholder works because we only inspect secretKeyRef.name, not the image digest.'
        type: string
        required: false
        default: 'verify-dummy-sha'
      render_extra_env:
        description: 'rust 用. Extra env vars required by render.sh templating, one KEY=VAL per line (e.g. ENV_SCRAPER_URL=https://...).'
        type: string
        required: false
        default: ''
      wrangler_path:
        description: 'worker 用. Path to wrangler.jsonc / .toml / .json. Empty = autodetect repo root.'
        type: string
        required: false
        default: ''
      ci_workflow_path:
        description: 'cloud-run 用. Path to the workflow file whose `with.update_secrets` / `with.set_secrets` declares the GCP secret bindings (usually the file calling cloud-run-deploy.yml).'
        type: string
        required: false
        default: '.github/workflows/ci.yml'
      workload_identity_provider:
        description: 'WIF provider resource name (e.g. "projects/123/locations/global/workloadIdentityPools/github/providers/ippoan"). Empty = use GCP_SA_KEY secret instead.'
        type: string
        required: false
        default: ''
      service_account:
        description: 'WIF impersonation target SA email. Paired with workload_identity_provider.'
        type: string
        required: false
        default: ''
    secrets:
      GCP_SA_KEY:
        description: 'SA JSON key (used when workload_identity_provider is empty). Needs secretmanager.secrets.list on the target project.'
        required: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify secrets in GCP Secret Manager
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Validate inputs
        env:
          REPO_TYPE: ${{ inputs.repo_type }}
          RENDER_SERVICES: ${{ inputs.render_services }}
          WIF_PROVIDER: ${{ inputs.workload_identity_provider }}
          WIF_SA: ${{ inputs.service_account }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          set -euo pipefail
          case "$REPO_TYPE" in
            rust)
              if [ -z "$RENDER_SERVICES" ]; then
                echo "::error::repo_type=rust requires render_services input (space-separated Cloud Run service names)"
                exit 1
              fi
              ;;
            worker)
              ;;
            cloud-run)
              ;;
            *)
              echo "::error::repo_type must be 'rust', 'worker', or 'cloud-run', got: $REPO_TYPE"
              exit 1
              ;;
          esac
          if [ -n "$WIF_PROVIDER" ] && [ -z "$WIF_SA" ]; then
            echo "::error::workload_identity_provider requires service_account input"
            exit 1
          fi
          if [ -z "$WIF_PROVIDER" ] && [ -z "$GCP_SA_KEY" ]; then
            echo "::error::Either workload_identity_provider input or GCP_SA_KEY secret is required"
            exit 1
          fi

      - name: Authenticate to GCP (WIF)
        if: inputs.workload_identity_provider != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Authenticate to GCP (SA JSON key)
        if: inputs.workload_identity_provider == ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Extract required secrets (Rust → render.sh → service.yaml)
        if: inputs.repo_type == 'rust'
        env:
          RENDER_SCRIPT: ${{ inputs.render_script }}
          RENDER_SERVICES: ${{ inputs.render_services }}
          RENDER_ENV: ${{ inputs.render_env }}
          RENDER_SHA: ${{ inputs.render_sha }}
          RENDER_EXTRA_ENV: ${{ inputs.render_extra_env }}
        run: |
          set -euo pipefail
          if [ ! -f "$RENDER_SCRIPT" ]; then
            echo "::error::render script not found at $RENDER_SCRIPT"
            exit 1
          fi
          # Export extra env vars some render.sh templates demand. Lines that
          # don't match KEY=VAL are silently skipped so commented templates
          # in input blocks don't fail the step.
          if [ -n "$RENDER_EXTRA_ENV" ]; then
            while IFS= read -r line; do
              line="${line%$'\r'}"
              case "$line" in
                ''|\#*) continue ;;
              esac
              if [[ "$line" =~ ^[A-Za-z_][A-Za-z0-9_]*= ]]; then
                # shellcheck disable=SC2163
                export "$line"
              fi
            done <<< "$RENDER_EXTRA_ENV"
          fi
          : > required.txt
          for svc in $RENDER_SERVICES; do
            echo "Rendering $svc (env=$RENDER_ENV)..."
            # awk: when a "secretKeyRef:" line is seen, the very next "name:"
            # line is the secret reference (Cloud Run service.yaml shape).
            # Without pipefail this would mask render.sh failures since awk
            # always exits 0 on empty input.
            bash "$RENDER_SCRIPT" "$svc" "$RENDER_ENV" "$RENDER_SHA" \
              | awk '/secretKeyRef:/{f=1; next} f && /name:/{print $2; f=0}' \
              >> required.txt
          done
          sort -u required.txt -o required.txt
          echo "Extracted $(wc -l < required.txt | tr -d ' ') unique secret name(s)"

      - name: Extract required secrets (Worker → wrangler secrets.required)
        if: inputs.repo_type == 'worker'
        env:
          WRANGLER_PATH: ${{ inputs.wrangler_path }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          wrangler_path = os.environ.get("WRANGLER_PATH", "").strip()
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def write_summary(text):
              if summary_path:
                  with open(summary_path, "a") as fh:
                      fh.write(text)

          if wrangler_path:
              candidates = [Path(wrangler_path)]
          else:
              # jsonc preferred (Cloudflare's recommended format), then json,
              # then toml. Whichever exists first wins.
              candidates = [
                  Path("wrangler.jsonc"),
                  Path("wrangler.json"),
                  Path("wrangler.toml"),
              ]

          target = None
          for c in candidates:
              if c.exists():
                  target = c
                  break

          if target is None:
              print(
                  f"::error::wrangler config not found (tried: {[str(c) for c in candidates]})",
                  file=sys.stderr,
              )
              write_summary(
                  "# ❌ Secret Verify (GCP Secret Manager)\n\n"
                  "wrangler config not found. Set `wrangler_path` input or place "
                  "`wrangler.jsonc` / `wrangler.toml` at repo root.\n"
              )
              sys.exit(1)

          print(f"Reading wrangler config: {target}")

          def strip_jsonc_comments(text):
              # State machine that strips // line comments and /* */ block
              # comments while leaving content inside quoted strings alone.
              out = []
              i = 0
              in_str = False
              str_quote = None
              while i < len(text):
                  ch = text[i]
                  if in_str:
                      out.append(ch)
                      if ch == "\\" and i + 1 < len(text):
                          out.append(text[i + 1])
                          i += 2
                          continue
                      if ch == str_quote:
                          in_str = False
                      i += 1
                      continue
                  if ch in ('"',):
                      in_str = True
                      str_quote = ch
                      out.append(ch)
                      i += 1
                      continue
                  if ch == "/" and i + 1 < len(text):
                      nxt = text[i + 1]
                      if nxt == "/":
                          while i < len(text) and text[i] != "\n":
                              i += 1
                          continue
                      if nxt == "*":
                          i += 2
                          while i + 1 < len(text) and not (text[i] == "*" and text[i + 1] == "/"):
                              i += 1
                          i += 2
                          continue
                  out.append(ch)
                  i += 1
              return "".join(out)

          def strip_trailing_commas(text):
              return re.sub(r",(\s*[}\]])", r"\1", text)

          # `required` keeps three states:
          #   None         → secrets key absent (= UNDECLARED, blocks)
          #   []           → explicit empty (passes)
          #   ["A", ...]   → enumerated (compared)
          required = None

          ext = target.suffix.lower()
          if ext in (".jsonc", ".json"):
              raw = target.read_text(encoding="utf-8")
              cleaned = strip_trailing_commas(strip_jsonc_comments(raw))
              try:
                  data = json.loads(cleaned)
              except json.JSONDecodeError as e:
                  print(f"::error file={target}::Failed to parse JSON: {e}", file=sys.stderr)
                  sys.exit(1)
              secrets_field = data.get("secrets")
              if isinstance(secrets_field, dict):
                  required = secrets_field.get("required")
          elif ext == ".toml":
              try:
                  import tomllib  # Python 3.11+
              except ImportError:
                  print(
                      "::error::Python 3.11+ required for tomllib (ubuntu-latest ships 3.12+)",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              try:
                  with target.open("rb") as fh:
                      data = tomllib.load(fh)
              except Exception as e:
                  print(f"::error file={target}::Failed to parse TOML: {e}", file=sys.stderr)
                  sys.exit(1)
              secrets_field = data.get("secrets")
              if isinstance(secrets_field, dict):
                  required = secrets_field.get("required")
          else:
              print(f"::error::Unsupported wrangler config extension: {ext}", file=sys.stderr)
              sys.exit(1)

          if required is None:
              print(
                  f"::error file={target}::wrangler config has no `secrets.required` declaration. "
                  "Declare an explicit list (use `[]` if no secrets are needed) to make secret backup auditable.",
                  file=sys.stderr,
              )
              hint = (
                  "# ❌ Secret Verify (GCP Secret Manager)\n\n"
                  f"`{target}` does not declare `secrets.required`.\n\n"
                  "Declare an explicit list (or `[]` if none) so this verifier can compare it to GCP:\n\n"
              )
              if ext in (".jsonc", ".json"):
                  hint += (
                      "```jsonc\n// wrangler.jsonc\n"
                      "\"secrets\": {\n"
                      "  \"required\": []\n"
                      "}\n"
                      "```\n"
                  )
              else:
                  hint += (
                      "```toml\n# wrangler.toml\n"
                      "[secrets]\n"
                      "required = []\n"
                      "```\n"
                  )
              write_summary(hint)
              sys.exit(1)

          if not isinstance(required, list):
              print(
                  f"::error file={target}::secrets.required must be an array, got {type(required).__name__}",
                  file=sys.stderr,
              )
              sys.exit(1)

          unique = sorted({s.strip() for s in required if isinstance(s, str) and s.strip()})
          Path("required.txt").write_text(("\n".join(unique) + "\n") if unique else "")
          print(f"Declared {len(unique)} unique required secret name(s)")
          PY

      - name: Checkout ci-workflows helpers (cloud-run only)
        if: inputs.repo_type == 'cloud-run'
        uses: actions/checkout@v4
        with:
          # Pull the shared `scripts/cloud-run/deploy.sh` helper from this
          # repo into a sub-path so the caller's working tree (already at
          # `.`) isn't clobbered. Tracks `main`; callers pinning this
          # reusable workflow to an older ref will still pick up the
          # latest helper script — acceptable because both move in lockstep
          # via this same repo.
          repository: ippoan/ci-workflows
          path: .ci-workflows-tools

      - name: Extract required secrets (Cloud Run → workflow update_secrets)
        if: inputs.repo_type == 'cloud-run'
        env:
          CI_WORKFLOW_PATH: ${{ inputs.ci_workflow_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$CI_WORKFLOW_PATH" ]; then
            echo "::error::ci.yml not found at $CI_WORKFLOW_PATH (set ci_workflow_path input)"
            exit 1
          fi
          # PyYAML is preinstalled on ubuntu-latest runners but not guaranteed
          # on minimal images; fall back to pip install so the script never
          # crashes with ImportError on a fresh runner refresh.
          python3 -c "import yaml" 2>/dev/null \
            || python3 -m pip install --quiet --disable-pip-version-check pyyaml
          bash .ci-workflows-tools/scripts/cloud-run/deploy.sh extract-secrets "$CI_WORKFLOW_PATH" \
            | sort -u > required.txt
          echo "Extracted $(grep -c . required.txt || true) unique secret name(s) from $CI_WORKFLOW_PATH"

      - name: Fetch GCP secret list and compare
        env:
          PROJECT: ${{ inputs.project }}
          REPO_TYPE: ${{ inputs.repo_type }}
        run: |
          set -euo pipefail

          gcloud secrets list \
            --project="$PROJECT" \
            --format='value(name.basename())' \
            | sort -u > all.txt

          required_count=$(grep -c . required.txt || true)
          all_count=$(grep -c . all.txt || true)

          {
            echo "# Secret Verify (GCP Secret Manager)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Repo type | \`$REPO_TYPE\` |"
            echo "| GCP project | \`$PROJECT\` |"
            echo "| Required (declared) | $required_count |"
            echo "| Available in GCP | $all_count |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$required_count" -eq 0 ]; then
            {
              echo "## ✅ No required secrets declared"
              echo ""
              echo "_Nothing to compare. (\`secrets.required = []\` for worker, zero secretKeyRef in service.yaml for rust, or no \`update_secrets\` in workflow for cloud-run.)_"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice ::No required secrets declared; verify passes vacuously."
            exit 0
          fi

          missing=$(comm -23 required.txt all.txt || true)

          {
            echo "## Required secrets"
            echo ""
            echo "| Status | Secret name |"
            echo "|--------|-------------|"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              if grep -qxF "$name" all.txt; then
                echo "| ✅ present | \`$name\` |"
              else
                echo "| ❌ missing | \`$name\` |"
              fi
            done < required.txt
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$missing" ]; then
            {
              echo "## ❌ Missing in GCP Secret Manager"
              echo ""
              echo "These secrets are declared in the repo but not present in project \`$PROJECT\`."
              echo "Create them with \`gcloud secrets create <NAME> --project=$PROJECT --replication-policy=automatic\` and add a version."
              echo ""
              while IFS= read -r name; do
                [ -z "$name" ] && continue
                echo "- \`$name\`"
              done <<< "$missing"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Missing secrets in GCP Secret Manager (project=$PROJECT):"
            echo "$missing" | sed 's/^/  - /'
            exit 1
          fi

          {
            echo "## ✅ All declared secrets exist in GCP"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice ::All $required_count declared secret(s) exist in $PROJECT"
