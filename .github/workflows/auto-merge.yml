name: Auto Merge

on:
  workflow_call:

jobs:
  auto-merge:
    name: Auto Merge
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge ${{ github.event.number }} --squash --repo ${{ github.repository }} 2>&1 || true
