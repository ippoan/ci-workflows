name: Tag Release

# semver `v{major}.{minor}.{patch}` tag を `workflow_dispatch` で採番 + push する
# reusable workflow。オプションで同 job 内に GitHub Release 作成も含められる
# (`dev-tag-release.yml` と同じ 2 mode 構造)。
#
# ## Mode A: tag push のみ (default、binary repo の release.yml 連鎖向け)
#
#   uses: ippoan/ci-workflows/.github/workflows/tag-release.yml@main
#   with:
#     bump: ${{ inputs.bump }}
#   secrets:
#     TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
#
# ## Mode B: tag push + release 作成 (lib repo / asset 不要なら推奨)
#
#   uses: ippoan/ci-workflows/.github/workflows/tag-release.yml@main
#   with:
#     bump: ${{ inputs.bump }}
#     create_release: true
#
# Mode B では `gh release create --latest` を同 job 内で実行 (stable release で
# releases/latest に出す)。`TAG_RELEASE_PAT` 省略可。
#
# ## Per-binary stable tag (monorepo 向け、ippoan/mcp-relay-rs#9)
#
# monorepo に複数 binary を抱える repo で per-binary 独立 cadence で stable release
# したい場合、`prefix` を指定すると tag 命名規則が `<prefix>v{semver}` になる:
#
#   uses: ippoan/ci-workflows/.github/workflows/tag-release.yml@main
#   with:
#     prefix: 'github-mcp-server-rs-'
#     bump: ${{ inputs.bump }}
#   secrets:
#     TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
#
# → tag `github-mcp-server-rs-v0.0.18` を push。既存 `<prefix>v*` だけ scan するので
# 他 binary の semver と衝突しない。Mode B では `--latest` を付けない (= per-binary
# release は `releases/latest` API を占有しない、monorepo-wide `v*` だけが latest)。

on:
  workflow_call:
    inputs:
      bump:
        description: 'Version bump type (patch / minor / major)'
        type: string
        default: 'patch'
      create_release:
        description: |
          true なら同 job 内で `gh release create --latest` を実行する (Mode B)。
          false (default) なら tag push のみ (Mode A、caller の release.yml 発火を期待)。
        type: boolean
        default: false
      ref:
        description: |
          checkout / tag 対象の git ref。通常は省略 (workflow_dispatch から呼ばれた
          時のデフォルト main HEAD で良い)。pull_request: closed 等の特殊 trigger
          から呼ぶ場合に `merge_commit_sha` を渡す用。
        type: string
        default: ''
      prefix:
        description: |
          Optional tag name prefix (e.g. `github-mcp-server-rs-` for per-binary
          stable release in a monorepo). Default empty → produces `v{semver}`.
          With prefix → produces `<prefix>v{semver}` and scans `<prefix>v*` only.
          Mode B では prefix が空でない場合 `--latest` を付けない (releases/latest
          は monorepo-wide な無 prefix release が占有する想定)。
        type: string
        default: ''
      version_prefix:
        description: |
          Optional literal inserted between `prefix` and the semver. Default
          `v` (= 既存挙動: `<prefix>v{semver}`)。 空文字を渡すと `v` を入れ
          ない `<prefix>{semver}` 形式になる (例: `dev-0.0.2`)。 mcp-cf-workers
          の dev release で `dev-{semver}` を採番するために導入。
        type: string
        default: 'v'
    secrets:
      TAG_RELEASE_PAT:
        description: |
          tag push 後の caller release workflow 連鎖発火に必要な PAT。
          `create_release: true` の Mode B では省略可能 (省略時は `github.token` で push)。
          Mode A では必須。
        required: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.TAG_RELEASE_PAT || github.token }}

      - name: Guard — Mode A requires TAG_RELEASE_PAT
        if: ${{ !inputs.create_release }}
        env:
          PAT: ${{ secrets.TAG_RELEASE_PAT }}
        run: |
          if [ -z "${PAT:-}" ]; then
            echo "::error::Mode A (create_release=false) は TAG_RELEASE_PAT 必須。" >&2
            echo "::error::caller の release.yml チェーンを使わないなら create_release: true を指定して" >&2
            echo "::error::Mode B に切り替えるか、repo に PAT を登録してください。" >&2
            exit 1
          fi

      - name: Compute next semver tag
        id: tag
        env:
          BUMP: ${{ inputs.bump }}
          PREFIX: ${{ inputs.prefix }}
          VERSION_PREFIX: ${{ inputs.version_prefix }}
        run: |
          set -euo pipefail
          git fetch --tags
          # scan `<prefix><version_prefix>*` (default は `<prefix>v*`)、ただし
          # prefix/version_prefix を剥がした残りが **厳密な N.N.N** の tag だけを
          # 採番候補にする。`v0.5.99-wave-test-08` のような suffix 付き tag が
          # `-v:refname` ソートで最上位に来て PATCH="99-wave-test-08" となり、
          # `$((PATCH + 1))` の算術評価で `wave: unbound variable` で落ちるのを防ぐ。
          # desc ソート順に走査し、最初に strict semver へ一致した tag を採用する。
          LATEST=""
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            rest="${t#${PREFIX}${VERSION_PREFIX}}"
            if [[ "$rest" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              LATEST="$t"
              break
            fi
          done < <(git tag -l "${PREFIX}${VERSION_PREFIX}*" --sort=-v:refname)

          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            # prefix を剥がしてから version_prefix も剥がして semver 取り出し。
            VERSION="${LATEST#${PREFIX}${VERSION_PREFIX}}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="${PREFIX}${VERSION_PREFIX}${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          {
            echo "### Tag Release"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| bump | \`${BUMP}\` |"
            echo "| prefix | \`${PREFIX:-(none)}\` |"
            echo "| previous | \`${LATEST:-(none)}\` |"
            echo "| new | \`${NEW_TAG}\` |"
            echo "| commit | \`${SHORT_SHA}\` |"
            echo "| create_release | \`${{ inputs.create_release }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          git push origin "$NEW_TAG"
          echo "Pushed ${NEW_TAG}"

      - name: Create GitHub Release (Mode B)
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          PREFIX: ${{ inputs.prefix }}
        run: |
          set -euo pipefail
          # prefix 無し (monorepo-wide / single-package repo) は stable:
          #   --latest で releases/latest API に出す。
          # prefix あり (per-binary stable in monorepo) は --latest を付けない:
          #   releases/latest は無 prefix release が占有する想定。binary 個別の
          #   stable は独自 channel として消費される (install-mcp.sh 等が
          #   `<prefix>v*` を直接 scan)。
          if [ -z "$PREFIX" ]; then
            gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --generate-notes \
              --latest
          else
            gh release create "$NEW_TAG" \
              --title "$NEW_TAG" \
              --generate-notes
          fi
