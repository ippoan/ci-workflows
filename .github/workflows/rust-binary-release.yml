name: Rust Binary Release

# Reusable workflow: tag push (v*) 起点で `cargo build --release` を回し、
# GitHub Release ページに各 target のアーカイブを attach する。
#
# Caller example (linux のみ):
#   on:
#     push:
#       tags: ["v*"]
#   jobs:
#     release:
#       uses: ippoan/ci-workflows/.github/workflows/rust-binary-release.yml@main
#       with:
#         bin_name: github-mcp-server-rs
#       permissions:
#         contents: write
#
# 複数 OS:
#   with:
#     bin_name: foo
#     targets: |
#       [
#         {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","archive":"tar.gz"},
#         {"target":"x86_64-apple-darwin","os":"macos-latest","archive":"tar.gz"},
#         {"target":"aarch64-apple-darwin","os":"macos-latest","archive":"tar.gz"},
#         {"target":"x86_64-pc-windows-msvc","os":"windows-latest","archive":"zip","ext":".exe"}
#       ]
#
# target object フィールド:
#   target  (required): cargo target triple
#   os      (required): runner OS
#   archive (required): "tar.gz" or "zip"
#   ext     (optional): binary 拡張子 (windows は ".exe")
#   cross   (optional): aarch64-unknown-linux-gnu 等 cross compile が必要なら true
#
# Optional secrets:
#   MCP_INTERNAL_SECRET  — build 時に env として cargo build に注入される。
#     caller の build.rs が `std::env::var("MCP_INTERNAL_SECRET")` を読み、
#     `cargo:rustc-env` で release binary に embed する用途。
#     渡さない場合は空文字列扱い (= consuming binary 側で dev fallback に落ちる)。
#     初出: github-mcp-server-rs#25 (auth-worker introspect secret embed)。

on:
  workflow_call:
    inputs:
      bin_name:
        description: "Binary name (must match Cargo.toml [[bin]] name)"
        required: true
        type: string
      package:
        description: |
          Optional cargo `-p <package>` for workspace repos (ippoan/mcp-relay-rs
          monorepo). 省略時は workspace root or single-crate repo として
          `cargo build --release --target <T> --locked` を実行。
          (`bin_name` と一致する package name が普通だが、binary 名と package 名が
          異なる場合 (例: 1 crate に複数 [[bin]] がある場合) は明示する。)
        required: false
        type: string
        default: ""
      tag_strip_prefix:
        description: |
          Optional prefix to strip from `GITHUB_REF_NAME` before composing the
          archive name. monorepo の per-binary tag (`<bin>-v0.0.X`) で asset 名が
          `<bin>-<bin>-v0.0.X-...tar.gz` と doubling するのを防ぐ:
            tag_strip_prefix: "github-mcp-server-rs-"
              tag=github-mcp-server-rs-v0.0.18 → archive base=github-mcp-server-rs-v0.0.18-<target>
          省略時は tag をそのまま使う (= 旧挙動互換)。
        required: false
        type: string
        default: ""
      targets:
        description: "JSON array of target objects {target, os, archive, ext?, cross?}"
        required: false
        type: string
        default: '[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","archive":"tar.gz"}]'
      release_body:
        description: "Optional body for the GitHub Release (markdown)"
        required: false
        type: string
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as prerelease (auto true for tags containing -)"
        required: false
        type: boolean
        default: false
      working_directory:
        description: |
          cargo を実行する作業ディレクトリ (workspace が subdir にある場合、例: "rust")。
          デフォルト "." = repo root。dist/ や target/ も同 directory 基準になる。
        required: false
        type: string
        default: '.'
    secrets:
      MCP_INTERNAL_SECRET:
        description: "Optional. Embedded into the release binary at build time via env. See github-mcp-server-rs#25."
        required: false
      MINISIGN_SECRET_KEY:
        description: |
          Optional. minisign の無パスワード秘密鍵 (`minisign -G -W` で生成した .key
          ファイルの中身、2 行)。渡すと release job が各 .zip / .tar.gz を minisign で
          署名し `<asset>.minisig` を Release に添付する (supply-chain 強化)。
          consumer は対応する公開鍵を hard-code して self-update 時に検証する。
          初出: cdp-relay#20 (agent self-update の asset 署名検証)。
          渡さない caller は署名 step が skip され従来どおり (= 後方互換)。
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # crates.io download の flaky 対策。Windows runner で `[16] Error in the HTTP2
  # framing layer` による `download of … failed` が散発する (cdp-relay の Windows
  # release で観測)。retry を増やし、HTTP/2 multiplexing を切って framing 起因の
  # 一過性失敗を抑える (dtolnay/rust-toolchain も 1.70/1.71 で同 workaround を入れる)。
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  # sccache: rustc 成果物を GHA backend (actions/cache) に保存。
  # tag push でも cache が効くように env と save-if を整備する。
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  CARGO_INCREMENTAL: "0"  # sccache 利用時は incremental hash が不安定なので切る

jobs:
  build:
    name: build ${{ matrix.t.target }}
    strategy:
      fail-fast: false
      matrix:
        t: ${{ fromJSON(inputs.targets) }}
    runs-on: ${{ matrix.t.os }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.t.target }}

      # cache 戦略 (skill: ci-cache-patterns):
      #   - sccache: rustc コンパイル成果物 (チェックサム判定、main cache の本命)
      #   - Swatinem/rust-cache: ~/.cargo/registry + ~/.cargo/git の補助
      #     `cache-targets: false` で target/ は sccache に任せて重複回避
      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          # multi-target caller でも衝突しないよう target を key に含める
          shared-key: ${{ inputs.bin_name }}-${{ matrix.t.target }}
          cache-targets: false
          workspaces: ${{ inputs.working_directory }}
          cache-on-failure: true
          # default-branch push に加え任意の tag push でも save する
          # (旧 `refs/tags/v` 限定だと per-binary `<bin>-v*` / `dev-*` で save されない)
          save-if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/') }}

      - name: Install cross toolchain (aarch64-linux only)
        if: matrix.t.cross == true && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo '[target.aarch64-unknown-linux-gnu]'
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - name: cargo build --release
        # Windows runner の default shell は pwsh。下の `if [ -n "$PKG" ]` 等は
        # bash 構文なので shell を明示しないと pwsh が ParserError で落ちる
        # (Missing '(' after 'if')。Git Bash は windows-latest に同梱。
        shell: bash
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # Optional build-time embed (github-mcp-server-rs#25)。caller が
          # secrets を渡さなければ空文字列。consuming build.rs 側で
          # `std::env::var("MCP_INTERNAL_SECRET").unwrap_or_default()` し、
          # 空なら下流 resolver が dev fallback に落ちる安全設計。
          MCP_INTERNAL_SECRET: ${{ secrets.MCP_INTERNAL_SECRET }}
          # `package` が指定されたら `cargo build -p <pkg>` を発行 (workspace 内
          # 特定 member だけ build する monorepo 向け)。
          PKG: ${{ inputs.package }}
        run: |
          set -euo pipefail
          if [ -n "$PKG" ]; then
            cargo build --release --locked -p "$PKG" --target ${{ matrix.t.target }}
          else
            cargo build --release --locked --target ${{ matrix.t.target }}
          fi

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Strip (unix native only)
        if: runner.os != 'Windows' && matrix.t.cross != true
        run: |
          strip "target/${{ matrix.t.target }}/release/${{ inputs.bin_name }}" || true

      - name: Compute artifact name
        id: meta
        shell: bash
        env:
          STRIP_PREFIX: ${{ inputs.tag_strip_prefix }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # `tag_strip_prefix: "github-mcp-server-rs-"` + tag `github-mcp-server-rs-v0.0.18`
          # → STRIPPED=`v0.0.18` → archive=`github-mcp-server-rs-v0.0.18-<target>`
          # (doubling 回避、ippoan/mcp-relay-rs#9)
          if [ -n "$STRIP_PREFIX" ] && [[ "$TAG" == "${STRIP_PREFIX}"* ]]; then
            STRIPPED="${TAG#$STRIP_PREFIX}"
          else
            STRIPPED="$TAG"
          fi
          ARCHIVE_NAME="${{ inputs.bin_name }}-${STRIPPED}-${{ matrix.t.target }}"
          echo "archive_base=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "stripped=${STRIPPED}" >> "$GITHUB_OUTPUT"
          {
            echo "### Asset naming"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| tag (GITHUB_REF_NAME) | \`${TAG}\` |"
            echo "| tag_strip_prefix | \`${STRIP_PREFIX:-(none)}\` |"
            echo "| stripped | \`${STRIPPED}\` |"
            echo "| archive_base | \`${ARCHIVE_NAME}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Package (tar.gz)
        if: matrix.t.archive == 'tar.gz'
        shell: bash
        run: |
          STAGE="${{ steps.meta.outputs.archive_base }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.t.target }}/release/${{ inputs.bin_name }}${{ matrix.t.ext }}" "dist/${STAGE}/"
          [ -f README.md ] && cp README.md "dist/${STAGE}/" || true
          [ -f LICENSE ]   && cp LICENSE   "dist/${STAGE}/" || true
          tar -czf "dist/${STAGE}.tar.gz" -C dist "${STAGE}"
          (cd dist && shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256")

      - name: Package (zip, windows)
        if: matrix.t.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${{ steps.meta.outputs.archive_base }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.t.target }}/release/${{ inputs.bin_name }}${{ matrix.t.ext }}" "dist/$stage/"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist/$stage/" }
          if (Test-Path "LICENSE")   { Copy-Item "LICENSE"   "dist/$stage/" }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip"
          $hash = (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive_base }}
          path: |
            ${{ inputs.working_directory }}/dist/${{ steps.meta.outputs.archive_base }}.tar.gz
            ${{ inputs.working_directory }}/dist/${{ steps.meta.outputs.archive_base }}.tar.gz.sha256
            ${{ inputs.working_directory }}/dist/${{ steps.meta.outputs.archive_base }}.zip
            ${{ inputs.working_directory }}/dist/${{ steps.meta.outputs.archive_base }}.zip.sha256
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # secret は job-level env に置き、`if: env.MINISIGN_SECRET_KEY != ''` で署名 step を
    # 有無分岐する (step-level env は同 step の if から参照できないため job-level)。
    # 渡されなければ空文字列 = 後方互換 (署名なし)。
    env:
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List staged assets
        run: ls -la dist/

      # 全 target の archive が dist/ に揃った ubuntu runner で一括 minisign 署名する
      # (per-OS runner に minisign を入れるより単純)。MINISIGN_SECRET_KEY が無ければ skip。
      # 署名対象は self-update が DL する .zip / .tar.gz 本体。鍵は無パスワード
      # (`minisign -G -W`) 前提で stdin を </dev/null に閉じ非対話署名する。
      - name: Sign archives with minisign
        if: env.MINISIGN_SECRET_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign
          # 秘密鍵は file 経由でのみ minisign に渡し、終了時に shred する。
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          shopt -s nullglob
          signed=0
          for f in dist/*.zip dist/*.tar.gz; do
            minisign -S -s "$RUNNER_TEMP/minisign.key" -m "$f" -x "$f.minisig" </dev/null
            signed=$((signed + 1))
          done
          shred -u "$RUNNER_TEMP/minisign.key"
          echo "signed $signed archive(s)"
          ls -la dist/

      - name: Detect prerelease (tag contains -)
        id: detect
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ inputs.release_body }}
          generate_release_notes: true
          draft: ${{ inputs.draft }}
          prerelease: ${{ steps.detect.outputs.prerelease == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/*.minisig
          # caller が linux のみ build した時に zip pattern が match しない
          # ケース、署名 step を skip して .minisig が無いケースを許容
          # (build / 署名した分だけ attach されれば OK)。
          fail_on_unmatched_files: false
