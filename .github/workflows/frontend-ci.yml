name: Frontend CI

on:
  workflow_call:
    inputs:
      project_type:
        description: 'Project type: "nuxt" (build + deploy) or "worker" (deploy only)'
        type: string
        default: 'nuxt'
      working_directory:
        description: Working directory for npm commands (e.g. "web" for monorepos)
        type: string
        default: '.'
      node_version:
        description: Node.js version
        type: string
        default: '24'
      install_command:
        description: Command to install dependencies
        type: string
        default: 'npm ci'
      has_tests:
        description: Whether to run the test job
        type: boolean
        default: true
      has_integration:
        description: Whether to run the integration test job
        type: boolean
        default: false
      typecheck_command:
        description: 'Override typecheck command (default: nuxt="npx nuxi typecheck", worker="npx tsc --noEmit")'
        type: string
        default: ''
      pre_install_script:
        description: Script to run before npm install (e.g. stub local dependencies)
        type: string
        default: ''
      post_install_script:
        description: Script to run after npm install (e.g. "npx nuxt prepare", "npx wrangler types")
        type: string
        default: ''
      use_auth_client_dev:
        description: Whether to use the auth-client dev action
        type: boolean
        default: false
      test_command:
        description: Test command
        type: string
        default: 'npx vitest run --coverage --reporter=default --reporter=json --outputFile.json=coverage/test-results.json'
      deploy_staging_script:
        description: 'Override staging deploy script (default: auto by project_type)'
        type: string
        default: ''
      deploy_release_script:
        description: 'Override release deploy script (default: auto by project_type)'
        type: string
        default: ''
      integration_compose_file:
        description: Docker Compose file for integration tests
        type: string
        default: 'docker-compose.test.yml'
      integration_test_command:
        description: Integration test command
        type: string
        default: 'npx vitest run'
      integration_env:
        description: 'Space-separated KEY=VALUE pairs for integration test env (e.g. "TEST_LIVE=1 API_BASE_URL=http://localhost:18080")'
        type: string
        default: ''
      npm_scope:
        description: 'npm scope for GitHub Packages registry (e.g. "@ippoan")'
        type: string
        default: ''
      cache_dependency_path:
        description: Path to package-lock.json for npm cache (e.g. "web/package-lock.json")
        type: string
        default: ''
      has_deploy:
        description: Whether to run deploy jobs (controls both staging and release)
        type: boolean
        default: true
      has_staging_deploy:
        description: Whether to run staging deploy (overrides has_deploy for staging only)
        type: boolean
        default: true
      npm_publish_directory:
        description: 'Directory of npm package to publish (e.g. "packages/auth-client"). Empty = no publish.'
        type: string
        default: ''
      npm_publish_name:
        description: 'Full npm package name for propagation (e.g. "@ippoan/auth-client"). Required if propagate_repos is set.'
        type: string
        default: ''
      npm_publish_propagate_repos:
        description: 'Comma-separated repos to auto-update after publish (e.g. "ippoan/nuxt-notify,ippoan/alc-app"). Empty = no propagation.'
        type: string
        default: ''
      npm_publish_propagate_dirs:
        description: 'Comma-separated working directories per repo (e.g. ".,.,web"). Must match propagate_repos order.'
        type: string
        default: ''
      # ----- Optional opt-in: GCP secret-verify integration -----
      # secret-verify-gcp.yml を本 reusable の中に直列 (test/typecheck の
      # 後) で組み込むフック。caller (`test.yml`) が別 workflow を持たずに
      # WIF vars を渡すだけで verify が `ci / secret-verify` として参加する。
      # 3 つの input すべて non-empty のときだけ動く (= backward compat)。
      gcp_secret_verify_project:
        description: 'GCP project to verify against (e.g. cloudsql-sv). Empty = skip the verify job entirely.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_provider:
        description: 'WIF provider full resource name. Pass vars.GCP_WIF_PROVIDER from caller.'
        required: false
        type: string
        default: ''
      gcp_secret_verify_sa:
        description: 'WIF impersonation target SA email (verify 用、secretmanager.viewer role が必要)。'
        required: false
        type: string
        default: ''
      gcp_secret_verify_wrangler_path:
        description: 'wrangler.jsonc / .toml の path。default は autodetect (リポジトリ root)。Worker 限定 input、Nuxt では使用不可。'
        required: false
        type: string
        default: ''
      gcp_secret_verify_apply_labels:
        description: 'Verify 成功後に GCP Secret Manager の secret に `used-by-<owner>-<repo>=active|removed` label を打つ。requires `secretmanager.secrets.update` on the verify SA. default false。'
        required: false
        type: boolean
        default: false
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: Cloudflare API token for wrangler deploy
        required: false
      PROPAGATE_PAT:
        description: PAT with repo scope for cross-repo package propagation
        required: false

jobs:
  pr-limit:
    name: PR Limit Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ippoan/ci-workflows/.github/actions/pr-limit@main

  check-old-auth-domain:
    name: Check old auth-worker domain
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if auth.mtamaramu.com is hardcoded
        shell: bash
        run: |
          # 旧 auth-worker ドメイン (auth.mtamaramu.com) のハードコード参照を検出する。
          # 新ドメインは auth.ippoan.org。auth-worker URL は wrangler の env vars
          # (NUXT_PUBLIC_AUTH_WORKER_URL) や config.public.authWorkerUrl 経由で
          # 注入する想定。ハードコードしているとドメイン移行漏れになり、
          # /admin/sso → /top や cross-app navigation で旧 worker に飛んで
          # 認証が通らなくなる。
          #
          # 対象ファイル: ts / vue / js / mjs / toml / json / jsonc
          # 除外: node_modules, .claude/worktrees, package-lock.json, lock files,
          #       コメント中の説明 (許容したい場合は `// allow-old-auth-domain`
          #       を行末に付けること)。
          set -euo pipefail

          MATCHES=$(grep -rEn "auth\.mtamaramu\.com" . \
            --include="*.ts" --include="*.tsx" --include="*.vue" \
            --include="*.js" --include="*.mjs" --include="*.cjs" \
            --include="*.toml" --include="*.json" --include="*.jsonc" \
            --exclude-dir=node_modules \
            --exclude-dir=.claude \
            --exclude-dir=.git \
            --exclude-dir=dist \
            --exclude-dir=.output \
            --exclude-dir=.nuxt \
            --exclude-dir=coverage \
            --exclude="package-lock.json" \
            --exclude="*.lock" \
            2>/dev/null | grep -v "allow-old-auth-domain" || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::Hardcoded auth.mtamaramu.com (old auth-worker URL) detected. Use auth.ippoan.org or read from runtime config (config.public.authWorkerUrl) / env var (NUXT_PUBLIC_AUTH_WORKER_URL)."
            echo ""
            echo "Matches:"
            echo "$MATCHES"
            echo ""
            echo "If a reference is intentional (e.g. legacy redirect for an out-of-date bookmark), add a trailing '// allow-old-auth-domain' comment on that line to whitelist it."
            exit 1
          fi
          echo "OK: no hardcoded auth.mtamaramu.com found."

  branch-protection:
    name: Branch Protection Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch protection
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="main"
          DASHBOARD_URL="https://auth-staging.ippoan.org/dashboard/branch-protection"

          # GitHub API は **authenticated** で叩く。anonymous は 60 req/hr/IP の
          # 厳しい rate limit があり、GitHub Actions runner IP は共有なので
          # workflow_call で複数 PR が並行している時に頻繁に hit する。
          # GITHUB_TOKEN 経由なら 5000 req/hr/repo。
          fetch_with_retry() {
            local url=$1; shift
            local body=""
            for i in 1 2 3 4; do
              if body=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                              -H "Accept: application/vnd.github+json" \
                              -H "X-GitHub-Api-Version: 2022-11-28" \
                              "$url" "$@"); then
                printf '%s' "$body"
                return 0
              fi
              if [ "$i" -lt 4 ]; then
                # exponential backoff: 5s, 10s, 20s
                local delay=$((5 * 2 ** (i - 1)))
                echo "::warning::Attempt $i of GET $url failed, retrying in ${delay}s..." >&2
                sleep "$delay"
              fi
            done
            return 1
          }

          # /branches/$BRANCH — 「protected かどうか」を判定する一次ソース。
          # ここで取れないと残りの判定が無意味なので、失敗時は明示的に exit 1。
          if ! BRANCH_INFO=$(fetch_with_retry "https://api.github.com/repos/$REPO/branches/$BRANCH"); then
            echo "::error::Cannot fetch branch info for $REPO/$BRANCH after 4 attempts (likely transient GitHub API failure)"
            echo "::error::Re-run this job to retry, or see $DASHBOARD_URL for the expected configuration."
            exit 1
          fi

          PROTECTED=$(echo "$BRANCH_INFO" | jq -r '.protected')
          if [ "$PROTECTED" != "true" ]; then
            echo "::error::Branch protection is NOT enabled on $REPO/$BRANCH. Please enable it."
            echo "::error::Check the current state and required settings here: $DASHBOARD_URL"
            exit 1
          fi

          # /protection — 取れたら詳細チェック、取れなければ warning + 詳細はスキップ。
          # transient エラーで PR を ❌ にしないため、ここは exit 0 寄り (= 緩い)。
          if ! PROTECTION=$(fetch_with_retry "https://api.github.com/repos/$REPO/branches/$BRANCH/protection"); then
            echo "::warning::Cannot read protection details after 4 attempts (private repo, rate limit, or transient). Skipping detailed check."
            echo "✅ Branch is protected (details not verifiable)"
            exit 0
          fi

          ERRORS=()

          # Check: required status checks exist
          CHECKS=$(echo "$PROTECTION" | jq -r '.required_status_checks.checks // [] | length')
          if [ "$CHECKS" -eq 0 ]; then
            ERRORS+=("No required status checks configured")
          fi

          # Check: enforce_admins enabled
          ENFORCE=$(echo "$PROTECTION" | jq -r '.enforce_admins.enabled')
          if [ "$ENFORCE" != "true" ]; then
            ERRORS+=("enforce_admins is not enabled (admins can bypass protection)")
          fi

          # Check: force push disabled
          FORCE=$(echo "$PROTECTION" | jq -r '.allow_force_pushes.enabled')
          if [ "$FORCE" = "true" ]; then
            ERRORS+=("Force pushes are allowed")
          fi

          # Check: delete disabled
          DELETE=$(echo "$PROTECTION" | jq -r '.allow_deletions.enabled')
          if [ "$DELETE" = "true" ]; then
            ERRORS+=("Branch deletion is allowed")
          fi

          # Check: required checks include ci / prefix
          HAS_CI_CHECK=$(echo "$PROTECTION" | jq '[.required_status_checks.checks[] | .context] | any(startswith("ci /"))')
          if [ "$HAS_CI_CHECK" != "true" ]; then
            ERRORS+=("No 'ci /' required status check found")
          fi

          # Check: auto-merge enabled + delete branch on merge.
          # /repos/$REPO の取得失敗は transient 扱い (= ERRORS には積まず warning)
          # にして PR を不要に止めない。設定漏れは branch protection の
          # /protection 側でも別途気付ける。
          if REPO_INFO=$(fetch_with_retry "https://api.github.com/repos/$REPO"); then
            AUTO_MERGE=$(echo "$REPO_INFO" | jq -r '.allow_auto_merge // false')
            if [ "$AUTO_MERGE" != "true" ]; then
              ERRORS+=("Auto-merge is not enabled (Settings > General > Allow auto-merge)")
            fi
            DELETE_BRANCH=$(echo "$REPO_INFO" | jq -r '.delete_branch_on_merge // false')
            if [ "$DELETE_BRANCH" != "true" ]; then
              ERRORS+=("Delete branch on merge is not enabled (Settings > General > Automatically delete head branches)")
            fi
          else
            echo "::warning::Cannot fetch /repos/$REPO after 4 attempts — skipping auto-merge / delete-on-merge check"
          fi

          # Check: Ruleset exists with no bypass actors (admin bypass prevention).
          # /rulesets は GITHUB_TOKEN に administration:read が無いと 403 を返す。
          # caller が `permissions: { administration: read }` を宣言していない repo
          # では PR を不要に止めず、warning だけ出して skip する (=設定が正しくても
          # token 不足で false-fail しない)。
          if RULESETS=$(fetch_with_retry "https://api.github.com/repos/$REPO/rulesets"); then
            if [ -n "$RULESETS" ] && [ "$RULESETS" != "[]" ]; then
              HAS_NO_BYPASS=$(echo "$RULESETS" | jq '[.[] | select(.enforcement == "active" and (.bypass_actors | length) == 0)] | length > 0')
              if [ "$HAS_NO_BYPASS" != "true" ]; then
                ERRORS+=("No active Ruleset with empty bypass_actors found (admin can bypass CI with --admin)")
              fi
            else
              ERRORS+=("No Rulesets configured (admin can bypass CI with gh pr merge --admin)")
            fi
          else
            echo "::warning::Cannot fetch /rulesets for $REPO (token may lack 'administration: read'). Skipping ruleset check."
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "::error::Repository settings issues on $REPO/$BRANCH:"
            for e in "${ERRORS[@]}"; do
              echo "::error::  - $e"
            done
            echo "::error::Check the current state and required settings here: $DASHBOARD_URL"
            exit 1
          fi

          echo "✅ Branch protection and repo settings verified on $REPO/$BRANCH"
          echo "$PROTECTION" | jq '{
            required_checks: [.required_status_checks.checks[].context],
            enforce_admins: .enforce_admins.enabled,
            force_push: .allow_force_pushes.enabled,
            deletions: .allow_deletions.enabled
          }'
          echo "auto_merge: $AUTO_MERGE"

  test:
    name: Vitest + Coverage
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_tests &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run tests with coverage
        run: ${{ inputs.test_command }}

      - name: Coverage 100% regression check
        if: always() && hashFiles(format('{0}/scripts/check_coverage_100.mjs', inputs.working_directory)) != ''
        run: node scripts/check_coverage_100.mjs

      - name: Job Summary
        if: always()
        run: |
          echo "## Vitest Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test results summary (vitest json reporter)
          if [ -f coverage/test-results.json ]; then
            node -e "
              const s = require('./coverage/test-results.json');
              const suites = s.numTotalTestSuites || 0;
              const passed = s.numPassedTestSuites || 0;
              const tests = s.numTotalTests || 0;
              const testsPassed = s.numPassedTests || 0;
              const failed = s.numFailedTests || 0;
              console.log('### Summary');
              console.log('- Test Files: ' + (failed === 0 ? '✅' : '❌') + ' ' + passed + ' passes · ' + suites + ' total');
              console.log('- Test Results: ' + (failed === 0 ? '✅' : '❌') + ' ' + testsPassed + ' passes · ' + tests + ' total');
              if (failed > 0) console.log('- ❌ ' + failed + ' failed');
            " >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Coverage section (coverage-summary.json or coverage-final.json fallback)
          if [ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]; then
            node -e "
              const fs = require('fs');
              const path = require('path');
              const cwd = process.cwd();
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');

              let summary;
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = { total: { statements: {pct:0}, branches: {pct:0}, functions: {pct:0}, lines: {pct:0} } };
                let tS=0,cS=0, tB=0,cB=0, tF=0,cF=0, tL=0,cL=0;
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s||{}, b = fc.b||{}, f = fc.f||{};
                  let fS=0,fCS=0, fB=0,fCB=0, fF=0,fCF=0;
                  for (const k of Object.keys(s)) { fS++; if(s[k]>0) fCS++; }
                  for (const k of Object.keys(b)) { for(const c of b[k]) { fB++; if(c>0) fCB++; } }
                  for (const k of Object.keys(f)) { fF++; if(f[k]>0) fCF++; }
                  tS+=fS; cS+=fCS; tB+=fB; cB+=fCB; tF+=fF; cF+=fCF;
                  tL+=fS; cL+=fCS;
                  const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                  summary[fp] = {
                    statements:{pct:pct(fS,fCS)}, branches:{pct:pct(fB,fCB)},
                    functions:{pct:pct(fF,fCF)}, lines:{pct:pct(fS,fCS)}
                  };
                }
                const pct = (t,c) => t===0 ? 100 : Math.round(c/t*10000)/100;
                summary.total = {
                  statements:{pct:pct(tS,cS)}, branches:{pct:pct(tB,cB)},
                  functions:{pct:pct(tF,cF)}, lines:{pct:pct(tL,cL)}
                };
              }

              const t = summary.total;
              const out = [];
              out.push('### Coverage');
              out.push('');
              out.push('| Category | Stmts | Branch | Funcs | Lines |');
              out.push('|----------|-------|--------|-------|-------|');
              out.push('| **Total** | '+t.statements.pct+'% | '+t.branches.pct+'% | '+t.functions.pct+'% | '+t.lines.pct+'% |');
              out.push('');
              const files = Object.keys(summary).filter(k => k !== 'total');
              const full = files.filter(k => summary[k].lines.pct === 100);
              out.push('**Lines 100%:** '+full.length+' / '+files.length+' files');
              out.push('');
              out.push('<details><summary>Lines &lt; 100% ファイル一覧</summary>');
              out.push('');
              out.push('| File | Stmts | Branch | Funcs | Lines |');
              out.push('|------|-------|--------|-------|-------|');
              for (const k of files) {
                const e = summary[k];
                if (e.lines.pct < 100) {
                  const rel = path.relative(cwd, k);
                  out.push('| '+rel+' | '+e.statements.pct+'% | '+e.branches.pct+'% | '+e.functions.pct+'% | '+e.lines.pct+'% |');
                }
              }
              out.push('');
              out.push('</details>');
              console.log(out.join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          fi

          # coverage_100.toml registered files status
          if [ -f coverage_100.toml ] && ([ -f coverage/coverage-summary.json ] || [ -f coverage/coverage-final.json ]); then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage 100% Files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const path = require('path');
              const toml = fs.readFileSync('coverage_100.toml', 'utf8');
              const cwd = process.cwd();

              let summary;
              const summaryPath = path.join(cwd, 'coverage', 'coverage-summary.json');
              const finalPath = path.join(cwd, 'coverage', 'coverage-final.json');
              if (fs.existsSync(summaryPath)) {
                summary = require(summaryPath);
              } else {
                const final = require(finalPath);
                summary = {};
                for (const [fp, fc] of Object.entries(final)) {
                  const s = fc.s || {};
                  let lT = 0, lC = 0;
                  for (const k of Object.keys(s)) { lT++; if (s[k] > 0) lC++; }
                  const b = fc.b || {};
                  let bT = 0, bC = 0;
                  for (const k of Object.keys(b)) { for (const c of b[k]) { bT++; if (c > 0) bC++; } }
                  summary[fp] = {
                    lines: { pct: lT === 0 ? 100 : (lC / lT) * 100 },
                    branches: { pct: bT === 0 ? 100 : (bC / bT) * 100 },
                  };
                }
              }

              const entries = [];
              let cur = null;
              for (const line of toml.split('\n')) {
                if (line.trim() === '[[files]]') { cur = { path: '', branches: false }; entries.push(cur); continue; }
                if (!cur) continue;
                const pm = line.match(/^path\s*=\s*\"(.+)\"/);
                if (pm) cur.path = pm[1];
                const bm = line.match(/^branches\s*=\s*true/);
                if (bm) cur.branches = true;
              }
              let ok = 0, fail = 0;
              console.log('| File | Lines | Branch | Status |');
              console.log('|------|-------|--------|--------|');
              for (const e of entries) {
                const absPath = path.resolve(cwd, e.path);
                const s = summary[absPath];
                if (!s) { console.log('| ' + e.path + ' | - | - | ⚠️ not found |'); fail++; continue; }
                const linesPct = Math.round(s.lines.pct * 100) / 100;
                const branchPct = Math.round(s.branches.pct * 100) / 100;
                const linesOk = linesPct === 100;
                const branchOk = !e.branches || branchPct === 100;
                const passed = linesOk && branchOk;
                if (passed) ok++; else fail++;
                console.log('| ' + e.path + ' | ' + linesPct + '% | ' + branchPct + '% | ' + (passed ? '✅' : '❌') + ' |');
              }
              console.log('');
              console.log('**Result:** ' + ok + ' passed, ' + fail + ' failed / ' + entries.length + ' registered');
            " >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ inputs.working_directory }}/coverage/
          retention-days: 30

  typecheck:
    name: Type Check
    needs: [pr-limit]
    if: >-
      always() &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Type check
        run: |
          CMD="${{ inputs.typecheck_command }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx tsc --noEmit"
            else
              CMD="npx nuxi typecheck"
            fi
          fi
          eval "$CMD"

  integration-test:
    name: API Integration
    needs: [pr-limit]
    if: >-
      always() &&
      inputs.has_integration &&
      (needs.pr-limit.result == 'success' || needs.pr-limit.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch init_local_db.sql from rust-alc-api
        run: |
          mkdir -p tests/fixtures
          curl -sfL "https://raw.githubusercontent.com/ippoan/rust-alc-api/main/scripts/init_local_db.sql" \
            -o tests/fixtures/init_local_db.sql

      - name: Start API + DB containers
        run: docker compose -f ${{ inputs.integration_compose_file }} up -d --wait
        timeout-minutes: 5

      - name: Run integration tests
        run: |
          # Parse space-separated KEY=VALUE pairs into env vars
          for pair in ${{ inputs.integration_env }}; do
            export "$pair"
          done
          ${{ inputs.integration_test_command }}

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f ${{ inputs.integration_compose_file }} logs api

      - name: Cleanup containers
        if: always()
        run: docker compose -f ${{ inputs.integration_compose_file }} down -v

  # secret-verify は test/typecheck/integration-test の **後**、deploy の
  # **前**。GCP Secret Manager に missing がある状態で wrangler deploy する
  # と worker が起動時に env 参照で死ぬので、deploy を block する位置に置く。
  # opt-in 3 input が空のときは skip され、deploy 側は skip を success
  # 扱いで進める (= backward compat、既存 caller 無影響)。
  #
  # ⚠ Caller permissions 要件:
  # 本 job は nested 内蔵で `secret-verify-gcp.yml` を呼ぶため
  # `permissions: id-token: write` を要求する。これは **`if:` で skip
  # される run でも reusable workflow の parse 段階で caller permissions
  # check が走るため**、caller が `id-token: write` を declare していないと
  # workflow 全体が `startup_failure` になる (job 起動前にエラー、ログ出ず)。
  # caller の `jobs.<id>:` または top-level の `permissions:` で必ず
  # `id-token: write` を declare すること。詳細は本 repo CLAUDE.md。
  secret-verify:
    name: secret-verify
    if: |
      inputs.gcp_secret_verify_project != '' &&
      inputs.gcp_secret_verify_provider != '' &&
      inputs.gcp_secret_verify_sa != ''
    needs: [test, typecheck, integration-test]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/secret-verify-gcp.yml
    with:
      project: ${{ inputs.gcp_secret_verify_project }}
      repo_type: worker
      wrangler_path: ${{ inputs.gcp_secret_verify_wrangler_path }}
      workload_identity_provider: ${{ inputs.gcp_secret_verify_provider }}
      service_account: ${{ inputs.gcp_secret_verify_sa }}
      apply_labels: ${{ inputs.gcp_secret_verify_apply_labels }}

  deploy-staging:
    name: Deploy Staging
    needs: [test, typecheck, integration-test, branch-protection, secret-verify]
    if: >-
      always() &&
      inputs.has_deploy &&
      inputs.has_staging_deploy &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.branch-protection.result == 'success' || needs.branch-protection.result == 'skipped') &&
      (needs.secret-verify.result == 'success' || needs.secret-verify.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CMD="${{ inputs.deploy_staging_script }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx wrangler deploy --env staging"
            else
              CMD="npm run build && npx wrangler deploy --env staging"
            fi
          fi
          eval "$CMD"

  deploy-release:
    name: Deploy Release
    needs: [test, typecheck, integration-test]
    if: >-
      always() &&
      inputs.has_deploy &&
      startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: ${{ inputs.npm_scope != '' && 'https://npm.pkg.github.com' || '' }}
          scope: ${{ inputs.npm_scope }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Pre-install script
        if: inputs.pre_install_script != ''
        run: ${{ inputs.pre_install_script }}

      - name: Install dependencies
        run: ${{ inputs.install_command }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use auth-client dev
        if: inputs.use_auth_client_dev
        uses: ippoan/auth-worker/.github/actions/use-auth-client-dev@main
        with:
          working-directory: ${{ inputs.working_directory }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-install script
        if: inputs.post_install_script != ''
        run: ${{ inputs.post_install_script }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CMD="${{ inputs.deploy_release_script }}"
          if [ -z "$CMD" ]; then
            if [ "${{ inputs.project_type }}" = "worker" ]; then
              CMD="npx wrangler deploy"
            else
              CMD="npm run build && npx wrangler deploy"
            fi
          fi
          eval "$CMD"

  publish-dev:
    name: Publish Dev
    needs: [test, typecheck]
    if: >-
      always() &&
      inputs.npm_publish_directory != '' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: ${{ inputs.npm_scope }}

      - name: Set dev version and publish
        working-directory: ${{ inputs.npm_publish_directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.${{ github.event.number }}-dev.${SHORT_SHA}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "@ippoan:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm publish --tag dev
          echo "### 📦 Published \`$(node -p "require('./package.json').name")@${VERSION}\`" >> $GITHUB_STEP_SUMMARY

  publish-release:
    name: Publish Release
    needs: [test, typecheck, integration-test, deploy-release]
    if: >-
      always() &&
      inputs.npm_publish_directory != '' &&
      startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.deploy-release.result == 'success' || needs.deploy-release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: ${{ inputs.npm_scope }}

      - name: Set release version and publish
        working-directory: ${{ inputs.npm_publish_directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract version from tag: v0.2.3 → 0.2.3
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "@ippoan:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          npm publish
          echo "### 📦 Published \`$(node -p "require('./package.json').name")@${VERSION}\`" >> $GITHUB_STEP_SUMMARY

  propagate:
    name: Propagate Package
    needs: [publish-release]
    if: >-
      always() &&
      inputs.npm_publish_propagate_repos != '' &&
      needs.publish-release.result == 'success'
    uses: ippoan/ci-workflows/.github/workflows/propagate-package.yml@main
    with:
      package_name: ${{ inputs.npm_publish_name }}
      package_version: ''
      target_repos: ${{ inputs.npm_publish_propagate_repos }}
      working_directories: ${{ inputs.npm_publish_propagate_dirs }}
      npm_scope: ${{ inputs.npm_scope }}
    secrets:
      PAT: ${{ secrets.PROPAGATE_PAT }}

  auto-merge:
    name: Auto Merge
    needs: [test, typecheck, integration-test, branch-protection, secret-verify, deploy-staging]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.typecheck.result == 'success' &&
      (needs.integration-test.result == 'success' || needs.integration-test.result == 'skipped') &&
      (needs.branch-protection.result == 'success' || needs.branch-protection.result == 'skipped') &&
      (needs.secret-verify.result == 'success' || needs.secret-verify.result == 'skipped') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    uses: ippoan/ci-workflows/.github/workflows/auto-merge.yml@main
    permissions:
      contents: write
      pull-requests: write
