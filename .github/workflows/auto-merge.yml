name: Auto Merge

on:
  workflow_call:
    secrets:
      AUTO_MERGE_PAT:
        description: |
          Optional PAT (legacy name). If set, takes precedence over
          `TAG_RELEASE_PAT`. Both fall back to `github.token` when unset.
        required: false
      TAG_RELEASE_PAT:
        description: |
          Org-standard PAT used across `tag-release.yml` /
          `dev-tag-release.yml`. Recommended — set this once at org level
          and `auto-merge.yml` picks it up automatically (no need to mint a
          separate `AUTO_MERGE_PAT`). Required scopes: `repo` + `workflow`
          (classic) or Contents/PR/Workflow Read-Write (fine-grained).
          `workflow` scope is required to merge PRs that touch
          `.github/workflows/**` — without it the merge mutation fails with
          HTTP 401 "Bad credentials" even though `gh pr view` succeeds with
          the same token (ippoan/mcp-cf-workers#3 で実害発生)。
        required: false

jobs:
  auto-merge:
    name: Auto Merge
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check mergeable and queue squash merge
        env:
          # Prefer PAT (AUTO_MERGE_PAT alias > TAG_RELEASE_PAT canonical) when
          # the caller passes one — that makes the resulting merge commit
          # `push: main` event a non-GITHUB_TOKEN actor, which IS allowed to
          # trigger downstream workflows (release.yml chain, post-merge
          # `pull_request: closed` jobs, etc).
          #
          # Without this, `gh pr merge --auto` queues the merge under
          # GITHUB_TOKEN, the auto-merge engine pushes the merge commit as
          # github-actions[bot], and the resulting push / closed events are
          # silently dropped by Actions ("GITHUB_TOKEN events do not trigger
          # workflows"). This was the silent skip observed for
          # ippoan/mcp-relay-rs#22 / #24 merges (dev-release.yml not firing,
          # see ippoan/mcp-relay-rs#21).
          #
          # Falls back to `github.token` if neither PAT secret is set, so
          # callers that genuinely don't have / want a PAT keep working
          # (they just lose the downstream-workflow chain — same as old
          # behavior).
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.TAG_RELEASE_PAT || github.token }}
        run: |
          PR=${{ github.event.number }}
          REPO=${{ github.repository }}
          MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable --jq .mergeable)
          echo "PR #$PR mergeable: $MERGEABLE"
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "::error::PR #$PR has merge conflicts. Resolve conflicts before merging."
            exit 1
          fi
          # `--auto` queues the merge so GitHub fires it once all required
          # status checks + branch-protection gates clear. Without `--auto`,
          # this job tries to merge immediately and gets rejected with
          # "base branch policy prohibits the merge" because the very job
          # that's running IS one of the required checks (chicken/egg).
          gh pr merge "$PR" --auto --squash --repo "$REPO"
