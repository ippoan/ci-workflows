name: Auto Merge

on:
  workflow_call:
    secrets:
      AUTO_MERGE_PAT:
        description: 'PAT for merge to trigger subsequent workflows (falls back to GITHUB_TOKEN)'
        required: false

jobs:
  auto-merge:
    name: Auto Merge
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash merge
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || github.token }}
        run: gh pr merge ${{ github.event.number }} --squash --repo ${{ github.repository }}
