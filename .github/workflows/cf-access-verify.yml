name: cf-access verify

# Reusable workflow: verify that a Cloudflare Access application covering a
# wildcard domain still exists and has a policy allowing the expected email.
# Intended for scheduled enforcement to detect accidental Dashboard changes.
#
# Caller:
#   jobs:
#     verify:
#       uses: ippoan/ci-workflows/.github/workflows/cf-access-verify.yml@main
#       with:
#         domain_pattern: "*-dev.ippoan.org"
#         required_emails: "me@example.com"
#       secrets:
#         CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

on:
  workflow_call:
    inputs:
      domain_pattern:
        description: Access application domain (wildcard ok, e.g. "*-dev.example.com")
        required: true
        type: string
      required_emails:
        description: Comma-separated emails that must be in an Allow policy
        required: true
        type: string
      verifier_source:
        description: URL to the verify-access-app.mjs script
        type: string
        default: 'https://raw.githubusercontent.com/ippoan/dev-proxy/main/scripts/verify-access-app.mjs'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch verifier
        run: curl -sfL "${{ inputs.verifier_source }}" -o /tmp/verify-access-app.mjs

      - name: Verify Access application
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_APP_DOMAIN: ${{ inputs.domain_pattern }}
        run: |
          # verifier accepts a single email; loop for each required email.
          IFS=',' read -ra EMAILS <<< "${{ inputs.required_emails }}"
          for email in "${EMAILS[@]}"; do
            email="${email// /}"
            CF_ALLOW_EMAIL="$email" node /tmp/verify-access-app.mjs
          done
