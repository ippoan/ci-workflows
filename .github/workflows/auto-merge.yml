name: Auto Merge
# smoke: verify App-token mint on the new auto-merge path (ippoan-ci-bot). Refs #65

on:
  workflow_call:
    inputs:
      verify_deploy_gate:
        description: |
          caller workflow の deploy 系 job (job id / name に "deploy" を含む
          job) が auto-merge job の `needs` で gate されているかを静的検査し、
          漏れていれば loud fail する (default: true)。auto-merge が deploy
          (staging cutover) の完了を待たずに merge → branch 削除すると走行中
          の deploy が cancel され、失敗が無音化する事故の再発防止
          (Refs ippoan/rust-alc-api#405)。
        type: boolean
        required: false
        default: true
      deploy_gate_ignore:
        description: |
          deploy gate 検査から除外する caller job id (comma 区切り)。
          名前に "deploy" を含むが PR run で merge を gate すべきでない
          job 用 (tag push 限定の deploy job は `if` の内容から自動除外
          されるので通常は不要)。
        type: string
        required: false
        default: ''
      verify_all_checks:
        description: |
          merge を queue する前に、head SHA の全 check runs (Auto Merge 系
          job 自身を除く) が completed かつ成功系になるまで待つ (default:
          true)。同一 repo で複数 caller workflow が同じ PR に走る monorepo
          では、各 workflow の内蔵 auto-merge が自 workflow の needs しか
          見ないため、最初に完走した workflow が兄弟 workflow の完走前に
          merge してしまう事故の再発防止 (Refs #169、実害:
          ippoan/nuxt-notify#106 が Email CI failure + frontend CI 走行中に
          merge)。
        type: boolean
        required: false
        default: true
      all_checks_timeout_minutes:
        description: |
          verify_all_checks の待ち時間上限 (分)。超過したら merge を queue
          せず loud fail する。兄弟 workflow に長い pipeline (Bazel shard 等)
          がある repo は伸ばすこと。
        type: number
        required: false
        default: 30
    secrets:
      CI_APP_ID:
        description: |
          GitHub App ID (org secret). **Required** (enforced at runtime): set
          together with `CI_APP_PRIVATE_KEY` so an installation access token is
          minted via `actions/create-github-app-token`. If absent, the job
          fails loud (the old github.token fallback was removed — see the
          `Require App token` step). Pass via `secrets: inherit` or explicitly.

          Why this is required: a merge performed with an App token pushes
          the `push: main` (and `pull_request: closed`) events as the App
          actor — NOT `github-actions[bot]` — so downstream workflows
          (release.yml chain, dev-tag-release, post-merge close jobs) DO
          fire. The App's installation permissions (Contents / Pull requests
          / Workflows = write) also cover merging PRs that touch
          `.github/workflows/**`. And the App has its own rate-limit bucket,
          so it does not exhaust an individual user's 5,000 pts/hr GraphQL
          quota (the cause of the intermittent "API rate limit already
          exceeded for user ID" failures on `gh pr merge --auto`).
        required: false
      CI_APP_PRIVATE_KEY:
        description: |
          PEM private key for the GitHub App identified by `CI_APP_ID`
          (org secret, multi-line). **Required** alongside `CI_APP_ID` —
          the job fails loud if either is missing.
        required: false
      AUTO_MERGE_PAT:
        description: |
          Legacy PAT. **No longer used** for the merge token (App token is now
          mandatory). Still accepted as a `workflow_call` secret for interface
          compatibility so existing callers that pass it do not error.
        required: false
      TAG_RELEASE_PAT:
        description: |
          Org-standard PAT used across `tag-release.yml` /
          `dev-tag-release.yml`. **No longer used** for the auto-merge token
          (App token is now mandatory). Still accepted here for interface
          compatibility so callers that pass it explicitly do not error.
        required: false

jobs:
  auto-merge:
    name: Auto Merge
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # NOTE(#171): verify_all_checks の check runs 読み取りに `checks: read` を
      # ここに宣言しないこと。reusable の permissions は caller chain 全体
      # (frontend-ci/lib-ci の auto-merge 呼び出し + 全 consumer caller の
      # top-level permissions) に宣言が波及し、1 つでも欠けると parse 時
      # startup_failure になる (実害: #170 で全 repo の CI が停止)。読み取りは
      # GITHUB_TOKEN permissions と独立な App installation token で行う。
    env:
      # App ID は数値で非機密。step `if:` の gate に使うため job-level env に置く
      # (env context は if で参照可、secrets context は不可)。private key は
      # env に置かず create-github-app-token の `with:` に直接渡す。
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
    steps:
      # ---- deploy gate 静的検査 (Refs ippoan/rust-alc-api#405) ----
      # auto-merge job が deploy 系 job の完了を待たずに merge を queue すると、
      # merge → branch 削除で走行中の staging cutover が cancel され、deploy
      # 失敗が無音化する (rust-alc-api#391 で 2 回実害)。`needs:` は caller の
      # DAG なので reusable 側から配線できないが、「配線漏れの検出」は caller
      # workflow YAML の静的検査で中央化できる。jobs API と違い追加 permission
      # (actions: read) が不要なので checkout + 静的解析で行う。
      #
      # 検査範囲は `github.workflow_ref` が指す top-level workflow file のみ:
      #   - 直接 caller (auto-merge.yml を uses する job がある file): その job の
      #     needs (推移的閉包) に deploy 系 job が全て含まれなければ loud fail
      #   - nested 呼び出し (frontend-ci.yml / lib-ci.yml 経由 = top-level に
      #     auto-merge.yml を uses する job が無い): embedded pipeline 側で
      #     deploy-staging を needs 済みなので skip (top-level に deploy job が
      #     あれば warning のみ — nested auto-merge の needs では gate 不能)
      #   - 別 workflow file の deploy job は needs で gate しようがないので対象外
      #     (branch protection required checks で守る)
      - name: Checkout caller workflows (deploy gate check)
        if: ${{ inputs.verify_deploy_gate }}
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/workflows

      - name: Verify deploy jobs are gated by auto-merge needs (fail loud on missing wiring)
        if: ${{ inputs.verify_deploy_gate }}
        env:
          WF_REF: ${{ github.workflow_ref }}
          DEPLOY_GATE_IGNORE: ${{ inputs.deploy_gate_ignore }}
        run: |
          python3 - <<'PY'
          import os, re, sys
          import yaml

          ignore = {s.strip() for s in os.environ.get("DEPLOY_GATE_IGNORE", "").split(",") if s.strip()}
          # workflow_ref 例: owner/repo/.github/workflows/ci.yml@refs/pull/408/merge
          path = os.environ["WF_REF"].split("@", 1)[0].split("/", 2)[2]
          with open(path) as f:
              wf = yaml.safe_load(f)
          jobs = {jid: j for jid, j in (wf.get("jobs") or {}).items() if isinstance(j, dict)}

          def is_pr_deploy(jid, job):
              if jid in ignore:
                  return False
              if not re.search(r"deploy", jid + " " + str(job.get("name") or ""), re.I):
                  return False
              cond = str(job.get("if") or "")
              # tag push 限定 (PR run では走らない) の deploy job は merge と
              # 並走しないので gate 対象外
              if "refs/tags" in cond and "pull_request" not in cond:
                  return False
              return True

          deploy_jobs = {jid for jid, j in jobs.items() if is_pr_deploy(jid, j)}
          callers = {jid: j for jid, j in jobs.items() if "auto-merge.yml" in str(j.get("uses") or "")}

          if not callers:
              if deploy_jobs:
                  print(f"::warning title=auto-merge deploy gate::top-level の deploy 系 job {sorted(deploy_jobs)} は nested auto-merge の needs では gate できません。branch protection required checks での gate を検討してください。")
              sys.exit(0)

          def closure(jid, seen):
              needs = jobs.get(jid, {}).get("needs") or []
              if isinstance(needs, str):
                  needs = [needs]
              for dep in needs:
                  if dep not in seen:
                      seen.add(dep)
                      closure(dep, seen)

          ok = True
          for jid in callers:
              seen = set()
              closure(jid, seen)
              missing = deploy_jobs - seen
              if missing:
                  ok = False
                  mi = ",".join(sorted(missing))
                  print(f"::error title=auto-merge deploy gate::{path} の job '{jid}' の needs に deploy 系 job {sorted(missing)} が (推移的にも) 含まれていません。merge -> branch 削除で走行中の deploy が cancel され、deploy 失敗が無音化します (ippoan/rust-alc-api#405)。needs に追加するか、PR run で merge を gate すべきでない job なら input deploy_gate_ignore: '{mi}' で除外してください。")
          if not ok:
              sys.exit(1)
          print(f"deploy gate OK: deploy jobs {sorted(deploy_jobs)} <= needs closure of {sorted(callers)}")
          PY

      # GitHub App installation token を mint (caller が CI_APP_ID/KEY を渡した時)。
      # CI_APP_ID が空 (= caller が secret を配線していない) なら skip され、
      # 次の guard step で fail-loud する。
      - name: Mint GitHub App installation token (required)
        id: app-token
        if: env.CI_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      # caller が CI_APP_ID/CI_APP_PRIVATE_KEY を渡していないと App token を mint
      # できない。以前はここで github.token に **silent fallback** していたが、
      # それだと 2 つの実害が cosmetic に隠れていた:
      #   1. 個人 GraphQL クォータ枯渇による "API rate limit already exceeded
      #      for user ID" の間欠 fail (gh pr merge --auto で発生)
      #   2. merge commit の push actor が github-actions[bot] になり downstream
      #      workflow (release.yml chain 等) が発火しない (GITHUB_TOKEN event は
      #      Actions に無視される / ippoan/mcp-relay-rs#21 の silent skip 実害)
      # fail-loud に倒して caller 側の secret 配線漏れを即座に検出させる。
      # caller は `secrets: inherit` か CI_APP_ID/CI_APP_PRIVATE_KEY の明示 pass で
      # 解消できる。Refs #65
      - name: Require App token (fail loud if caller did not pass CI_APP_ID/CI_APP_PRIVATE_KEY)
        if: steps.app-token.outputs.token == ''
        env:
          CALLER_OWNER: ${{ github.repository_owner }}
        run: |
          echo "::error title=auto-merge: missing GitHub App credentials::CI_APP_ID / CI_APP_PRIVATE_KEY were empty, so no GitHub App installation token could be minted."
          echo "::error::FIX: the caller must wire CI_APP_ID + CI_APP_PRIVATE_KEY through to this reusable."
          echo "::error::CROSS-ORG GOTCHA: 'secrets: inherit' ONLY forwards secrets when the reusable workflow is in the SAME org/enterprise as the caller. This reusable lives in 'ippoan/ci-workflows', so a caller in a DIFFERENT org (your caller owner is '${CALLER_OWNER}') will get EMPTY secrets with 'secrets: inherit'. Cross-org callers MUST pass them explicitly instead:"
          echo "::error::    secrets:"
          echo "::error::      CI_APP_ID: \${{ secrets.CI_APP_ID }}"
          echo "::error::      CI_APP_PRIVATE_KEY: \${{ secrets.CI_APP_PRIVATE_KEY }}"
          echo "::error::Also confirm both are present as org (or repo) secrets in '${CALLER_OWNER}' and visible to this repository. The github.token fallback was removed because it caused intermittent 'API rate limit already exceeded' failures and a github-actions[bot] push actor that does not trigger downstream release workflows. See ippoan/ci-workflows#65."
          exit 1

      # ---- 全 check green 検証 (Refs #169) ----
      # 同一 repo で複数 caller workflow (nuxt-notify の CI / Email Worker CI /
      # Realtime Bus Worker CI 等) が同じ PR に走ると、各 workflow の内蔵
      # auto-merge は自 workflow の needs しか見ないため、最初に完走した workflow
      # が兄弟 workflow の完走前に merge を queue してしまう。3 caller が同じ
      # job id (`ci`) を使うと check 名も衝突するため required checks でも守れない
      # (実害: ippoan/nuxt-notify#106 が Email CI failure + frontend CI 走行中に
      # merge)。ここで head SHA の全 check runs (Auto Merge 系 job 自身を除く) が
      # completed & 成功系 (success/neutral/skipped) になるまで bounded wait し、
      # 失敗が居たら queue せず loud fail する。
      # 複数 auto-merge job が同時に通過しても `gh pr merge --auto` は冪等。
      # token は github.token でなく App token を使う (#171): github.token だと
      # job permissions に `checks: read` の宣言が必要になり、それが caller chain
      # 全体 (frontend-ci/lib-ci + 全 consumer caller) に波及して宣言漏れ 1 つで
      # startup_failure になる。App token は上の guard step で必ず非空。
      - name: Wait for all sibling checks on head SHA (fail loud on red)
        if: ${{ inputs.verify_all_checks }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TIMEOUT_MIN: ${{ inputs.all_checks_timeout_minutes }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_MIN * 60 ))
          while :; do
            # filter=latest (API default) — 同名 check は最新 attempt のみ。
            # --paginate は page ごとに配列を出すので jq -s 'add' で連結する。
            if ! raw=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" --paginate \
              --jq '[.check_runs[] | {name, status, conclusion}]'); then
              echo "::error title=auto-merge all-checks gate::check-runs API を読めませんでした。403 (Resource not accessible by integration) の場合は GitHub App (CI_APP_ID) の installation permissions に 'Checks: Read-only' を追加してください (Refs ippoan/ci-workflows#171)"
              exit 1
            fi
            runs=$(echo "$raw" | jq -s 'add // []')
            # 自分達 (各 caller の Auto Merge job) は永遠に in_progress に見える
            # ので名前で除外する。
            bad=$(echo "$runs" | jq -r '[.[]
              | select((.name | test("Auto Merge") | not)
                  and .status == "completed"
                  and ((.conclusion // "") as $c | ["success","neutral","skipped"] | index($c) | not))]
              | map(.name) | unique | join(", ")')
            if [ -n "$bad" ]; then
              echo "::error title=auto-merge all-checks gate::head SHA に失敗した check があります: $bad — merge を queue しません (Refs ippoan/ci-workflows#169)"
              exit 1
            fi
            pending=$(echo "$runs" | jq '[.[]
              | select((.name | test("Auto Merge") | not) and .status != "completed")] | length')
            if [ "$pending" -eq 0 ]; then
              echo "all sibling checks completed & green"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error title=auto-merge all-checks gate::${TIMEOUT_MIN} 分待っても完了しない check が ${pending} 件あります — merge を queue しません。兄弟 workflow の pipeline が長い repo は input all_checks_timeout_minutes を伸ばしてください"
              exit 1
            fi
            echo "waiting: $pending sibling checks still running..."
            sleep 15
          done

      - name: Check mergeable and queue squash merge
        env:
          # App installation token のみを使う (上の guard で必ず非空)。App token は
          # 独自の rate-limit バケットを持つため個人 GraphQL クォータを食わず、merge
          # commit の push actor も非 GITHUB_TOKEN になるので downstream workflow を
          # 発火させられる。AUTO_MERGE_PAT / TAG_RELEASE_PAT は interface 互換のため
          # secrets で受けるが (caller が明示 pass してもエラーにしない)、token には
          # 使わない。
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR=${{ github.event.number }}
          REPO=${{ github.repository }}
          MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable --jq .mergeable)
          echo "PR #$PR mergeable: $MERGEABLE"
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            echo "::error::PR #$PR has merge conflicts. Resolve conflicts before merging."
            exit 1
          fi
          # `--auto` queues the merge so GitHub fires it once all required
          # status checks + branch-protection gates clear. Without `--auto`,
          # this job tries to merge immediately and gets rejected with
          # "base branch policy prohibits the merge" because the very job
          # that's running IS one of the required checks (chicken/egg).
          gh pr merge "$PR" --auto --squash --repo "$REPO"
